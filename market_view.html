<script>
const FB_CONFIG={apiKey:"AIzaSyBh9LtC02jCwyrURkl676UFxtHU2SdSkkI",authDomain:"ian-dashboard.firebaseapp.com",projectId:"ian-dashboard",storageBucket:"ian-dashboard.firebasestorage.app",messagingSenderId:"47067460467",appId:"1:47067460467:web:37906ad2ddb74133238b06"};
if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);
const db=firebase.firestore();const UID='ian';
async function fbSave(){try{const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)d[k]=localStorage.getItem(k);}await db.collection('data').doc(UID).set(d,{merge:true});}catch(e){console.warn('FB:',e);}}
async function fbSync(cb){try{const doc=await db.collection('data').doc(UID).get();if(doc.exists){Object.entries(doc.data()).forEach(([k,v])=>localStorage.setItem(k,v));}}catch(e){console.warn('FB:',e);}if(cb)cb();}
</script>
<style>
:root{--bg:#0c0c0e;--bg2:#141416;--bg3:#1c1c1f;--border:rgba(255,255,255,0.2);--border2:rgba(255,255,255,0.3);--text:#f0f0f0;--text2:#ccc;--text3:#999;--stock:#fbbf24;--pos:#34d399;--neg:#fb7185;--r:10px;--r-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-back{font-size:22px;color:var(--text2);text-decoration:none;}
.nav-logo{font-family:'DM Mono',monospace;font-size:15px;color:var(--text2);}
.toolbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.btn{font-size:14px;padding:8px 15px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--stock);color:var(--stock);}
.btn.primary{border-color:var(--stock);color:var(--stock);}
.confirm-bar{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);padding:7px 20px;min-height:30px;}
.wrap{padding:20px;overflow-x:auto;}
/* 테이블 */
.resizable-table{width:max-content;min-width:100%;border-collapse:collapse;table-layout:fixed;}
.resizable-table th{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);padding:10px 12px;border:2px solid var(--border2);background:var(--bg2);text-align:left;white-space:nowrap;position:relative;user-select:none;}
.th-inner{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.th-input{background:transparent;border:none;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;outline:none;width:calc(100% - 20px);cursor:text;}
.th-input:focus{color:var(--text);border-bottom:1px solid var(--stock);}
.th-del{cursor:pointer;color:var(--text3);font-size:11px;flex-shrink:0;padding:0 2px;}
.th-del:hover{color:var(--neg);}
.resizer{width:6px;height:100%;position:absolute;right:0;top:0;cursor:col-resize;background:transparent;z-index:2;}
.resizer:hover,.resizer.active{background:var(--stock);}
.resizable-table td{padding:0;border:2px solid var(--border2);vertical-align:top;overflow:hidden;}
.resizable-table td textarea,.resizable-table td input[type=text]{width:100%;background:transparent;border:none;color:var(--text);font-size:14px;padding:9px 11px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none;line-height:1.6;box-sizing:border-box;}
.resizable-table td textarea{min-height:80px;max-height:400px;resize:vertical;overflow-y:auto;}
.resizable-table td input[type=text]:focus,.resizable-table td textarea:focus{background:rgba(251,191,36,0.05);}
td.date-td{padding:10px 12px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);white-space:nowrap;vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,0.02);}
.drag-handle{cursor:grab;color:var(--text3);padding:8px 4px;font-size:14px;user-select:none;display:block;text-align:center;}
.del-btn{font-size:12px;color:var(--text3);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;transition:all .15s;}
.del-btn:hover{border-color:var(--neg);color:var(--neg);}
.add-row-btn{width:100%;padding:12px;font-size:14px;font-family:'DM Mono',monospace;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.add-row-btn:hover{border-color:var(--stock);color:var(--stock);}
.empty-msg{text-align:center;padding:48px;color:var(--text3);font-size:15px;font-family:'DM Mono',monospace;}
.hidden{display:none!important;}
/* contenteditable 셀 공통 스타일 */
.ce-cell{
  width:100%;height:100%;
  min-height:60px;
  background:transparent;
  color:var(--text);
  font-size:14px;
  padding:8px 10px;
  font-family:'Noto Sans KR',sans-serif;
  line-height:1.6;
  box-sizing:border-box;
  outline:none;
  overflow-y:auto;
  word-break:break-word;
  white-space:pre-wrap;
}
.ce-cell:focus{background:rgba(251,191,36,0.04);}
.ce-cell b, .ce-cell strong{color:inherit;}

.ce-cell:empty:before{content:attr(placeholder);color:var(--text3);pointer-events:none;}
/* 상단 고정 스크롤바 */
.top-scroll-bar{
  overflow-x:auto;
  overflow-y:hidden;
  height:12px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-bottom:none;
  border-radius:var(--r-sm) var(--r-sm) 0 0;
  cursor:pointer;
}
.top-scroll-bar::-webkit-scrollbar{height:8px;}
.top-scroll-bar::-webkit-scrollbar-track{background:var(--bg3);}
.top-scroll-bar::-webkit-scrollbar-thumb{background:rgba(251,191,36,0.4);border-radius:4px;}
.top-scroll-bar::-webkit-scrollbar-thumb:hover{background:rgba(251,191,36,0.7);}

</style>
</head>
<body>
<div class="nav">
  <div class="nav-left"><a class="nav-back" href="home.html">←</a><div class="nav-logo">시황뷰</div></div>
</div>
<div class="toolbar">
  <button class="btn primary" onclick="addRow()">+ 행 추가</button>
  <button class="btn" onclick="addCol()">+ 열 추가</button>
  <div style="width:1px;height:22px;background:var(--border2);flex-shrink:0;"></div>
  <label class="btn" style="cursor:pointer;">📂 추가<input type="file" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(this,'append')"></label>
  <label class="btn" style="cursor:pointer;">📂 덮어쓰기<input type="file" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(this,'overwrite')"></label>
  <button class="btn" onclick="exportExcel()">⬇ 다운로드</button>
</div>
<div class="confirm-bar" id="confirm-bar"></div>
<div class="wrap">
  <div style="overflow-x:auto;">
    <table class="resizable-table" id="mv-table">
      <thead id="mv-thead"></thead>
      <tbody id="mv-tbody"></tbody>
    </table>
    <button class="add-row-btn" onclick="addRow()">+ 행 추가</button>
    <div id="mv-empty" class="empty-msg" style="display:none;">내용을 추가해보세요</div>
  </div>
</div>
<script>
const DEFAULT_COLS=['날짜','분류','내용','배경/이유','전망','리스크','업데이트'];
const DEFAULT_COL_W={날짜:110,분류:120,내용:280,'배경/이유':240,전망:220,리스크:180,업데이트:120};
const FIXED=['날짜'];
const DAYS=['일','월','화','수','목','금','토'];
let dragSrc=-1,rCol='',rStartX=0,rStartW=0;

function pad(n){return String(n).padStart(2,'0');}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function ls(k){return localStorage.getItem(k);}
function lss(k,v){localStorage.setItem(k,v);}
function showConfirm(msg){const el=document.getElementById('confirm-bar');el.textContent=msg;setTimeout(()=>el.textContent='',3000);}
function getData(){return JSON.parse(ls('market_view_data')||JSON.stringify({cols:[...DEFAULT_COLS],rows:[],colWidths:{}}));}
function saveData(d){lss('market_view_data',JSON.stringify(d));fbSave();}

function addRow(){
  const data=getData();const row={};data.cols.forEach(c=>row[c]='');row['날짜']=todayStr();
  data.rows.unshift(row);saveData(data);render();
}
function addCol(){
  const name=prompt('새 열 이름:');if(!name?.trim())return;
  const data=getData();if(data.cols.includes(name.trim())){showConfirm('이미 있는 열');return;}
  data.cols.push(name.trim());data.rows.forEach(r=>r[name.trim()]=r[name.trim()]||'');
  saveData(data);render();
}
function renameCol(oldName,newName){
  if(!newName?.trim()||newName===oldName)return;
  const data=getData();
  if(FIXED.includes(oldName))return;
  if(data.cols.includes(newName.trim())&&newName.trim()!==oldName){showConfirm('이미 있는 이름');return;}
  const idx=data.cols.indexOf(oldName);if(idx<0)return;
  data.cols[idx]=newName.trim();
  data.rows.forEach(r=>{r[newName.trim()]=r[oldName]||'';if(newName.trim()!==oldName)delete r[oldName];});
  if(data.colWidths?.[oldName]){data.colWidths[newName.trim()]=data.colWidths[oldName];delete data.colWidths[oldName];}
  saveData(data);render();
}
function deleteCol(col){
  if(FIXED.includes(col)){showConfirm('날짜 열은 삭제 불가');return;}
  if(!confirm('"'+col+'" 열 삭제?'))return;
  const data=getData();data.cols=data.cols.filter(c=>c!==col);data.rows.forEach(r=>delete r[col]);saveData(data);render();
}
function deleteRow(idx){
  if(!confirm('삭제?'))return;const data=getData();data.rows.splice(idx,1);saveData(data);render();
}
function updateCellCE_mv(el,idx,col){
  const data=getData();if(!data.rows[idx])return;
  data.rows[idx][col]=el.innerHTML;saveData(data);
}
function updateCell(idx,col,val){
  const data=getData();if(!data.rows[idx])return;data.rows[idx][col]=val;saveData(data);
}

// 드래그 행 순서
function dragStart(e,ri){dragSrc=ri;e.currentTarget.classList.add('dragging');}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragDrop(e,ri){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(dragSrc===ri)return;
  const data=getData();const row=data.rows.splice(dragSrc,1)[0];data.rows.splice(ri,0,row);
  saveData(data);render();dragSrc=-1;
}

// 열 너비 드래그
function startResize(e,col){
  e.preventDefault();rCol=col;rStartX=e.clientX;
  const data=getData();rStartW=(data.colWidths||{})[col]||DEFAULT_COL_W[col]||180;
  e.target.classList.add('active');
  const mm=ev=>{
    const nw=Math.max(1, rStartW+(ev.clientX-rStartX));
    document.querySelectorAll(`[data-col="${rCol}"]`).forEach(el=>{el.style.width=nw+'px';});
  };
  const mu=()=>{
    e.target.classList.remove('active');
    document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);
    const data2=getData();if(!data2.colWidths)data2.colWidths={};
    const th=document.querySelector(`th[data-col="${rCol}"]`);if(th)data2.colWidths[rCol]=th.offsetWidth;
    saveData(data2);
  };
  document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
}

function render(){
  const data=getData();
  const thead=document.getElementById('mv-thead');
  const tbody=document.getElementById('mv-tbody');
  const empty=document.getElementById('mv-empty');
  const cw=data.colWidths||{};
  const cols=data.cols;

  thead.innerHTML='<tr><th style="width:28px;border:2px solid var(--border2);">↕</th>'+
    cols.map(c=>{
      const w=cw[c]||DEFAULT_COL_W[c]||180;
      const canDel=!FIXED.includes(c);
      return `<th data-col="${c}" style="width:${w}px;">
        <div class="th-inner">
          <input class="th-input" value="${c}" onblur="renameCol('${c}',this.value)" onclick="event.stopPropagation()" ${FIXED.includes(c)?'readonly style="cursor:default;"':''}>
          ${canDel?`<span class="th-del" onclick="deleteCol('${c}')">✕</span>`:''}
        </div>
        <div class="resizer" onmousedown="startResize(event,'${c}')"></div>
      </th>`;
    }).join('')+
    '<th style="width:56px;border:2px solid var(--border2);"></th></tr>';

  if(!data.rows.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  tbody.innerHTML=data.rows.map((row,ri)=>`
    <tr draggable="true" ondragstart="dragStart(event,${ri})" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dragDrop(event,${ri})">
      <td style="width:28px;text-align:center;vertical-align:middle;border:2px solid var(--border2);padding:4px;">
        <span class="drag-handle">⠿</span>
      </td>
      ${cols.map(c=>{
        const val=row[c]||'';
        const w=cw[c]||DEFAULT_COL_W[c]||180;
        if(c==='날짜')return `<td class="date-td" data-col="${c}" style="width:${w}px;"><input type="date" value="${val}" onchange="updateCell(${ri},'${c}',this.value)" style="background:transparent;border:none;color:var(--text2);font-size:13px;font-family:'DM Mono',monospace;outline:none;width:120px;"></td>`;
        return `<td data-col="${c}" style="width:${w}px;"><div class="ce-cell" contenteditable="true" onblur="updateCellCE_mv(this,${ri},'${c}')" placeholder="${c}...">${val}</div></td>`;
      }).join('')}
      <td style="width:56px;text-align:center;vertical-align:middle;border:2px solid var(--border2);padding:8px;">
        <button class="del-btn" onclick="deleteRow(${ri})">삭제</button>
      </td>
    </tr>`).join('');
  setTimeout(initAllTopScrolls, 50);
}

function exportExcel(){
  const data=getData();if(!data.rows.length){showConfirm('데이터가 없어요');return;}
  const rows=[data.cols,...data.rows.map(r=>data.cols.map(c=>r[c]||''))];
  const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'시황뷰',ws);
  const d=new Date();XLSX.writeFile(wb,'시황뷰_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx');
  showConfirm('다운로드 완료!');
}
function importExcel(input,mode){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rawRows=XLSX.utils.sheet_to_json(ws,{header:1});
    if(rawRows.length<2){showConfirm('데이터가 없어요');return;}
    const headers=rawRows[0].map(h=>String(h||'').trim());
    const data=mode==='overwrite'?{cols:[...DEFAULT_COLS],rows:[],colWidths:{}}:getData();
    headers.forEach(h=>{if(h&&!data.cols.includes(h))data.cols.push(h);});
    rawRows.slice(1).forEach(row=>{
      if(!row.some(v=>v))return;
      const r={};data.cols.forEach(c=>r[c]='');
      headers.forEach((h,i)=>{if(h&&row[i]!==undefined)r[h]=String(row[i]);});
      data.rows.push(r);
    });
    saveData(data);render();showConfirm(mode==='overwrite'?'덮어쓰기 완료!':'추가 완료!');
  };
  reader.readAsBinaryString(file);input.value='';
}

const d=new Date();
/* [수정] localStorage 먼저 렌더 → Firebase 재렌더 */
render();
fbSync(()=>{ render(); });
</script>

<script>
// textarea auto-resize
document.addEventListener('input',function(e){
  if(e.target.tagName==='TEXTAREA'){
    e.target.style.height='auto';
    e.target.style.height=Math.min(e.target.scrollHeight,400)+'px';
  }
});
// 테이블 셀 키보드 네비게이션
document.addEventListener('keydown',function(e){
  const el=document.activeElement;if(!el)return;
  const isInput=el.tagName==='INPUT'||el.tagName==='TEXTAREA';if(!isInput)return;
  const td=el.closest('td');if(!td)return;
  const tr=td.closest('tr');if(!tr)return;
  const table=tr.closest('table');if(!table)return;
  if(e.key==='Tab'){
    e.preventDefault();
    const allCells=Array.from(table.querySelectorAll('tbody td input,tbody td textarea'));
    const curIdx=allCells.indexOf(el);if(curIdx<0)return;
    const nextIdx=e.shiftKey?curIdx-1:curIdx+1;
    if(nextIdx>=0&&nextIdx<allCells.length){allCells[nextIdx].focus();if(allCells[nextIdx].select)allCells[nextIdx].select();}
  }
});
</script>
<script>
/* ============================================================
   CONTENTEDITABLE RICH TEXT ENGINE
   - 텍스트 선택 후 미니 툴바: 볼드, 글자색, 형광펜
   - 저장: innerHTML (기존 plain text도 그대로 읽힘)
   - 툴바는 선택 영역 위에 자동 위치
   ============================================================ */

(function(){
  const TOOLBAR_ID = 'ce-toolbar';
  const COLORS = ['#fbbf24','#fb7185','#34d399','#60a5fa','#a78bfa','#f97316','#ffffff','#000000'];
  const HIGHLIGHTS = ['#fbbf2440','#fb718540','#34d39940','#60a5fa40','#a78bfa40','rgba(251,191,36,0.35)','rgba(251,113,133,0.35)','rgba(52,211,153,0.35)'];

  function getOrCreateToolbar(){
    let tb = document.getElementById(TOOLBAR_ID);
    if(tb) return tb;
    tb = document.createElement('div');
    tb.id = TOOLBAR_ID;
    tb.style.cssText = `
      position:fixed;z-index:9999;
      background:#1c1c1f;border:1px solid rgba(255,255,255,0.25);
      border-radius:8px;padding:6px 8px;
      display:none;flex-wrap:wrap;gap:4px;align-items:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
      max-width:320px;
    `;

    // 볼드
    const bold = document.createElement('button');
    bold.textContent = 'B';
    bold.style.cssText = 'font-weight:700;font-size:13px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:#f0f0f0;border-radius:4px;padding:3px 8px;cursor:pointer;font-family:DM Mono,monospace;';
    bold.title = '볼드';
    bold.onmousedown = e => { e.preventDefault(); document.execCommand('bold'); };
    tb.appendChild(bold);

    // 구분선
    const sep1 = document.createElement('div');
    sep1.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep1);

    // 글자색 라벨
    const lbl1 = document.createElement('span');
    lbl1.textContent = 'A';
    lbl1.style.cssText = 'font-size:11px;color:#999;font-family:DM Mono,monospace;';
    tb.appendChild(lbl1);

    // 글자색 팔레트
    COLORS.forEach(c => {
      const dot = document.createElement('button');
      dot.style.cssText = `width:16px;height:16px;border-radius:50%;background:${c};border:1px solid rgba(255,255,255,0.3);cursor:pointer;padding:0;flex-shrink:0;`;
      dot.title = c;
      dot.onmousedown = e => { e.preventDefault(); document.execCommand('foreColor', false, c); };
      tb.appendChild(dot);
    });

    // 구분선
    const sep2 = document.createElement('div');
    sep2.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep2);

    // 형광펜 라벨
    const lbl2 = document.createElement('span');
    lbl2.style.cssText = 'font-size:13px;color:#999;';
    lbl2.textContent = '🖍';
    tb.appendChild(lbl2);

    // 형광펜 팔레트
    HIGHLIGHTS.forEach(c => {
      const dot = document.createElement('button');
      dot.style.cssText = `width:16px;height:16px;border-radius:3px;background:${c};border:1px solid rgba(255,255,255,0.3);cursor:pointer;padding:0;flex-shrink:0;`;
      dot.title = '형광펜';
      dot.onmousedown = e => {
        e.preventDefault();
        document.execCommand('hiliteColor', false, c);
      };
      tb.appendChild(dot);
    });

    // 구분선
    const sep3 = document.createElement('div');
    sep3.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep3);

    // 서식 제거
    const clr = document.createElement('button');
    clr.textContent = '✕';
    clr.title = '서식 제거';
    clr.style.cssText = 'font-size:12px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:#999;border-radius:4px;padding:3px 7px;cursor:pointer;';
    clr.onmousedown = e => { e.preventDefault(); document.execCommand('removeFormat'); };
    tb.appendChild(clr);

    document.body.appendChild(tb);
    tb.style.display = 'flex';
    tb.style.display = 'none';
    return tb;
  }

  function showToolbar(){
    const sel = window.getSelection();
    if(!sel || sel.isCollapsed || !sel.toString().trim()) { hideToolbar(); return; }
    // contenteditable 안에서만
    let node = sel.anchorNode;
    while(node && node.nodeType !== 1) node = node.parentNode;
    if(!node || !node.closest('[contenteditable="true"]')) { hideToolbar(); return; }

    const tb = getOrCreateToolbar();
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    tb.style.display = 'flex';
    const tbW = tb.offsetWidth || 300;
    let left = rect.left + (rect.width/2) - (tbW/2);
    let top = rect.top - tb.offsetHeight - 8 + window.scrollY;
    if(left < 4) left = 4;
    if(left + tbW > window.innerWidth - 4) left = window.innerWidth - tbW - 4;
    if(top < window.scrollY + 4) top = rect.bottom + 8 + window.scrollY;
    tb.style.left = left + 'px';
    tb.style.top = top + 'px';
  }

  function hideToolbar(){
    const tb = document.getElementById(TOOLBAR_ID);
    if(tb) tb.style.display = 'none';
  }

  document.addEventListener('mouseup', () => setTimeout(showToolbar, 10));
  document.addEventListener('keyup', () => setTimeout(showToolbar, 10));
  document.addEventListener('mousedown', e => {
    const tb = document.getElementById(TOOLBAR_ID);
    if(tb && !tb.contains(e.target)) hideToolbar();
  });
  document.addEventListener('scroll', hideToolbar, true);

  window.CE_ENGINE_LOADED = true;
})();

</script>
<script>
/* ============================================================
   AUTO-SAVE ENGINE
   - contenteditable 셀 입력 후 800ms 디바운스 자동저장
   - 상단 저장 표시바: "저장됨 ✓ HH:MM:SS"
   - 페이지 이탈 전 미저장 경고
   ============================================================ */
(function(){
  let _dirty = false;
  let _saveTimer = null;
  const DEBOUNCE = 800;

  function pad(n){ return String(n).padStart(2,'0'); }
  function nowTime(){
    const d=new Date();
    return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
  }

  function getBar(){
    let bar = document.getElementById('as-bar');
    if(bar) return bar;
    bar = document.createElement('div');
    bar.id = 'as-bar';
    bar.style.cssText = `
      position:fixed;bottom:0;left:0;right:0;
      height:28px;background:#141416;
      border-top:1px solid rgba(255,255,255,0.1);
      display:flex;align-items:center;justify-content:flex-end;
      padding:0 16px;z-index:9998;
      font-family:'DM Mono',monospace;font-size:12px;
      color:#888;gap:10px;
    `;
    bar.innerHTML = '<span id="as-status">대기중...</span>';
    document.body.appendChild(bar);
    return bar;
  }

  function setStatus(msg, color){
    getBar();
    const el = document.getElementById('as-status');
    if(el){ el.textContent = msg; el.style.color = color||'#888'; }
  }

  // CE 셀 변경 감지 → 디바운스 저장
  document.addEventListener('input', function(e){
    const el = e.target;
    if(!el.classList || !el.classList.contains('ce-cell')) return;
    _dirty = true;
    setStatus('입력중...', '#fbbf24');
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(function(){
      // 현재 포커스된 CE 셀 저장 트리거
      el.dispatchEvent(new Event('blur', {bubbles:true}));
      _dirty = false;
      setStatus('저장됨 ✓ ' + nowTime(), '#34d399');
    }, DEBOUNCE);
  });

  // blur 시 즉시 저장 (기존 onblur 보완)
  document.addEventListener('focusout', function(e){
    const el = e.target;
    if(!el.classList || !el.classList.contains('ce-cell')) return;
    clearTimeout(_saveTimer);
    // onblur 이미 있으면 중복 실행 방지
    setTimeout(function(){
      _dirty = false;
      setStatus('저장됨 ✓ ' + nowTime(), '#34d399');
    }, 100);
  });

  // 페이지 이탈 경고
  window.addEventListener('beforeunload', function(e){
    if(_dirty){
      e.preventDefault();
      e.returnValue = '저장되지 않은 내용이 있어요.';
    }
  });

  window.AS_ENGINE_LOADED = true;
  // 초기 상태
  setTimeout(()=>setStatus('준비됨', '#888'), 500);
})();

</script>
<script>
/* ============================================================
   TOP SCROLL ENGINE v1
   테이블 wrap 위에 상단 고정 스크롤바 추가
   아래 스크롤바와 양방향 동기화
   ============================================================ */
function initTopScroll(wrapEl) {
  if(!wrapEl) return;
  if(wrapEl.dataset.topScrollInit) return; // 중복 방지
  wrapEl.dataset.topScrollInit = '1';

  // 상단 스크롤바 컨테이너
  const topBar = document.createElement('div');
  topBar.className = 'top-scroll-bar';
  topBar.style.cssText = 'overflow-x:auto;overflow-y:hidden;height:12px;';

  // 내부 더미 (테이블 너비 동기화)
  const dummy = document.createElement('div');
  dummy.className = 'top-scroll-dummy';
  dummy.style.cssText = 'height:1px;';
  topBar.appendChild(dummy);

  // wrap 앞에 삽입
  wrapEl.parentNode.insertBefore(topBar, wrapEl);

  // 너비 동기화 함수
  function syncWidth() {
    const inner = wrapEl.querySelector('table') || wrapEl.firstElementChild;
    if(inner) dummy.style.width = inner.scrollWidth + 'px';
  }

  // 스크롤 동기화 (무한루프 방지)
  let syncing = false;
  topBar.addEventListener('scroll', () => {
    if(syncing) return; syncing = true;
    wrapEl.scrollLeft = topBar.scrollLeft;
    syncing = false;
  });
  wrapEl.addEventListener('scroll', () => {
    if(syncing) return; syncing = true;
    topBar.scrollLeft = wrapEl.scrollLeft;
    syncing = false;
  });

  // 초기 + 렌더 후 너비 맞추기
  syncWidth();
  const obs = new ResizeObserver(syncWidth);
  obs.observe(wrapEl);
  setTimeout(syncWidth, 300);
}

// 페이지 내 모든 테이블 wrap에 자동 적용
function initAllTopScrolls() {
  document.querySelectorAll(
    '#tbl-outer, #tbl-outer-s, .tbl-wrap, .tbl-outer, .ex-table-wrap, [style*="overflow-x:auto"]'
  ).forEach(el => {
    // 테이블 자식이 있는 것만
    if(el.querySelector('table')) initTopScroll(el);
  });
}

window.initAllTopScrolls = initAllTopScrolls;
window.initTopScroll = initTopScroll;

</script>
