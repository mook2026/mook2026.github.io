<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일일 체크리스트</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0e;--bg2:#141416;--bg3:#1c1c1f;--border:rgba(255,255,255,0.2);--border2:rgba(255,255,255,0.3);--text:#f0f0f0;--text2:#bbb;--text3:#888;--job:#a78bfa;--eng:#34d399;--stock:#fbbf24;--sport:#fb7185;--r:10px;--r-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-back{font-size:18px;color:var(--text2);text-decoration:none;}
.nav-logo{font-family:'DM Mono',monospace;font-size:14px;color:var(--text2);letter-spacing:0.08em;}
.nav-date{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);padding:12px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s,border-color .15s;}
.tab:hover{color:var(--text2);}
.tab.on{color:var(--text);border-bottom-color:var(--job);}
.wrap{padding:16px 20px;max-width:700px;margin:0 auto;}

/* 요약 카드 */
.score-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;position:relative;overflow:hidden;}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.j::after{background:var(--job)}.sc.e::after{background:var(--eng)}.sc.s::after{background:var(--stock)}.sc.sp::after{background:var(--sport)}
.sc-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.sc-num{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;}
.sc.j .sc-num{color:var(--job)}.sc.e .sc-num{color:var(--eng)}.sc.s .sc-num{color:var(--stock)}.sc.sp .sc-num{color:var(--sport)}
.sc-sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* 섹션 */
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 9px;}
.sec-left{display:flex;align-items:center;gap:10px;}
.sec-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0;}
.sec-title{font-size:15px;font-weight:600;}
.sec-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 8px;}
.sec-pct{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);}
.prog{height:2px;background:var(--bg3);}
.prog-f{height:100%;transition:width .3s;}

/* 항목 행 */
.trow{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .1s;}
.trow:last-of-type{border-bottom:none;}
.trow:hover{background:var(--bg3);}

/* 체크박스 */
.cb{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.cb.on{border-color:transparent;}
.cb.on::after{content:'✓';font-size:13px;color:#fff;font-weight:700;}
.cb-j.on{background:var(--job)}.cb-e.on{background:var(--eng)}.cb-s.on{background:var(--stock)}.cb-sp.on{background:var(--sport)}

/* 항목 텍스트 */
.t-content{flex:1;min-width:0;}
.t-lbl{font-size:15px;color:var(--text);line-height:1.4;cursor:text;}
.t-lbl.done{color:var(--text3);text-decoration:line-through;}
.t-lbl input{background:transparent;border:none;color:inherit;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;}
.t-lbl input:focus{border-bottom:1px solid var(--border2);}
.t-sub{font-size:13px;color:var(--text3);margin-top:2px;cursor:text;}
.t-sub input{background:transparent;border:none;color:var(--text3);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;}

/* 점수 입력 */
.score-input{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.score-input input{width:44px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;padding:5px 8px;font-family:'DM Mono',monospace;outline:none;text-align:center;}
.score-input input:focus{border-color:var(--stock);}
.score-max{font-size:12px;color:var(--text3);}

/* 항목 관리 버튼 */
.item-del{font-size:16px;color:var(--text3);cursor:pointer;flex-shrink:0;padding:2px 4px;transition:color .15s;}
.item-del:hover{color:var(--neg);}
.add-item-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:13px;color:var(--text3);cursor:pointer;transition:color .15s;border-top:1px solid var(--border);}
.add-item-btn:hover{color:var(--text2);}

/* 기타 */
.extra{border-top:1px solid var(--border);padding:12px 16px;}
.tog-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.tog-lbl{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);}
.tog-btn{font-size:13px;padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;}
.tog-btn.on{background:var(--eng);color:#fff;border-color:var(--eng);}
.prog-lbl{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);}
.prog-lbl span{color:var(--eng);}
.si-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.si-row label{font-size:13px;color:var(--text2);white-space:nowrap;}
.si-row input[type=number]{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;padding:7px 10px;font-family:'DM Mono',monospace;outline:none;}
.si-row .u{font-size:13px;color:var(--text3);}
.goal-row{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:5px;}
.goal-row span{color:var(--stock);}
.wd-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
.wd-lbl{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-right:4px;}
.wd{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace;}
.wd:hover{border-color:var(--sport);color:var(--sport);}
.wd.on{background:var(--sport);border-color:var(--sport);color:#fff;}
.routine-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 16px;margin-bottom:12px;}
.routine-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.rtrow{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 0;}
.r-lbl{font-size:14px;color:var(--text2);}
.r-lbl.done{color:var(--text3);text-decoration:line-through;}
.cb-r.on{background:#60a5fa;border-color:#60a5fa;}

/* 주간 */
.week-sel{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.week-btn{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);cursor:pointer;transition:all .15s;}
.week-btn.on{background:var(--job);color:#fff;border-color:var(--job);}
.graph-wrap{position:relative;height:120px;margin:8px 0 4px;}
.review-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.review-card-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:12px;}
.rev-lbl{font-size:13px;color:var(--text3);margin-bottom:6px;}
.rev-textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;padding:10px 12px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none;margin-bottom:10px;line-height:1.6;}

/* 주간 점수 */
.week-score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.wsc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;text-align:center;}
.wsc-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.wsc-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;}
.wsc.j .wsc-val{color:var(--job)}.wsc.e .wsc-val{color:var(--eng)}.wsc.s .wsc-val{color:var(--stock)}.wsc.sp .wsc-val{color:var(--sport)}

/* 기록 */
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px;}
.hist-date{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:10px;}
.hist-scores{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.hist-sc{font-family:'DM Mono',monospace;font-size:13px;}
.hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.hbar-lbl{font-size:12px;color:var(--text3);width:40px;font-family:'DM Mono',monospace;}
.hbar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:3px;}
.hbar-pct{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);width:32px;text-align:right;}

/* 월간 */
.mo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.mo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;text-align:center;}
.mo-card.cur{border-color:var(--stock);}
.mo-month{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:5px;}
.mo-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--stock);}
.mo-val.neg{color:var(--sport);}
.mo-goal{font-size:12px;color:var(--text3);margin-top:3px;}
.mo-pbar{height:3px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden;}
.mo-pfill{height:100%;background:var(--stock);border-radius:2px;}

.save-btn{width:100%;margin-top:12px;padding:12px;font-size:14px;font-family:'DM Mono',monospace;letter-spacing:.04em;border:1px solid var(--eng);border-radius:var(--r-sm);background:transparent;color:var(--eng);cursor:pointer;transition:all .15s;}
.save-btn:hover{background:var(--eng);color:#fff;}
.copy-btn{width:100%;margin-top:8px;padding:12px;font-size:14px;font-family:'DM Mono',monospace;letter-spacing:.04em;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;}
.copy-btn:hover{border-color:var(--job);color:var(--job);}
.confirm{text-align:center;font-size:12px;color:var(--text3);margin-top:6px;height:14px;font-family:'DM Mono',monospace;}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:460px;padding:22px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;}
.form-row{margin-bottom:12px;}
.form-row label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px;}
.form-row input,.form-row textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;padding:8px 12px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.form-row textarea{height:70px;resize:none;}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.modal-btns button{flex:1;padding:10px;border-radius:6px;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:none;}
.btn-cancel{background:var(--bg3);border:1px solid var(--border2)!important;color:var(--text2);}
.btn-save{background:var(--job);color:#fff;}
.btn-del{background:#7f1d1d;color:#fca5a5;}
.stk-table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
td.pos{color:#34d399}td.neg{color:#fb7185}td.nm{color:var(--text);font-weight:500;}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg3)}
.add-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:13px;color:var(--text3);cursor:pointer;transition:color .15s;border-top:1px solid var(--border);}
.add-btn:hover{color:var(--text2);}
.plus-icon{width:16px;height:16px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;}
.empty{text-align:center;padding:36px;color:var(--text3);font-size:14px;font-family:'DM Mono',monospace;}
.hidden{display:none!important;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FB_CONFIG={apiKey:"AIzaSyBh9LtC02jCwyrURkl676UFxtHU2SdSkkI",authDomain:"ian-dashboard.firebaseapp.com",projectId:"ian-dashboard",storageBucket:"ian-dashboard.firebasestorage.app",messagingSenderId:"47067460467",appId:"1:47067460467:web:37906ad2ddb74133238b06"};
if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);
const db=firebase.firestore();const UID='ian';
async function fbSave(){try{const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)d[k]=localStorage.getItem(k);}await db.collection('data').doc(UID).set(d,{merge:true});}catch(e){console.warn('FB:',e);}}
async function fbSync(cb){try{const doc=await db.collection('data').doc(UID).get();if(doc.exists){Object.entries(doc.data()).forEach(([k,v])=>localStorage.setItem(k,v));}}catch(e){console.warn('FB:',e);}if(cb)cb();}
</script>
</head>
<body>
<div class="nav">
  <div class="nav-left"><a class="nav-back" href="home.html">←</a><div class="nav-logo">DAILY CHECK</div></div>
  <div class="nav-date" id="nav-date"></div>
</div>
<div class="tabs">
  <div class="tab on" onclick="showTab('today')">오늘</div>
  <div class="tab" onclick="showTab('weekly')">주간리뷰</div>
  <div class="tab" onclick="showTab('history')">기록</div>
  <div class="tab" onclick="showTab('monthly')">월간</div>
</div>

<!-- 오늘 탭 -->
<div id="tab-today" class="wrap">
  <div class="routine-box">
    <div class="routine-title">공부 시작 전 루틴</div>
    <div id="routine-list"></div>
  </div>
  <div class="score-row">
    <div class="sc j"><div class="sc-lbl">취업</div><div class="sc-num" id="sc-j">0</div><div class="sc-sub" id="sc-js">0점</div></div>
    <div class="sc e"><div class="sc-lbl">영어</div><div class="sc-num" id="sc-e">0</div><div class="sc-sub" id="sc-es">0점</div></div>
    <div class="sc s"><div class="sc-lbl">주식</div><div class="sc-num" id="sc-s">0</div><div class="sc-sub" id="sc-ss">0점</div></div>
    <div class="sc sp"><div class="sc-lbl">운동</div><div class="sc-num" id="sc-sp">0</div><div class="sc-sub" id="sc-sps">0점</div></div>
  </div>
  <div id="sections-wrap"></div>
  <button class="save-btn" onclick="saveToday()">오늘 기록 저장</button>
  <button class="copy-btn" onclick="copyToday()">복기 텍스트 복사</button>
  <div class="confirm" id="conf-today"></div>
</div>

<!-- 주간 탭 -->
<div id="tab-weekly" class="wrap hidden">
  <div class="week-sel"><span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);">주차:</span><div id="week-btns" style="display:flex;gap:8px;flex-wrap:wrap;"></div></div>
  <div class="week-score-grid">
    <div class="wsc j"><div class="wsc-lbl">취업 평균</div><div class="wsc-val" id="wavg-j">-</div></div>
    <div class="wsc e"><div class="wsc-lbl">영어 평균</div><div class="wsc-val" id="wavg-e">-</div></div>
    <div class="wsc s"><div class="wsc-lbl">주식 평균</div><div class="wsc-val" id="wavg-s">-</div></div>
    <div class="wsc sp"><div class="wsc-lbl">운동 평균</div><div class="wsc-val" id="wavg-sp">-</div></div>
  </div>
  <div class="review-card">
    <div class="review-card-title">주간 회고</div>
    <div class="rev-lbl">잘한 것</div><textarea class="rev-textarea" id="rev-good" rows="2" placeholder="이번 주 잘한 것..."></textarea>
    <div class="rev-lbl">부족했던 것</div><textarea class="rev-textarea" id="rev-bad" rows="2" placeholder="부족했던 점..."></textarea>
    <div class="rev-lbl">다음 주 개선할 것</div><textarea class="rev-textarea" id="rev-improve" rows="2" placeholder="다음 주 개선할 것..."></textarea>
    <div class="rev-lbl">다음 주 목표</div><textarea class="rev-textarea" id="rev-goal" rows="2" placeholder="목표 기록..."></textarea>
  </div>
  <div class="review-card">
    <div class="review-card-title">섹션별 점수 추이 (주간)</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:4px;">취업 · 영어 · 주식 · 운동</div>
    <div class="graph-wrap"><canvas id="graph-scores"></canvas></div>
    <div style="font-size:12px;color:var(--text3);margin:10px 0 4px;">일일 달성률 주평균</div>
    <div class="graph-wrap"><canvas id="graph-check"></canvas></div>
  </div>
  <button class="save-btn" onclick="saveWeekly()">주간 리뷰 저장</button>
  <div class="confirm" id="conf-weekly"></div>
</div>

<!-- 기록 탭 -->
<div id="tab-history" class="wrap hidden"><div id="hist-list"></div></div>

<!-- 월간 탭 -->
<div id="tab-monthly" class="wrap hidden"><div class="mo-grid" id="mo-grid"></div></div>

<!-- 종목 모달 -->
<div class="modal-bg hidden" id="stk-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">종목 추가</div>
    <div class="form-2col"><div class="form-row"><label>종목명</label><input id="f-name" placeholder="삼성전자"></div><div class="form-row"><label>종목코드</label><input id="f-code" placeholder="005930"></div></div>
    <div class="form-2col"><div class="form-row"><label>매수일</label><input id="f-date" type="date"></div><div class="form-row"><label>수량</label><input id="f-qty" type="number"></div></div>
    <div class="form-2col"><div class="form-row"><label>매수가</label><input id="f-buy" type="number"></div><div class="form-row"><label>현재가</label><input id="f-cur" type="number"></div></div>
    <div class="form-2col"><div class="form-row"><label>목표가</label><input id="f-target" type="number"></div><div class="form-row"><label>손절가</label><input id="f-stop" type="number"></div></div>
    <div class="form-row"><label>매수 사유</label><textarea id="f-reason"></textarea></div>
    <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">취소</button><button class="btn-del hidden" id="btn-del" onclick="deleteStock()">삭제</button><button class="btn-save" onclick="saveStock()">저장</button></div>
  </div>
</div>

<script>
const GOALS={4:700000,5:1000000,6:1000000,7:1200000,8:1300000,9:1400000,10:1500000,11:1500000,12:1500000};
const DAYS=['일','월','화','수','목','금','토'];
const MAX_SCORE=5; // 항목당 최대 점수

// 기본 섹션/항목 구조 (수정 가능)
const DEFAULT_SECTIONS=[
  {id:'j',color:'var(--job)',title:'취업 준비',badge:'SK Hynix · Samsung DS',
   items:[
    {lbl:'패키징 공부 / 면접 답변 연습',sub:'1시간 · 취약챕터 or 핵심 프로젝트 반도체 언어 재번역'},
    {lbl:'기술 트렌드 / JD 모니터링',sub:'SK Hynix · Samsung DS 공고 및 IR 확인'},
    {lbl:'면접 예상 질문 1개 답변 정리',sub:'광저우 다크스팟 등 핵심 프로젝트 중심'}
  ]},
  {id:'e',color:'var(--eng)',title:'영어',badge:'',engMode:true,
   items:[
    {lbl:'김재우 소강의 3개 수강',sub:'1시간 · 강의 집중 수강'}
   ]},
  {id:'s',color:'var(--stock)',title:'주식 복기',badge:'',stockMode:true,
   items:[
    {lbl:'시황 복기',sub:'오늘 시장 흐름 + 내일 전략 한 줄'},
    {lbl:'종목 복기',sub:'보유 · 관심 종목 변화 체크'},
    {lbl:'매매 복기',sub:'진입근거 / 결과 / 반성'},
    {lbl:'내일 전략 수립',sub:'관심 종목 · 매매 계획 한 줄'}
   ]},
  {id:'sp',color:'var(--sport)',title:'운동',badge:'헬스(아침) + 러닝(퇴근후)',sportMode:true,
   items:[
    {lbl:'러닝 30분+',sub:'퇴근 후 · 주 2회 목표'}
   ]}
];

let currentWeek='';
let editIdx=-1;

function pad(n){return String(n).padStart(2,'0');}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function weekKey(d=new Date()){const j=new Date(d.getFullYear(),0,1);const w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);return d.getFullYear()+'-W'+pad(w);}
function ls(k){return localStorage.getItem(k);}
function lss(k,v){localStorage.setItem(k,v);}
function getSections(){return JSON.parse(ls('checklist_sections')||JSON.stringify(DEFAULT_SECTIONS));}
function saveSections(s){lss('checklist_sections',JSON.stringify(s));}
function getState(){return JSON.parse(ls('smart_day_'+todayKey())||'null');}
function getLectureNum(){return parseInt(ls('smart_lecture')||'34');}

// 상태: {scores:{j:[5,0,3],e:[5],s:[5,5,0,5],sp:[5]}, engDay:'lec', lectureNum:34, stockActual:0, weekDots:[...], routine:[...]}
let S={};

function initState(){
  const saved=getState();
  const secs=getSections();
  S={
    scores:{},
    engDay: saved?.engDay||'lec',
    lectureNum: saved?.lectureNum||getLectureNum(),
    stockActual: saved?.stockActual||0,
    weekDots: saved?.weekDots||[false,false,false,false,false,false],
    routine: saved?.routine||[false,false,false]
  };
  secs.forEach(sec=>{
    const cnt=sec.items.length;
    const saved_sec=saved?.scores?.[sec.id];
    if(saved_sec){
      // 기존 데이터 최대한 보존 - 길이 달라도 앞부분은 유지
      const arr=new Array(cnt).fill(0);
      for(let i=0;i<Math.min(saved_sec.length,cnt);i++) arr[i]=saved_sec[i]||0;
      S.scores[sec.id]=arr;
    } else {
      S.scores[sec.id]=new Array(cnt).fill(0);
    }
  });
}

function autoSave(){
  lss('smart_day_'+todayKey(),JSON.stringify(S));
  lss('smart_lecture',S.lectureNum);
  fbSave();
}

// 렌더링
function renderAll(){
  renderRoutine();
  renderSections();
  updateSummary();
}

function renderRoutine(){
  const routineItems=['Nuclear Blocker ON','폰 뒤집어놓기','타이머 설정'];
  document.getElementById('routine-list').innerHTML=routineItems.map((lbl,i)=>`
    <div class="rtrow" onclick="toggleRoutine(${i})">
      <div class="cb cb-r ${S.routine[i]?'on':''}" id="rcb${i}"></div>
      <span class="r-lbl ${S.routine[i]?'done':''}" id="rlbl${i}">${lbl}</span>
    </div>`).join('');
}

function renderSections(){
  const secs=getSections();
  const wrap=document.getElementById('sections-wrap');
  wrap.innerHTML=secs.map((sec,si)=>{
    const scores=S.scores[sec.id]||[];
    const total=scores.reduce((a,b)=>a+b,0);
    const maxTotal=sec.items.length*MAX_SCORE;
    const pct=maxTotal?Math.round(total/maxTotal*100):0;

    const extraHtml=sec.engMode?`
      <div class="extra" style="padding-bottom:6px;">
        <div class="tog-row">
          <span class="tog-lbl">오늘:</span>
          <button class="tog-btn ${S.engDay==='lec'?'on':''}" id="btn-lec" onclick="setEngDay('lec')">강의 수강</button>
          <button class="tog-btn ${S.engDay==='rev'?'on':''}" id="btn-rev" onclick="setEngDay('rev')">필기 + 복습</button>
        </div>
        <div class="prog-lbl">진도: <span id="lec-now">${S.lectureNum}</span> / 100강</div>
      </div>`:
    sec.stockMode?`
      <div class="extra">
        <div class="si-row"><label>이번 달 실현손익</label><input type="number" id="actual" value="${S.stockActual||''}" placeholder="0" oninput="updateStockBar()"><span class="u">원</span></div>
        <div class="goal-row"><span id="goal-lbl">-</span><span id="goal-pct">0%</span></div>
        <div class="prog"><div class="prog-f" style="background:var(--stock);width:0%" id="bar-sg"></div></div>
      </div>`:
    sec.sportMode?`
      <div class="extra">
        <div class="wd-row"><span class="wd-lbl">이번주 헬스</span>
          ${['월','화','수','목','금','토'].map((d,i)=>`<div class="wd ${S.weekDots[i]?'on':''}" id="wd${i}" onclick="toggleWd(${i})">${d}</div>`).join('')}
        </div>
      </div>`:'';

    return `<div class="sec" id="sec-${sec.id}">
      <div class="sec-head">
        <div class="sec-left">
          <div class="sec-bar" style="background:${sec.color}"></div>
          <div class="sec-title" style="color:${sec.color}">${sec.title}</div>
          ${sec.badge?`<div class="sec-badge">${sec.badge}</div>`:''}
        </div>
        <div class="sec-pct" id="pct-${sec.id}">${total}/${maxTotal}점</div>
      </div>
      <div class="prog"><div class="prog-f" style="background:${sec.color};width:${pct}%" id="bar-${sec.id}"></div></div>
      <div class="tasks" id="tasks-${sec.id}">
        ${sec.items.map((item,ii)=>{
          const score=scores[ii]||0;
          const done=score>0;
          return `<div class="trow">
            <div class="cb cb-${sec.id} ${done?'on':''}" onclick="toggleItem(${si},${ii})"></div>
            <div class="t-content">
              <div class="t-lbl ${done?'done':''}">
                <input value="${item.lbl}" onblur="editItemLbl(${si},${ii},this.value)" onclick="event.stopPropagation()" placeholder="항목명...">
              </div>
              <div class="t-sub">
                <input value="${item.sub||''}" onblur="editItemSub(${si},${ii},this.value)" onclick="event.stopPropagation()" placeholder="설명...">
              </div>
            </div>
            <div class="score-input">
              <input type="number" min="0" max="5" value="${score||''}" placeholder="0"
                onchange="setScore(${si},${ii},this.value)"
                onclick="event.stopPropagation()"
                style="border-color:${score>0?(score>=4?sec.color:'var(--border2)'):'var(--border2)'}">
              <span class="score-max">/5</span>
            </div>
            <span class="item-del" onclick="deleteItem(${si},${ii})" title="항목 삭제">×</span>
          </div>`;
        }).join('')}
      </div>
      <div class="add-item-btn" onclick="addItem(${si})">
        <span style="font-size:16px;">+</span> 항목 추가
      </div>
      ${extraHtml}
    </div>`;
  }).join('');

  // 사후 처리
  updateStockBar();
}

function updateSummary(){
  const secs=getSections();
  secs.forEach(sec=>{
    const scores=S.scores[sec.id]||[];
    const total=scores.reduce((a,b)=>a+b,0);
    const maxTotal=sec.items.length*MAX_SCORE;
    const pct=maxTotal?Math.round(total/maxTotal*100):0;
    const el=document.getElementById('sc-'+sec.id);
    const sub=document.getElementById('sc-'+sec.id+'s');
    if(el)el.textContent=total;
    if(sub)sub.textContent=maxTotal+'점 만점';
    const pctEl=document.getElementById('pct-'+sec.id);
    const barEl=document.getElementById('bar-'+sec.id);
    if(pctEl)pctEl.textContent=total+'/'+maxTotal+'점';
    if(barEl)barEl.style.width=pct+'%';
  });
}

// 이벤트 핸들러
function toggleRoutine(i){
  S.routine[i]=!S.routine[i];
  const cb=document.getElementById('rcb'+i);
  const lbl=document.getElementById('rlbl'+i);
  if(cb)cb.classList.toggle('on',S.routine[i]);
  if(lbl)lbl.classList.toggle('done',S.routine[i]);
  autoSave();
}

function toggleItem(si,ii){
  const secs=getSections();
  if(!S.scores[secs[si].id])S.scores[secs[si].id]=new Array(secs[si].items.length).fill(0);
  const cur=S.scores[secs[si].id][ii]||0;
  // 체크하면 5점, 이미 점수있으면 0으로
  S.scores[secs[si].id][ii]=cur>0?0:MAX_SCORE;
  autoSave();renderSections();updateSummary();
}

function setScore(si,ii,val){
  const secs=getSections();
  const v=Math.min(MAX_SCORE,Math.max(0,parseFloat(val)||0));
  if(!S.scores[secs[si].id])S.scores[secs[si].id]=new Array(secs[si].items.length).fill(0);
  S.scores[secs[si].id][ii]=v;
  autoSave();updateSummary();
  // 체크박스 상태 업데이트
  renderSections();
}

function editItemLbl(si,ii,val){
  const secs=getSections();
  secs[si].items[ii].lbl=val;
  saveSections(secs);
}
function editItemSub(si,ii,val){
  const secs=getSections();
  secs[si].items[ii].sub=val;
  saveSections(secs);
}

function addItem(si){
  const secs=getSections();
  secs[si].items.push({lbl:'새 항목',sub:''});
  saveSections(secs);
  S.scores[secs[si].id].push(0);
  autoSave();renderSections();updateSummary();
}

function deleteItem(si,ii){
  const secs=getSections();
  if(secs[si].items.length<=1){alert('최소 1개 항목은 있어야 해요');return;}
  if(!confirm('항목을 삭제할까요?'))return;
  secs[si].items.splice(ii,1);
  saveSections(secs);
  S.scores[secs[si].id].splice(ii,1);
  autoSave();renderSections();updateSummary();
}

function setEngDay(d){
  S.engDay=d;
  const secs=getSections();
  const eSi=secs.findIndex(s=>s.engMode);
  if(eSi>=0){
    S.scores[secs[eSi].id]=[0];
    if(d==='lec'){secs[eSi].items[0]={lbl:'김재우 소강의 3개 수강',sub:'1시간 · 강의 집중 수강'};}
    else{secs[eSi].items[0]={lbl:'전날 강의 필기 + 복습',sub:'1시간 · 암기 + 섀도잉'};}
    saveSections(secs);
  }
  autoSave();renderSections();updateSummary();
}

function toggleWd(i){
  S.weekDots[i]=!S.weekDots[i];
  document.getElementById('wd'+i)?.classList.toggle('on',S.weekDots[i]);
  autoSave();
}

function updateStockBar(){
  const el=document.getElementById('actual');
  if(!el)return;
  const v=parseInt(el.value)||0;S.stockActual=v;
  const m=new Date().getMonth()+1,g=GOALS[m]||1000000,p=Math.min(100,Math.round(v/g*100));
  const barEl=document.getElementById('bar-sg');
  const pctEl=document.getElementById('goal-pct');
  const lblEl=document.getElementById('goal-lbl');
  if(barEl)barEl.style.width=p+'%';
  if(pctEl)pctEl.textContent=p+'%';
  if(lblEl)lblEl.textContent=m+'월 목표: '+g.toLocaleString('ko-KR')+'원';
  autoSave();
}

function saveToday(){
  const hist=JSON.parse(ls('smart_history')||'[]'),key=todayKey();
  const idx=hist.findIndex(h=>h.date===key);
  const secs=getSections();
  const allScores=secs.flatMap(sec=>S.scores[sec.id]||[]);
  const maxAll=secs.reduce((a,sec)=>a+sec.items.length*MAX_SCORE,0);
  const totalAll=allScores.reduce((a,b)=>a+b,0);
  const entry={
    date:key,week:weekKey(),
    scores:{...S.scores},
    stockActual:S.stockActual,
    lectureNum:S.lectureNum,
    overall:maxAll?Math.round(totalAll/maxAll*100):0,
    totalScore:totalAll,maxScore:maxAll,
    // 하위호환
    j:secs.find(s=>s.id==='j')?.items.map((_,i)=>(S.scores.j?.[i]||0)>0)||[],
    e:secs.find(s=>s.id==='e')?.items.map((_,i)=>(S.scores.e?.[i]||0)>0)||[],
    s:secs.find(s=>s.id==='s')?.items.map((_,i)=>(S.scores.s?.[i]||0)>0)||[],
    sp:secs.find(s=>s.id==='sp')?.items.map((_,i)=>(S.scores.sp?.[i]||0)>0)||[],
  };
  if(idx>=0)hist[idx]=entry;else hist.unshift(entry);
  lss('smart_history',JSON.stringify(hist));fbSave();
  const b=document.querySelector('#tab-today .save-btn');
  b.textContent='저장 완료!';setTimeout(()=>b.textContent='오늘 기록 저장',2000);
}

function copyToday(){
  const secs=getSections();
  const d=new Date(),ds=d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate());
  let t=`[${ds}] 일일 체크\n\n`;
  secs.forEach(sec=>{
    const scores=S.scores[sec.id]||[];
    const total=scores.reduce((a,b)=>a+b,0);
    const max=sec.items.length*MAX_SCORE;
    t+=`[${sec.title}] ${total}/${max}점\n`;
    sec.items.forEach((item,i)=>{
      const sc=scores[i]||0;
      t+=`  ${sc>0?'✓':'✗'} ${item.lbl}${sc>0&&sc<MAX_SCORE?' ('+sc+'점)':''}\n`;
    });
    t+='\n';
  });
  t+=`실현손익: ${(S.stockActual||0).toLocaleString('ko-KR')}원`;
  navigator.clipboard.writeText(t).then(()=>{
    const el=document.getElementById('conf-today');
    el.textContent='복사 완료!';setTimeout(()=>el.textContent='',2500);
  });
}

// 주간
function initWeekBtns(){
  const container=document.getElementById('week-btns');
  const now=new Date(),wks=[];
  for(let i=5;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);wks.push(weekKey(d));}
  const unique=[...new Set(wks)];currentWeek=weekKey();
  container.innerHTML=unique.map(w=>`<button class="week-btn${w===currentWeek?' on':''}" onclick="selectWeek('${w}')">${w}</button>`).join('');
  loadWeeklyData(currentWeek);
}

function selectWeek(w){
  currentWeek=w;
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.toggle('on',b.textContent.trim()===w));
  loadWeeklyData(w);
}

function loadWeeklyData(w){
  const hist=JSON.parse(ls('smart_history')||'[]');
  const weekEntries=hist.filter(h=>h.week===w);
  const secs=getSections();

  // 주간 평균 점수 계산
  ['j','e','s','sp'].forEach(id=>{
    const el=document.getElementById('wavg-'+id);if(!el)return;
    const sec=secs.find(s=>s.id===id);if(!sec)return;
    const maxPer=sec.items.length*MAX_SCORE;
    if(!weekEntries.length){el.textContent='-';return;}
    const avg=weekEntries.reduce((a,h)=>{
      const scores=h.scores?.[id]||[];
      const total=scores.reduce((x,y)=>x+y,0);
      return a+total;
    },0)/weekEntries.length;
    el.textContent=(avg/maxPer*100).toFixed(0)+'%';
  });

  const data=JSON.parse(ls('smart_weekly_'+w)||'{}');
  ['good','bad','improve','goal'].forEach(k=>{
    const el=document.getElementById('rev-'+k);if(el)el.value=data[k]||'';
  });
  renderWeeklyGraphs();
}

function saveWeekly(){
  const data={good:document.getElementById('rev-good').value,bad:document.getElementById('rev-bad').value,improve:document.getElementById('rev-improve').value,goal:document.getElementById('rev-goal').value};
  lss('smart_weekly_'+currentWeek,JSON.stringify(data));fbSave();
  renderWeeklyGraphs();
  const b=document.querySelector('#tab-weekly .save-btn');
  b.textContent='저장 완료!';setTimeout(()=>b.textContent='주간 리뷰 저장',2000);
}

function renderWeeklyGraphs(){
  const now=new Date(),wks=[];
  for(let i=5;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);wks.push(weekKey(d));}
  const unique=[...new Set(wks)];
  const hist=JSON.parse(ls('smart_history')||'[]');
  const secs=getSections();

  // 섹션별 점수 추이 (멀티라인)
  drawMultiGraph('graph-scores',unique,[
    {color:'var(--job)',data:unique.map(w=>{const es=hist.filter(h=>h.week===w);if(!es.length)return 0;const sec=secs.find(s=>s.id==='j');const max=sec?sec.items.length*MAX_SCORE:1;return Math.round(es.reduce((a,h)=>{const sc=h.scores?.j||[];return a+sc.reduce((x,y)=>x+y,0);},0)/es.length/max*100);})},
    {color:'var(--eng)',data:unique.map(w=>{const es=hist.filter(h=>h.week===w);if(!es.length)return 0;const sec=secs.find(s=>s.id==='e');const max=sec?sec.items.length*MAX_SCORE:1;return Math.round(es.reduce((a,h)=>{const sc=h.scores?.e||[];return a+sc.reduce((x,y)=>x+y,0);},0)/es.length/max*100);})},
    {color:'var(--stock)',data:unique.map(w=>{const es=hist.filter(h=>h.week===w);if(!es.length)return 0;const sec=secs.find(s=>s.id==='s');const max=sec?sec.items.length*MAX_SCORE:1;return Math.round(es.reduce((a,h)=>{const sc=h.scores?.s||[];return a+sc.reduce((x,y)=>x+y,0);},0)/es.length/max*100);})},
    {color:'var(--sport)',data:unique.map(w=>{const es=hist.filter(h=>h.week===w);if(!es.length)return 0;const sec=secs.find(s=>s.id==='sp');const max=sec?sec.items.length*MAX_SCORE:1;return Math.round(es.reduce((a,h)=>{const sc=h.scores?.sp||[];return a+sc.reduce((x,y)=>x+y,0);},0)/es.length/max*100);})}
  ]);
  drawGraph('graph-check',unique,unique.map(w=>{const es=hist.filter(h=>h.week===w);return es.length?Math.round(es.reduce((a,b)=>a+(b.overall||0),0)/es.length):0;}),'#fbbf24');
}

function drawGraph(id,labels,data,color){
  const canvas=document.getElementById(id);if(!canvas)return;
  const W=canvas.parentElement.offsetWidth||300,H=120;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  const p={l:30,r:10,t:10,b:24},cW=W-p.l-p.r,cH=H-p.t-p.b;
  [0,50,100].forEach(v=>{const y=p.t+cH-(v/100*cH);ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='10px monospace';ctx.textAlign='right';ctx.fillText(v,p.l-4,y+3);});
  if(data.length<2)return;
  const step=cW/(data.length-1);
  ctx.beginPath();data.forEach((v,i)=>{const x=p.l+i*step,y=p.t+cH-(v/100*cH);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  data.forEach((v,i)=>{const x=p.l+i*step,y=p.t+cH-(v/100*cH);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('W'+(labels[i].split('-W')[1]||''),x,H-5);});
}

function drawMultiGraph(id,labels,lines){
  const canvas=document.getElementById(id);if(!canvas)return;
  const W=canvas.parentElement.offsetWidth||300,H=120;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  const p={l:30,r:10,t:10,b:24},cW=W-p.l-p.r,cH=H-p.t-p.b;
  [0,50,100].forEach(v=>{const y=p.t+cH-(v/100*cH);ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='10px monospace';ctx.textAlign='right';ctx.fillText(v,p.l-4,y+3);});
  if(labels.length<2)return;
  const step=cW/(labels.length-1);
  lines.forEach(({color,data})=>{
    ctx.beginPath();data.forEach((v,i)=>{const x=p.l+i*step,y=p.t+cH-(v/100*cH);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
    data.forEach((v,i)=>{const x=p.l+i*step,y=p.t+cH-(v/100*cH);ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
  });
  labels.forEach((w,i)=>{const x=p.l+i*step;ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('W'+(w.split('-W')[1]||''),x,H-5);});
}

function renderHistory(){
  const hist=JSON.parse(ls('smart_history')||'[]');
  const el=document.getElementById('hist-list');
  const secs=getSections();
  if(!hist.length){el.innerHTML='<div class="empty">저장된 기록이 없어요</div>';return;}
  el.innerHTML=hist.map(h=>{
    const sc=h.scores||{};
    const scoreStr=['j','e','s','sp'].map(id=>{
      const sec=secs.find(s=>s.id===id);if(!sec)return '';
      const scores=sc[id]||[];
      const total=scores.reduce((a,b)=>a+b,0);
      const max=sec.items.length*MAX_SCORE;
      const colors={j:'var(--job)',e:'var(--eng)',s:'var(--stock)',sp:'var(--sport)'};
      return `<span class="hist-sc" style="color:${colors[id]}">${sec.title.slice(0,2)} ${total}/${max}</span>`;
    }).join(' ');
    return `<div class="hist-item">
      <div class="hist-date">${h.date} · 전체 ${h.overall||0}% · ${scoreStr}</div>
      <div class="hist-bars">${['j','e','s','sp'].map(id=>{
        const sec=secs.find(s=>s.id===id);if(!sec)return '';
        const scores=sc[id]||[];
        const total=scores.reduce((a,b)=>a+b,0);
        const max=sec.items.length*MAX_SCORE;
        const pct=max?Math.round(total/max*100):0;
        const colors={j:'var(--job)',e:'var(--eng)',s:'var(--stock)',sp:'var(--sport)'};
        return `<div class="hbar-row"><div class="hbar-lbl">${sec.title.slice(0,2)}</div><div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${colors[id]}"></div></div><div class="hbar-pct">${pct}%</div></div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function renderMonthly(){
  const hist=JSON.parse(ls('smart_history')||'[]');
  const el=document.getElementById('mo-grid');if(!el)return;
  const cur=new Date().getMonth()+1;
  el.innerHTML=[4,5,6,7,8,9,10,11,12].map(m=>{
    const g=GOALS[m]||0,entries=hist.filter(h=>parseInt(h.date.split('-')[1])===m);
    const last=entries[0],actual=last?(last.stockActual||0):null;
    const pct=actual!==null?Math.min(100,Math.round(actual/g*100)):0;
    return `<div class="mo-card${m===cur?' cur':''}"><div class="mo-month">${m}월${m===cur?' ●':''}</div><div class="mo-val ${actual<0?'neg':''}">${actual!==null?(actual>=0?'+':'')+actual.toLocaleString('ko-KR'):'-'}</div><div class="mo-goal">목표 ${(g/10000).toFixed(0)}만</div><div class="mo-pbar"><div class="mo-pfill" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

function getStocks(){return JSON.parse(ls('smart_stocks')||'[]');}
function saveStocks(a){lss('smart_stocks',JSON.stringify(a));}
let editStockIdx=-1;
function openModal(i=-1){editStockIdx=i;const arr=getStocks();document.getElementById('modal-title').textContent=i>=0?'종목 편집':'종목 추가';document.getElementById('btn-del').classList.toggle('hidden',i<0);['name','code','date','buy','cur','qty','target','stop','reason'].forEach(f=>document.getElementById('f-'+f).value=i>=0?(arr[i][f]||''):'');document.getElementById('stk-modal').classList.remove('hidden');}
function closeModal(){document.getElementById('stk-modal').classList.add('hidden');}
function saveStock(){const arr=getStocks();const obj={};['name','code','date','buy','cur','qty','target','stop','reason'].forEach(f=>obj[f]=document.getElementById('f-'+f).value);if(editStockIdx>=0)arr[editStockIdx]=obj;else arr.push(obj);saveStocks(arr);closeModal();}
function deleteStock(){if(!confirm('삭제?'))return;const arr=getStocks();arr.splice(editStockIdx,1);saveStocks(arr);closeModal();}

function showTab(t){
  ['today','weekly','history','monthly'].forEach((id,i)=>{
    document.getElementById('tab-'+id).classList.toggle('hidden',id!==t);
    document.querySelectorAll('.tab')[i].classList.toggle('on',id===t);
  });
  if(t==='weekly')initWeekBtns();
  if(t==='history')renderHistory();
  if(t==='monthly')renderMonthly();
}

  const hist=JSON.parse(localStorage.getItem('smart_history')||'[]');
  hist.forEach(h=>{

    if(!h.scores&&(h.j||h.e||h.s||h.sp)){
      h.scores={
        j:(h.j||[]).map(v=>v?5:0),

        s:(h.s||[]).map(v=>v?5:0),
        sp:(h.sp||[]).map(v=>v?5:0)
      };
    }
  });
  localStorage.setItem('smart_history',JSON.stringify(hist));
  initState();renderAll();
});
