<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FB_CONFIG={apiKey:"AIzaSyBh9LtC02jCwyrURkl676UFxtHU2SdSkkI",authDomain:"ian-dashboard.firebaseapp.com",projectId:"ian-dashboard",storageBucket:"ian-dashboard.firebasestorage.app",messagingSenderId:"47067460467",appId:"1:47067460467:web:37906ad2ddb74133238b06"};
if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);
const db=firebase.firestore();const UID='ian';
async function fbSave(){try{const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)d[k]=localStorage.getItem(k);}await db.collection('data').doc(UID).set(d,{merge:true});}catch(e){console.warn('FB:',e);}}
async function fbSync(cb){try{const doc=await db.collection('data').doc(UID).get();if(doc.exists){Object.entries(doc.data()).forEach(([k,v])=>localStorage.setItem(k,v));}}catch(e){console.warn('FB:',e);}if(cb)cb();}
</script>
<style>
:root{--bg:#0c0c0e;--bg2:#141416;--bg3:#1c1c1f;--border:rgba(255,255,255,0.2);--border2:rgba(255,255,255,0.3);--text:#f0f0f0;--text2:#ccc;--text3:#999;--stock:#fbbf24;--pos:#34d399;--neg:#fb7185;--r:10px;--r-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-back{font-size:22px;color:var(--text2);text-decoration:none;}
.nav-logo{font-family:'DM Mono',monospace;font-size:15px;color:var(--text2);}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border);}
.tab{font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);padding:13px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;}
.tab:hover{color:var(--text2);}
.tab.on{color:var(--text);border-bottom-color:var(--stock);}
.toolbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.btn{font-size:14px;padding:8px 15px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--stock);color:var(--stock);}
.btn.primary{border-color:var(--stock);color:var(--stock);}
.confirm-bar{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);padding:7px 20px;min-height:30px;}
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:16px 20px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px;}
.stat-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.stat-val{font-family:'DM Mono',monospace;font-size:19px;font-weight:500;color:var(--stock);}
.stat-val.pos{color:var(--pos)}.stat-val.neg{color:var(--neg)}
.rule-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:18px;margin:16px 20px;}
.rule-title{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
.rule-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.rule-item:last-child{border-bottom:none;padding-bottom:0;}
.rule-num{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--neg);width:24px;flex-shrink:0;}
.rule-q{font-size:16px;font-weight:500;color:var(--text);}
.rule-a{font-size:14px;color:var(--text3);margin-top:3px;}
.sec-title{font-size:16px;font-weight:600;color:var(--stock);padding:14px 20px 0;}
.form-wrap{padding:14px 20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fr label{font-size:14px;color:var(--text2);display:block;margin-bottom:6px;}
.fr input,.fr textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:15px;padding:10px 12px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;}
.fr input:focus,.fr textarea:focus{border-color:var(--stock);}
.fr textarea{resize:none;height:76px;}
.fr-full{grid-column:1/-1;}
.yn-row{display:flex;gap:8px;}
.yn-btn{flex:1;padding:10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:15px;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;text-align:center;}
.yn-btn.yes.on{background:var(--pos);border-color:var(--pos);color:#fff;}
.yn-btn.no.on{background:var(--neg);border-color:var(--neg);color:#fff;}
.save-btn{display:block;width:calc(100% - 40px);margin:0 20px 18px;padding:13px;font-size:15px;font-family:'DM Mono',monospace;letter-spacing:.04em;border:1px solid var(--stock);border-radius:var(--r-sm);background:transparent;color:var(--stock);cursor:pointer;transition:all .15s;}
.save-btn:hover{background:var(--stock);color:#0c0c0e;}
.tbl-outer{overflow-x:auto;padding:0 20px 20px;}
.resizable-table{width:max-content;min-width:100%;border-collapse:collapse;table-layout:fixed;}
.resizable-table th{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);padding:10px 12px;border:2px solid var(--border2);background:var(--bg2);text-align:left;white-space:nowrap;position:relative;user-select:none;}
.th-content{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.th-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;}
.resizer{width:5px;height:100%;position:absolute;right:0;top:0;cursor:col-resize;background:transparent;z-index:1;}
.resizer:hover{background:var(--stock);}
.resizable-table td{padding:0;border:2px solid var(--border2);vertical-align:middle;overflow:hidden;}
.resizable-table td input{width:100%;background:transparent;border:none;color:var(--text);font-size:14px;padding:9px 11px;font-family:'Noto Sans KR',sans-serif;outline:none;box-sizing:border-box;}
.resizable-table td input:focus{background:rgba(251,191,36,0.05);}
td.pos-c{color:var(--pos);font-weight:500;padding:9px 11px;font-family:'DM Mono',monospace;text-align:center;white-space:nowrap;font-size:14px;}
td.neg-c{color:var(--neg);font-weight:500;padding:9px 11px;font-family:'DM Mono',monospace;text-align:center;white-space:nowrap;font-size:14px;}
td.muted-c{color:var(--stock);padding:9px 11px;font-family:'DM Mono',monospace;text-align:center;white-space:nowrap;font-size:14px;}
td.center-c{padding:9px 11px;text-align:center;color:var(--text2);font-size:14px;}
.resizable-table tr:hover td{background:rgba(255,255,255,0.02);}
.del-btn{font-size:12px;color:var(--text3);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;transition:all .15s;}
.del-btn:hover{border-color:var(--neg);color:var(--neg);}
.add-row-btn{width:100%;padding:12px;font-size:14px;font-family:'DM Mono',monospace;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.add-row-btn:hover{border-color:var(--stock);color:var(--stock);}
.empty-msg{text-align:center;padding:40px;color:var(--text3);font-size:15px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-left"><a class="nav-back" href="home.html">←</a><div class="nav-logo">TRADE LOG</div></div>
</div>
<div class="tabs">
  <div class="tab on" id="tab-btn-table" onclick="showTab('table')">누적 테이블</div>
  <div class="tab" id="tab-btn-write" onclick="showTab('write')">새 매매 입력</div>
</div>
<div class="toolbar">
  <button class="btn primary" onclick="addRow()">+ 행 추가</button>
  <button class="btn" onclick="addCol()">+ 열 추가</button>
  <div style="width:1px;height:22px;background:var(--border2);flex-shrink:0;"></div>
  <label class="btn" style="cursor:pointer;border-color:var(--eng,#34d399);color:var(--eng,#34d399);">📂 키움 엑셀<input type="file" accept=".xlsx,.xls" style="display:none;" onchange="importKiwoom(this)"></label>
  <label class="btn" style="cursor:pointer;">📂 일반 추가<input type="file" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(this,'append')"></label>
  <label class="btn" style="cursor:pointer;">📂 덮어쓰기<input type="file" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(this,'overwrite')"></label>
  <button class="btn" onclick="exportExcel()">⬇ 다운로드</button>
</div>
<div class="confirm-bar" id="confirm-bar"></div>

<div id="pane-table">
  <div class="stat-row">
    <div class="stat"><div class="stat-lbl">총매매</div><div class="stat-val" id="st-total">0</div></div>
    <div class="stat"><div class="stat-lbl">승률</div><div class="stat-val" id="st-wr">-</div></div>
    <div class="stat"><div class="stat-lbl">평균수익률</div><div class="stat-val pos" id="st-avg">-</div></div>
    <div class="stat"><div class="stat-lbl">총실현손익</div><div class="stat-val" id="st-pl">-</div></div>
    <div class="stat"><div class="stat-lbl">뇌동횟수</div><div class="stat-val neg" id="st-bd">0</div></div>
  </div>
  <div class="tbl-outer">
    <table class="resizable-table" id="trade-table">
      <thead id="trade-thead"></thead>
      <tbody id="trade-tbody"></tbody>
    </table>
    <button class="add-row-btn" onclick="addRow()">+ 행 추가</button>
    <div id="trade-empty" class="empty-msg" style="display:none;">매매 기록이 없어요</div>
  </div>
</div>

<div id="pane-write" style="display:none;">
  <div class="rule-card">
    <div class="rule-title">매수 전 필수 확인</div>
    <div class="rule-item"><div class="rule-num">①</div><div><div class="rule-q">손절가를 정했는가?</div><div class="rule-a">No → 매매 금지</div></div></div>
    <div class="rule-item"><div class="rule-num">②</div><div><div class="rule-q">뇌동매매인가?</div><div class="rule-a">Yes → 매매 금지</div></div></div>
    <div class="rule-item" style="border-bottom:none;padding-bottom:0;"><div class="rule-num" style="color:var(--stock)">⏰</div><div><div class="rule-q">매매 시간을 지켰는가?</div><div class="rule-a">장 시작 전 또는 점심시간에만</div></div></div>
  </div>
  <div class="sec-title">새 매매 기록</div>
  <div class="form-wrap">
    <div class="form-grid">
      <div class="fr"><label>날짜</label><input id="f-date" type="date"></div>
      <div class="fr"><label>종목명</label><input id="f-name" placeholder="삼성전자"></div>
      <div class="fr"><label>수량</label><input id="f-qty" type="number" placeholder="10"></div>
      <div class="fr"><label>매수가 (원)</label><input id="f-buy" type="number"></div>
      <div class="fr"><label>매도가 (원)</label><input id="f-sell" type="number" placeholder="매도 후 입력"></div>
      <div class="fr"><label>목표가 (원)</label><input id="f-target" type="number"></div>
      <div class="fr"><label>손절가 (원)</label><input id="f-stop" type="number"></div>
      <div class="fr"><label>지수 상태</label><input id="f-index" placeholder="매수가능/급락중/변동성큼"></div>
      <div class="fr fr-full"><label>차트패턴</label><input id="f-chart" placeholder="눌림목 / 돌파 / 횡보 이탈 등"></div>
      <div class="fr fr-full"><label>재료</label><textarea id="f-material" placeholder="재료 강도와 지속성..."></textarea></div>
      <div class="fr fr-full"><label>수급</label><input id="f-supply" placeholder="기관/외인/개인 방향, 거래량"></div>
      <div class="fr fr-full"><label>매수 사유 (종합)</label><textarea id="f-reason" placeholder="위 3가지 종합 한 줄..."></textarea></div>
      <div class="fr fr-full"><label>예상 시나리오</label><input id="f-scenario" placeholder="기대 흐름 · 언제/얼마까지"></div>
      <div class="fr fr-full"><label>급락 시 대응</label><input id="f-defense" placeholder="추가매수 / 손절 / 홀딩 기준"></div>
      <div class="fr"><label>뇌동 아닌가?</label><div class="yn-row"><button class="yn-btn yes on" id="yn-yes" onclick="setYN(true)">정상 ✓</button><button class="yn-btn no" id="yn-no" onclick="setYN(false)">뇌동 ✗</button></div></div>
    </div>
  </div>
  <button class="save-btn" onclick="addTradeFromForm()">매매 기록 저장 → 테이블에 추가</button>
</div>

<script>
const DEFAULT_COLS=['날짜','종목','수량','매수가','매도가','수익률(%)','실현손익','정상/뇌동','차트패턴','재료','수급','매수사유','시나리오','급락대응'];
const FIXED_COLS=['날짜','종목','수량','매수가','매도가','수익률(%)','실현손익'];
const COL_W={날짜:110,종목:110,수량:75,매수가:120,매도가:120,'수익률(%)':100,실현손익:130,'정상/뇌동':90,차트패턴:160,재료:200,수급:160,매수사유:200,시나리오:180,급락대응:160};

// 키움 엑셀 컬럼 매핑
const KIWOOM_MAP={'일자':'날짜','종목명':'종목','수량':'수량','매입가':'매수가','매도체결가':'매도가','실현손익':'실현손익','수익률':'수익률(%)'};

let isNormal=true;
function pad(n){return String(n).padStart(2,'0');}
function ls(k){return localStorage.getItem(k);}
function lss(k,v){localStorage.setItem(k,v);}
function showConfirm(msg){const el=document.getElementById('confirm-bar');el.textContent=msg;setTimeout(()=>el.textContent='',3000);}
function fmtN(v,isFloat=false){const n=parseFloat(String(v||'').replace(/,/g,''));if(isNaN(n))return v;return isFloat?n.toLocaleString('ko-KR',{maximumFractionDigits:4}):Math.round(n).toLocaleString('ko-KR');}
function cleanN(v){return String(v||'').replace(/,/g,'');}
function getData(){return JSON.parse(ls('trade_tbl')||JSON.stringify({cols:[...DEFAULT_COLS],rows:[],colWidths:{}}));}
function saveData(d){lss('trade_tbl',JSON.stringify(d));fbSave();}
function getW(){return JSON.parse(ls('trade_col_w')||'{}');}
function saveW(w){lss('trade_col_w',JSON.stringify(w));}

function setYN(v){isNormal=v;document.getElementById('yn-yes').classList.toggle('on',v);document.getElementById('yn-no').classList.toggle('on',!v);}

function calcRow(row){
  const buy=parseFloat(cleanN(row['매수가']))||0;
  const sell=parseFloat(cleanN(row['매도가']))||0;
  const qty=parseFloat(cleanN(row['수량']))||0;
  // 수익률과 실현손익 중 하나라도 없으면 계산
  if(buy&&sell){
    if(!row['수익률(%)']||row['수익률(%)']==='진행중'){
      row['수익률(%)']=((sell-buy)/buy*100).toFixed(2);
    }
    if((!row['실현손익']||row['실현손익']==='')&&qty){
      row['실현손익']=Math.round((sell-buy)*qty).toString();
    }
  } else if(buy&&!sell){
    row['수익률(%)']='';
    row['실현손익']='';
  }
  return row;
}

function addTradeFromForm(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('종목명을 입력해주세요.');return;}
  const data=getData();
  const row={};data.cols.forEach(c=>row[c]='');
  row['날짜']=document.getElementById('f-date').value;
  row['종목']=name;
  row['수량']=document.getElementById('f-qty').value;
  row['매수가']=document.getElementById('f-buy').value;
  row['매도가']=document.getElementById('f-sell').value;
  row['목표가']=document.getElementById('f-target').value;
  row['손절가']=document.getElementById('f-stop').value;
  row['지수']=document.getElementById('f-index').value;
  row['차트패턴']=document.getElementById('f-chart').value;
  row['재료']=document.getElementById('f-material').value;
  row['수급']=document.getElementById('f-supply').value;
  row['매수사유']=document.getElementById('f-reason').value;
  row['시나리오']=document.getElementById('f-scenario').value;
  row['급락대응']=document.getElementById('f-defense').value;
  row['정상/뇌동']=isNormal?'정상':'뇌동';
  calcRow(row);
  data.rows.unshift(row);saveData(data);clearForm();renderTable();renderStats();
  showConfirm('저장 완료!');showTab('table');
}

function clearForm(){
  ['f-date','f-name','f-qty','f-buy','f-sell','f-target','f-stop','f-index','f-chart','f-supply','f-reason','f-scenario','f-defense'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const mat=document.getElementById('f-material');if(mat)mat.value='';
  setYN(true);
  const d=new Date();const el=document.getElementById('f-date');
  if(el)el.value=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

function addRow(){
  const data=getData();const row={};const d=new Date();
  data.cols.forEach(c=>row[c]='');
  row['날짜']=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  data.rows.unshift(row);saveData(data);renderTable();renderStats();
}

function addCol(){
  const name=prompt('새 열 이름:');if(!name?.trim())return;
  const data=getData();if(data.cols.includes(name.trim())){showConfirm('이미 있는 열');return;}
  data.cols.push(name.trim());data.rows.forEach(r=>r[name.trim()]=r[name.trim()]||'');
  saveData(data);renderTable();
}

function deleteRow(idx){
  if(!confirm('삭제?'))return;
  const data=getData();data.rows.splice(idx,1);saveData(data);renderTable();renderStats();
}

function deleteCol(col){
  if(FIXED_COLS.includes(col)){showConfirm('기본 열은 삭제 불가');return;}
  if(!confirm('"'+col+'" 삭제?'))return;
  const data=getData();data.cols=data.cols.filter(c=>c!==col);data.rows.forEach(r=>delete r[col]);saveData(data);renderTable();
}

function updateCell(ri,col,val){
  const data=getData();if(!data.rows[ri])return;
  data.rows[ri][col]=cleanN(val);
  if(['매수가','매도가','수량'].includes(col)){
    calcRow(data.rows[ri]);
    // 수익률/실현손익 셀 즉시 업데이트
    const pctEl=document.getElementById('td-pct-'+ri);
    const plEl=document.getElementById('td-pl-'+ri);
    const row=data.rows[ri];
    if(pctEl){
      const p=parseFloat(row['수익률(%)']);
      pctEl.className=isNaN(p)||p===0?'muted-c':p>0?'pos-c':'neg-c';
      pctEl.textContent=row['수익률(%)']?row['수익률(%)']+' %':'진행중';
    }
    if(plEl){
      const pl=parseInt(row['실현손익'])||0;
      plEl.className=pl>0?'pos-c':pl<0?'neg-c':'muted-c';
      plEl.textContent=pl?fmtN(pl)+'원':'-';
    }
    renderStats();
  }
  saveData(data);
}

function renderTable(){
  const data=getData();
  const w=getW();
  const thead=document.getElementById('trade-thead');
  const tbody=document.getElementById('trade-tbody');
  const empty=document.getElementById('trade-empty');

  thead.innerHTML='<tr>'+data.cols.map(c=>{
    const cw=w[c]||COL_W[c]||140;
    const canDel=!FIXED_COLS.includes(c);
    return `<th data-col="${c}" style="width:${cw}px;min-width:${cw}px;">
      <div class="th-content"><span class="th-label">${c}${canDel?` <span onclick="deleteCol('${c}')" style="cursor:pointer;color:var(--text3);font-size:11px;">✕</span>`:''}</span></div>
      <div class="resizer" onmousedown="startResize(event,'${c}')"></div>
    </th>`;
  }).join('')+'<th style="width:56px;min-width:56px;"></th></tr>';

  if(!data.rows.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  tbody.innerHTML=data.rows.map((row,ri)=>`<tr>${data.cols.map(c=>{
    const val=row[c]||'';
    const cw=w[c]||COL_W[c]||140;
    if(c==='수익률(%)'){
      const p=parseFloat(val);
      const cls=isNaN(p)||p===0?'muted-c':p>0?'pos-c':'neg-c';
      return `<td class="${cls}" id="td-pct-${ri}" style="width:${cw}px;">${val?val+' %':'진행중'}</td>`;
    }
    if(c==='실현손익'){
      const pl=parseInt(cleanN(val))||0;
      const cls=pl>0?'pos-c':pl<0?'neg-c':'muted-c';
      return `<td class="${cls}" id="td-pl-${ri}" style="width:${cw}px;">${pl?fmtN(pl)+'원':'-'}</td>`;
    }
    if(c==='정상/뇌동'){
      return `<td class="center-c" style="width:${cw}px;color:${val==='뇌동'?'var(--neg)':'var(--pos)'};">${val||'-'}</td>`;
    }
    const isNum=['수량','매수가','매도가','목표가','손절가'].includes(c);
    const dispVal=isNum&&val?fmtN(parseFloat(cleanN(val)),true):'';
    return `<td style="width:${cw}px;"><input type="text" value="${isNum?(dispVal||String(val)):String(val).replace(/"/g,'&quot;')}" onfocus="if(${isNum}){this.value='${cleanN(val).replace(/'/g,"\\'")}';}" onblur="updateCell(${ri},'${c}',this.value)" placeholder="${c}..." style="font-family:${isNum?'\'DM Mono\',monospace':'inherit'};font-size:14px;"></td>`;
  }).join('')}<td style="width:56px;" class="center-c"><button class="del-btn" onclick="deleteRow(${ri})">삭제</button></td></tr>`).join('');
}

// 열 너비 드래그
let rCol='',rStartX=0,rStartW=0;
function startResize(e,col){
  e.preventDefault();rCol=col;rStartX=e.clientX;
  const w=getW();rStartW=w[col]||COL_W[col]||140;
  const mm=ev=>{
    const nw=Math.max(50,rStartW+(ev.clientX-rStartX));
    const tbl=document.getElementById('trade-table');
    if(!tbl)return;
    tbl.querySelectorAll(`[data-col="${rCol}"]`).forEach(el=>{el.style.width=nw+'px';el.style.minWidth=nw+'px';});
    const data=getData();const ci=data.cols.indexOf(rCol);
    tbl.querySelectorAll('tbody tr').forEach(tr=>{const tds=tr.querySelectorAll('td');if(tds[ci])tds[ci].style.width=nw+'px';});
  };
  const mu=()=>{
    document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);
    const w2=getW();
    const th=document.querySelector(`th[data-col="${rCol}"]`);if(th)w2[rCol]=th.offsetWidth;
    saveW(w2);
  };
  document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
}

function renderStats(){
  const data=getData();const rows=data.rows;
  document.getElementById('st-total').textContent=rows.length;
  const pcts=rows.map(r=>parseFloat(r['수익률(%)'])).filter(p=>!isNaN(p)&&p!==0);
  const wins=pcts.filter(p=>p>0);
  const wr=pcts.length?Math.round(wins.length/pcts.length*100):0;
  document.getElementById('st-wr').textContent=pcts.length?wr+'%':'-';
  document.getElementById('st-wr').className='stat-val '+(wr>=60?'pos':'neg');
  const avgWin=wins.length?wins.reduce((a,b)=>a+b,0)/wins.length:0;
  document.getElementById('st-avg').textContent=wins.length?'+'+avgWin.toFixed(1)+'%':'-';
  const totalPL=rows.reduce((a,r)=>a+(parseInt(cleanN(r['실현손익']))||0),0);
  const plEl=document.getElementById('st-pl');
  plEl.textContent=totalPL?(totalPL>0?'+':'')+fmtN(totalPL)+'원':'-';
  plEl.className='stat-val '+(totalPL>0?'pos':totalPL<0?'neg':'');
  document.getElementById('st-bd').textContent=rows.filter(r=>r['정상/뇌동']==='뇌동').length;
}

// 키움증권 엑셀 업로드
function importKiwoom(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    // raw:true로 읽어서 날짜 숫자값도 처리
    const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    // raw:false로 문자열 변환 (날짜는 cellDates로 처리)
    const rawRows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'yyyy-mm-dd'});
    if(rawRows.length<2){showConfirm('데이터가 없어요');return;}

    // 헤더 찾기
    let headerRow=-1;
    for(let i=0;i<Math.min(5,rawRows.length);i++){
      if(rawRows[i].some(v=>String(v||'').includes('일자')||String(v||'').includes('종목명'))){
        headerRow=i;break;
      }
    }
    if(headerRow<0)headerRow=0;

    const headers=rawRows[headerRow].map(h=>String(h||'').trim());
    const data=getData();
    let added=0;

    rawRows.slice(headerRow+1).forEach(row=>{
      if(!row.some(v=>v))return;
      const r={};data.cols.forEach(c=>r[c]='');

      headers.forEach((h,i)=>{
        const mapped=KIWOOM_MAP[h];
        if(!mapped)return;
        let val=String(row[i]||'').replace(/,/g,'').trim();
        if(!val||val==='-'||val==='null'||val==='undefined')return;

        if(mapped==='날짜'){
          // 다양한 날짜 형식 정규화
          // yyyy-mm-dd 형식으로 통일
          val=val.replace(/\./g,'-').replace(/\//g,'-');
          // yyyymmdd → yyyy-mm-dd
          if(/^\d{8}$/.test(val))val=val.slice(0,4)+'-'+val.slice(4,6)+'-'+val.slice(6,8);
          // Date 객체 문자열 처리 (예: Mon Apr 27 2026...)
          if(val.includes(' ')&&val.length>10){
            const d=new Date(val);
            if(!isNaN(d.getTime())){
              const y=d.getFullYear();
              const m=String(d.getMonth()+1).padStart(2,'0');
              const dd=String(d.getDate()).padStart(2,'0');
              val=y+'-'+m+'-'+dd;
            }
          }
          // 최종 검증: yyyy-mm-dd 형식인지 확인
          if(!/^\d{4}-\d{2}-\d{2}$/.test(val))return;
        }
        if(mapped==='수익률(%)'){
          val=val.replace(/%/g,'').trim();
        }
        r[mapped]=val;
      });

      if(!r['종목']||!r['날짜'])return;
      // 키움 데이터 신뢰 - calcRow 스킵
      data.rows.push(r);
      added++;
    });

    if(!added){showConfirm('추가된 데이터가 없어요. 키움 엑셀 형식인지 확인해주세요.');return;}
    // 날짜 내림차순 정렬
    data.rows.sort((a,b)=>(b['날짜']||'').localeCompare(a['날짜']||''));
    saveData(data);renderTable();renderStats();
    showConfirm('키움 엑셀 '+added+'건 추가 완료!');
  };
  reader.readAsBinaryString(file);input.value='';
}

function exportExcel(){
  const data=getData();if(!data.rows.length){showConfirm('데이터가 없어요');return;}
  const rows=[data.cols,...data.rows.map(r=>data.cols.map(c=>r[c]||''))];
  const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'매매일지',ws);
  const d=new Date();XLSX.writeFile(wb,'매매일지_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx');
  showConfirm('다운로드 완료!');
}

function importExcel(input,mode){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rawRows=XLSX.utils.sheet_to_json(ws,{header:1});
    if(rawRows.length<2){showConfirm('데이터가 없어요');return;}
    const headers=rawRows[0].map(h=>String(h||'').trim());
    const data=mode==='overwrite'?{cols:[...DEFAULT_COLS],rows:[],colWidths:{}}:getData();
    headers.forEach(h=>{if(h&&!data.cols.includes(h))data.cols.push(h);});
    rawRows.slice(1).forEach(row=>{
      if(!row.some(v=>v))return;
      const r={};data.cols.forEach(c=>r[c]='');
      headers.forEach((h,i)=>{if(h&&row[i]!==undefined)r[h]=String(row[i]).replace(/,/g,'');});
      calcRow(r);data.rows.push(r);
    });
    saveData(data);renderTable();renderStats();
    showConfirm(mode==='overwrite'?'덮어쓰기 완료!':'추가 완료!');
  };
  reader.readAsBinaryString(file);input.value='';
}

function showTab(t){
  const isTable=t==='table';
  document.getElementById('pane-table').style.display=isTable?'block':'none';
  document.getElementById('pane-write').style.display=isTable?'none':'block';
  document.getElementById('tab-btn-table').classList.toggle('on',isTable);
  document.getElementById('tab-btn-write').classList.toggle('on',!isTable);
}

const d=new Date();
const dateEl=document.getElementById('f-date');
if(dateEl)dateEl.value=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
fbSync(()=>{renderTable();renderStats();});
