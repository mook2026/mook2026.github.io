<!DOCTYPE html>
<html lang="ko">
<!--
  [수정 이력]
  v1. textarea → contenteditable (ce-cell) 전환 - 볼드/글자색/형광펜 지원
  v2. 행 높이 드래그 (rh-row 핸들) - td height 기반, data-ri 속성으로 행 특정
  v3. 열 너비 드래그 (col-rz 핸들) - 해당 data-col만 변경, 타 열 불변, table width:max-content
  v4. rowHeights/colWidths localStorage 저장/복원 - 재진입 후에도 유지
  v5. localStorage 먼저 렌더 후 Firebase 재렌더 - 페이지 진입 시 즉시 데이터 표시
  v6. 자동저장 엔진(AS_ENGINE) - 입력 800ms 디바운스, 하단 "저장됨 ✓ HH:MM:SS" 표시
  v7. CE_ENGINE - 텍스트 선택 시 미니 툴바 (볼드/글자색/형광펜/서식제거)
  [주의] getData()는 반드시 colWidths/rowHeights 초기화 포함
  [주의] render() 시 tbody innerHTML 재생성 - data-ri 속성 필수
  v+. saveData()에 실제 저장됨 표시 추가 - 가짜 저장됨 버그 수정
  v+. 상단 스크롤바 sticky 고정(top:0) + nav에 💾 저장 버튼 직접 삽입
  v+. TOP SCROLL ENGINE v2 - position:fixed, nav+toolbar 높이 동적계산, overflow 부모 영향 없음
  v8. AS엔진 제거, SAVE ENGINE v2, fbSync _editing, TOP SCROLL v3
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FB_CONFIG={apiKey:"AIzaSyBh9LtC02jCwyrURkl676UFxtHU2SdSkkI",authDomain:"ian-dashboard.firebaseapp.com",projectId:"ian-dashboard",storageBucket:"ian-dashboard.firebasestorage.app",messagingSenderId:"47067460467",appId:"1:47067460467:web:37906ad2ddb74133238b06"};
if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);
const db=firebase.firestore();const UID='ian';
async function fbSave(){try{const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)d[k]=localStorage.getItem(k);}await db.collection('data').doc(UID).set(d,{merge:true});}catch(e){console.warn('FB:',e);}}
async function fbSync(cb){try{const doc=await db.collection('data').doc(UID).get();if(doc.exists){Object.entries(doc.data()).forEach(([k,v])=>localStorage.setItem(k,v));}}catch(e){console.warn('FB:',e);}if(cb)cb();}
</script>
<style>
:root{--bg:#0c0c0e;--bg2:#141416;--bg3:#1c1c1f;--border:rgba(255,255,255,0.2);--border2:rgba(255,255,255,0.3);--text:#f0f0f0;--text2:#ccc;--text3:#999;--stock:#fbbf24;--pos:#34d399;--neg:#fb7185;--r:10px;--r-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-back{font-size:22px;color:var(--text2);text-decoration:none;}
.nav-logo{font-family:'DM Mono',monospace;font-size:15px;color:var(--text2);}
.nav-date{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);}
.toolbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.btn{font-size:14px;padding:8px 15px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--stock);color:var(--stock);}
.btn.primary{border-color:var(--stock);color:var(--stock);}
.confirm-bar{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);padding:7px 20px;min-height:30px;}
.wrap{padding:20px;overflow-x:auto;}
.resizable-table{width:max-content;min-width:100%;border-collapse:collapse;table-layout:fixed;}
.resizable-table th{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);padding:10px 12px;border:2px solid var(--border2);background:var(--bg2);text-align:left;white-space:nowrap;position:relative;user-select:none;}
.th-inner{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.th-input{background:transparent;border:none;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;outline:none;width:calc(100% - 20px);cursor:text;}
.th-input:focus{color:var(--text);border-bottom:1px solid var(--stock);}
.th-del{cursor:pointer;color:var(--text3);font-size:11px;flex-shrink:0;padding:0 2px;}
.th-del:hover{color:var(--neg);}
.resizer{width:6px;height:100%;position:absolute;right:0;top:0;cursor:col-resize;background:transparent;z-index:2;}
.resizer:hover,.resizer.active{background:var(--stock);}
.resizable-table td{padding:0;border:2px solid var(--border2);vertical-align:top;overflow:hidden;}
.resizable-table td textarea{width:100%;background:transparent;border:none;color:var(--text);font-size:14px;padding:9px 11px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:vertical;line-height:1.6;box-sizing:border-box;min-height:72px;max-height:400px;overflow-y:auto;}
.resizable-table td input[type=date]{width:100%;background:transparent;border:none;color:var(--text2);font-size:13px;padding:9px 11px;font-family:'DM Mono',monospace;outline:none;box-sizing:border-box;}
.resizable-table td textarea:focus,.resizable-table td input[type=date]:focus{background:rgba(251,191,36,0.05);}
tr:hover td{background:rgba(255,255,255,0.02);}
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;user-select:none;display:block;text-align:center;padding:8px 4px;}
.drag-handle:active{cursor:grabbing;}
tr.dragging{opacity:0.4;}
tr.drag-over td{border-top:2px solid var(--stock)!important;}
.del-btn{font-size:12px;color:var(--text3);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;transition:all .15s;}
.del-btn:hover{border-color:var(--neg);color:var(--neg);}
.add-row-btn{width:100%;padding:12px;font-size:14px;font-family:'DM Mono',monospace;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;margin-top:-2px;}
.add-row-btn:hover{border-color:var(--stock);color:var(--stock);}
.empty-msg{text-align:center;padding:48px;color:var(--text3);font-size:15px;font-family:'DM Mono',monospace;}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border);}
.tab{font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);padding:13px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;}
.tab:hover{color:var(--text2);}
.tab.on{color:var(--text);border-bottom-color:var(--stock);}
/* ---- 엑셀 스타일 테이블 v2 ---- */
.ex-table-wrap{overflow-x:auto;}
.ex-table{
  border-collapse:collapse;
  table-layout:fixed;
  width:auto;
}
.ex-table th{
  font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);
  padding:9px 11px;border:2px solid var(--border2);background:var(--bg2);
  text-align:left;white-space:nowrap;position:relative;user-select:none;
}
.ex-table td{
  padding:0;border:2px solid var(--border2);
  vertical-align:top;overflow:hidden;
  /* height는 JS로 직접 설정 */
}
/* textarea: td 높이 100% 채우고, 넘치면 스크롤 */
.ex-table td textarea{
  display:block;
  width:100%;
  height:100%;          /* td 높이 따라감 */
  min-height:60px;      /* 최소 높이 */
  background:transparent;border:none;color:var(--text);
  font-size:14px;padding:8px 10px;
  font-family:'Noto Sans KR',sans-serif;outline:none;
  resize:none;
  line-height:1.6;box-sizing:border-box;
  overflow-y:auto;      /* 내용 넘치면 스크롤 */
}
.ex-table td textarea:focus{background:rgba(251,191,36,0.04);}
.ex-table td input[type=date]{
  display:block;width:100%;
  background:transparent;border:none;color:var(--text2);
  font-size:13px;padding:8px 10px;
  font-family:'DM Mono',monospace;outline:none;box-sizing:border-box;
}
/* 열 너비 핸들 */
.col-rz{
  position:absolute;right:0;top:0;
  width:5px;height:100%;
  cursor:col-resize;background:transparent;z-index:3;
}
.col-rz:hover,.col-rz.rz-active{background:var(--stock);}
/* 행 높이 핸들 행 */
.rh-row td{
  padding:0!important;
  height:5px!important;
  border-top:none!important;
  border-left:2px solid var(--border2)!important;
  border-right:2px solid var(--border2)!important;
  border-bottom:2px solid var(--border2)!important;
  background:transparent!important;
  cursor:row-resize;
  position:relative;
}
.rh-row td::after{
  content:'';position:absolute;
  bottom:1px;left:10%;right:10%;
  height:2px;background:rgba(255,255,255,0.15);
  border-radius:1px;transition:background .1s;
}
.rh-row:hover td::after{background:var(--stock);}
/* drag reorder */
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;user-select:none;display:block;text-align:center;padding:6px 3px;}
tr:hover .ex-table td{background:rgba(255,255,255,0.015);}

/* contenteditable 셀 공통 스타일 */
.ce-cell{
  width:100%;height:100%;
  min-height:60px;
  background:transparent;
  color:var(--text);
  font-size:14px;
  padding:8px 10px;
  font-family:'Noto Sans KR',sans-serif;
  line-height:1.6;
  box-sizing:border-box;
  outline:none;
  overflow-y:auto;
  word-break:break-word;
  white-space:pre-wrap;
}
.ce-cell:focus{background:rgba(251,191,36,0.04);}
.ce-cell:empty:before{content:attr(placeholder);color:var(--text3);pointer-events:none;}
.ce-cell b, .ce-cell strong{color:inherit;}



</style>

<script>
const STORAGE_KEYS = {stock:'stock_review_v2', search:'search_review_v2'};
const DEFAULT_COLS_MAP = {
  stock: ['날짜','종목명','차트패턴','진입근거','결과','메모'],
  search: ['날짜','검색식명','조건','결과','메모']
};
const DEFAULT_W_MAP = {
  stock: {날짜:90,종목명:130,차트패턴:160,진입근거:220,결과:140,메모:220},
  search: {날짜:90,검색식명:160,조건:240,결과:160,메모:220}
};
let currentTab = 'stock';
function getStorageKey(){ return STORAGE_KEYS[currentTab]; }
function getDefaultCols(){ return DEFAULT_COLS_MAP[currentTab]; }
function getDefaultW(){ return DEFAULT_W_MAP[currentTab]; }


const FIXED_COLS = ['날짜'];
const DAYS = ['일','월','화','수','목','금','토'];
let dragSrc = -1;
let rCol = '', rStartX = 0, rStartW = 0;

function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function ls(k){ return localStorage.getItem(k); }
function lss(k,v){ localStorage.setItem(k,v); }
function showConfirm(msg){ const el=document.getElementById('confirm-bar'); el.textContent=msg; setTimeout(()=>el.textContent='',3000); }

function getData(){
  const raw=ls(getStorageKey());
  if(raw){try{const d=JSON.parse(raw);if(!d.colWidths)d.colWidths={};if(!d.rowHeights)d.rowHeights={};return d;}catch(e){}}
  return {cols:[...getDefaultCols()],rows:[],colWidths:{},rowHeights:{}};
}
function saveData(d){if(!d.colWidths)d.colWidths={};if(!d.rowHeights)d.rowHeights={};lss(getStorageKey(),JSON.stringify(d));if(window.fbSaveWithStatus)fbSaveWithStatus();else fbSave();
  /* [수정] 실제 saveData 호출 시에만 저장됨 표시 */
  
}

function addRow(){
  const data = getData();
  const row = {};
  data.cols.forEach(c => row[c] = '');
  row['날짜'] = todayStr();
  data.rows.unshift(row);
  saveData(data);
  render();
  showConfirm('행 추가됨');
}

function addCol(){
  const name = prompt('새 열 이름:');
  if(!name || !name.trim()) return;
  const data = getData();
  if(data.cols.includes(name.trim())){ showConfirm('이미 있는 열'); return; }
  data.cols.push(name.trim());
  data.rows.forEach(r => r[name.trim()] = r[name.trim()] || '');
  saveData(data);
  render();
  showConfirm(name.trim()+' 열 추가됨');
}

function renameCol(oldName, newName){
  if(!newName || !newName.trim() || newName.trim() === oldName) return;
  if(FIXED_COLS.includes(oldName)) return;
  const data = getData();
  if(data.cols.includes(newName.trim()) && newName.trim() !== oldName){ showConfirm('이미 있는 이름'); return; }
  const idx = data.cols.indexOf(oldName);
  if(idx < 0) return;
  data.cols[idx] = newName.trim();
  data.rows.forEach(r => {
    r[newName.trim()] = r[oldName] || '';
    if(newName.trim() !== oldName) delete r[oldName];
  });
  if(data.colWidths && data.colWidths[oldName]){
    data.colWidths[newName.trim()] = data.colWidths[oldName];
    delete data.colWidths[oldName];
  }
  saveData(data);
  render();
}

function deleteCol(col){
  if(FIXED_COLS.includes(col)){ showConfirm('날짜 열은 삭제 불가'); return; }
  if(!confirm('"'+col+'" 열을 삭제할까요?')) return;
  const data = getData();
  data.cols = data.cols.filter(c => c !== col);
  data.rows.forEach(r => delete r[col]);
  saveData(data);
  render();
}

function deleteRow(idx){
  if(!confirm('삭제할까요?')) return;
  const data = getData();
  data.rows.splice(idx, 1);
  saveData(data);
  render();
}

function updateCell(idx, col, val){
  const data = getData();
  if(!data.rows[idx]) return;
  data.rows[idx][col] = val;
  saveData(data);
}
function updateCellCE(el, idx, col){
  const data = getData();
  if(!data.rows[idx]) return;
  data.rows[idx][col] = el.innerHTML;
  saveData(data);
}

// 드래그
function dragStart(e, ri){ dragSrc=ri; e.currentTarget.classList.add('dragging'); }
function dragOver(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function dragDrop(e, ri){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragSrc === ri) return;
  const data = getData();
  const row = data.rows.splice(dragSrc, 1)[0];
  data.rows.splice(ri, 0, row);
  saveData(data);
  render();
  dragSrc = -1;
}

// 열 너비 드래그
function startResize(e, col){
  e.preventDefault();
  rCol = col; rStartX = e.clientX;
  const data = getData();
  rStartW = (data.colWidths||{})[col] || getDefaultW()[col] || 120;
  e.target.classList.add('active');
  const mm = ev => {
    const nw = Math.max(1, rStartW + (ev.clientX - rStartX));
    document.querySelectorAll(`[data-rcol="${rCol}"]`).forEach(el => {
      el.style.width = nw+'px';
      
    });
  };
  const mu = () => {
    e.target.classList.remove('active');
    document.removeEventListener('mousemove', mm);
    document.removeEventListener('mouseup', mu);
    const data2 = getData();
    if(!data2.colWidths) data2.colWidths = {};
    const th = document.querySelector(`th[data-rcol="${rCol}"]`);
    if(th) data2.colWidths[rCol] = th.offsetWidth;
    saveData(data2);
  };
  document.addEventListener('mousemove', mm);
  document.addEventListener('mouseup', mu);
}

function render(){
  const data = getData();
  const cw = data.colWidths || {};
  const cols = data.cols;
  const DEFAULT_W = getDefaultW();
  const sfx = currentTab==='search'?'-s':'';
  const tblId = currentTab==='search'?'main-table-s':'main-table';
  const thead = document.getElementById('main-thead'+sfx);
  const tbody = document.getElementById('main-tbody'+sfx);
  const empty = document.getElementById('main-empty'+sfx);

  // 헤더
  thead.innerHTML = '<tr>' +
    '<th style="width:28px;">↕</th>' +
    cols.map(c => {
      const w = cw[c] || DEFAULT_W[c] || 180;
      const canDel = !FIXED_COLS.includes(c);
      const cE = c.replace(/"/g,'&quot;');
      const cJ = c.replace(/'/g,"\\'");
      return `<th data-col="${cE}" style="width:${w}px;">
        <input style="background:transparent;border:none;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;outline:none;width:calc(100% - 22px);cursor:text;"
          value="${cE}" onblur="renameCol('${cJ}',this.value)" onclick="event.stopPropagation()" ${FIXED_COLS.includes(c)?'readonly':''}/>
        ${canDel?`<span onclick="deleteCol('${cJ}')" style="cursor:pointer;color:var(--text3);font-size:11px;position:absolute;right:18px;top:50%;transform:translateY(-50%);">✕</span>`:''}
        <div class="col-rz" onmousedown="startColResize(event,'${tblId}','${cJ}')"></div>
      </th>`;
    }).join('') +
    '<th style="width:52px;"></th>' +
  '</tr>';

  if(!data.rows.length){
    tbody.innerHTML = '';
    if(empty) empty.style.display = 'block';
    return;
  }
  if(empty) empty.style.display = 'none';

  tbody.innerHTML = data.rows.map((row, ri) => {
    const rh = (data.rowHeights||{})[ri] || 80;
    const cells = cols.map(c => {
      const val = row[c] || '';
      const w = cw[c] || DEFAULT_W[c] || 180;
      const cE = c.replace(/"/g,'&quot;');
      const cJ = c.replace(/'/g,"\\'");
      if(c === '날짜'){
        return `<td data-col="${cE}" style="width:${w}px;height:${rh}px;vertical-align:middle;border:2px solid var(--border2);">
          <input type="date" value="${val}" onchange="updateCell(${ri},'${cJ}',this.value)">
        </td>`;
      }
      return `<td data-col="${cE}" style="width:${w}px;height:${rh}px;border:2px solid var(--border2);">
        <div class="ce-cell" contenteditable="true"
          data-ri="${ri}" data-col="${cE}"
          onblur="updateCellCE(this,${ri},'${cJ}')"
          placeholder="${cE}...">${val}</div>
      </td>`;
    }).join('');
    return `<tr data-ri="${ri}" draggable="true"
      ondragstart="dragStart(event,${ri})"
      ondragover="dragOver(event)"
      ondragleave="dragLeave(event)"
      ondrop="dragDrop(event,${ri})">
      <td style="width:28px;height:${rh}px;text-align:center;vertical-align:middle;border:2px solid var(--border2);padding:2px;">
        <span class="drag-handle">⠿</span>
      </td>
      ${cells}
      <td style="width:52px;height:${rh}px;text-align:center;vertical-align:middle;border:2px solid var(--border2);padding:4px;">
        <button class="del-btn" onclick="deleteRow(${ri})">삭제</button>
      </td>
    </tr>
    <tr class="rh-row">
      <td colspan="${cols.length+2}" onmousedown="startRowResize(event,'${tblId}',${ri})"></td>
    </tr>`;
  }).join('');
  setTimeout(initAllTopScrolls, 50);
}

function exportExcel(){
  const data = getData();
  if(!data.rows.length){ showConfirm('데이터가 없어요'); return; }
  const rows = [data.cols, ...data.rows.map(r => data.cols.map(c => r[c]||''))];
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, '검색식복기', ws);
  const d = new Date();
  XLSX.writeFile(wb, '검색식복기_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx');
  showConfirm('다운로드 완료!');
}

function importExcel(input, mode){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const wb = XLSX.read(e.target.result, {type:'binary'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rawRows = XLSX.utils.sheet_to_json(ws, {header:1});
    if(rawRows.length < 2){ showConfirm('데이터가 없어요'); return; }
    const headers = rawRows[0].map(h => String(h||'').trim());
    const data = mode === 'overwrite'
      ? {cols:[...getDefaultCols()], rows:[], colWidths:{}}
      : getData();
    headers.forEach(h => { if(h && !data.cols.includes(h)) data.cols.push(h); });
    rawRows.slice(1).forEach(row => {
      if(!row.some(v => v)) return;
      const r = {}; data.cols.forEach(c => r[c] = '');
      headers.forEach((h,i) => { if(h && row[i] !== undefined) r[h] = String(row[i]); });
      data.rows.push(r);
    });
    saveData(data); render();
    showConfirm(mode==='overwrite' ? '덮어쓰기 완료!' : '추가 완료!');
  };
  reader.readAsBinaryString(file); input.value = '';
}

const d = new Date();
document.getElementById('nav-date').textContent =
  d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+' '+DAYS[d.getDay()];

function switchTab(tab){
  currentTab = tab;

  document.getElementById('pane-search').style.display = tab==='search'?'block':'none';
  document.getElementById('tab-btn-stock').classList.toggle('on', tab==='stock');
  document.getElementById('tab-btn-search').classList.toggle('on', tab==='search');
  render();
}

// 1) localStorage 데이터 즉시 표시
render();
// 2) Firebase sync 후 재렌더 (최신 데이터 반영)

render();
fbSync(()=>{
  if(window._editing)return;

<script>
/* ============================================================
   EXCEL RESIZE ENGINE v2
   핵심 원칙:
   - tr에 height 주지 않음 (브라우저가 무시함)
   - td에 height 적용 → 행 높이 제어
   - textarea는 height:100% + min-height + overflow-y:auto
   - 열 너비: 해당 data-col 요소만 변경, 타 열 불변
   - 테이블: width:auto, table-layout:fixed → 제약 없이 확장
   ============================================================ */

// ---- 열 너비 드래그 ----
let _CZ_col='', _CZ_startX=0, _CZ_startW=0, _CZ_tableId='', _CZ_el=null;
function startColResize(e, tableId, col) {
  e.preventDefault(); e.stopPropagation();
  _CZ_col=col; _CZ_startX=e.clientX; _CZ_tableId=tableId; _CZ_el=e.target;
  const tbl=document.getElementById(tableId);
  const th=tbl?tbl.querySelector('th[data-col="'+col+'"]'):null;
  _CZ_startW=th?th.offsetWidth:120;
  _CZ_el.classList.add('rz-active');
  const mm=ev=>{
    const nw=Math.max(30, _CZ_startW+(ev.clientX-_CZ_startX));
    const t=document.getElementById(_CZ_tableId);
    if(!t)return;
    // 해당 열만 변경
    t.querySelectorAll('[data-col="'+_CZ_col+'"]').forEach(el=>{ el.style.width=nw+'px'; });
    // 테이블 전체 width = 모든 th 너비 합산 → 다른 열 절대 영향 없음
    let total=0;
    t.querySelectorAll('thead th').forEach(th=>{ total+=th.offsetWidth; });
    t.style.width=total+'px';
  };
  const mu=()=>{
    _CZ_el.classList.remove('rz-active');
    document.removeEventListener('mousemove',mm);
    document.removeEventListener('mouseup',mu);
    const t=document.getElementById(_CZ_tableId);
    const th2=t?t.querySelector('th[data-col="'+_CZ_col+'"]'):null;
    if(!th2)return;
    const data=getData(); if(!data.colWidths)data.colWidths={};
    data.colWidths[_CZ_col]=th2.offsetWidth; saveData(data);
  };
  document.addEventListener('mousemove',mm);
  document.addEventListener('mouseup',mu);
}

// ---- 행 높이 드래그 ----
// rh-row의 td에 onmousedown="startRowResize(event, tableId, rowDataIdx)"
// rowDataIdx: 데이터 배열의 인덱스 (rh-row 위 데이터 행의 논리 인덱스)
let _RZ_rowIdx=-1, _RZ_startY=0, _RZ_startH=0, _RZ_tableId='';
function startRowResize(e, tableId, rowDataIdx) {
  e.preventDefault();
  _RZ_rowIdx=rowDataIdx; _RZ_startY=e.clientY; _RZ_tableId=tableId;
  // 현재 높이: 해당 rh-row 바로 위 tr의 첫번째 td height
  const tbl=document.getElementById(tableId);
  // id로 정확히 찾음: tr[data-ri="rowDataIdx"]
  const dataTr=tbl?tbl.querySelector('tr[data-ri="'+rowDataIdx+'"]'):null;
  const firstTd=dataTr?dataTr.querySelector('td'):null;
  _RZ_startH=firstTd?firstTd.offsetHeight:80;

  const mm=ev=>{
    const newH=Math.max(32, _RZ_startH+(ev.clientY-_RZ_startY));
    const t=document.getElementById(_RZ_tableId);
    const dTr=t?t.querySelector('tr[data-ri="'+_RZ_rowIdx+'"]'):null;
    if(dTr){
      // 모든 td에 height 적용
      dTr.querySelectorAll('td').forEach(td=>{ td.style.height=newH+'px'; });
      // textarea는 height:100%로 자동 따라옴 (CSS에서 설정)
    }
  };
  const mu=()=>{
    document.removeEventListener('mousemove',mm);
    document.removeEventListener('mouseup',mu);
    const t=document.getElementById(_RZ_tableId);
    const dTr=t?t.querySelector('tr[data-ri="'+_RZ_rowIdx+'"]'):null;
    const td1=dTr?dTr.querySelector('td'):null;
    if(td1){
      const data=getData(); if(!data.rowHeights)data.rowHeights={};
      data.rowHeights[_RZ_rowIdx]=td1.offsetHeight; saveData(data);
    }
    _RZ_rowIdx=-1;
  };
  document.addEventListener('mousemove',mm);
  document.addEventListener('mouseup',mu);
}

// 렌더 직후 호출: 테이블 초기 width를 열 합산으로 설정 (이후 열 드래그 시 자동 갱신됨)
function initTableWidth(tableId) {
  const t = document.getElementById(tableId);
  if (!t) return;
  let total = 0;
  t.querySelectorAll('thead th').forEach(th => { total += th.offsetWidth; });
  if (total > 0) t.style.width = total + 'px';
}

</script>
<script>
/* ============================================================
   CONTENTEDITABLE RICH TEXT ENGINE
   - 텍스트 선택 후 미니 툴바: 볼드, 글자색, 형광펜
   - 저장: innerHTML (기존 plain text도 그대로 읽힘)
   - 툴바는 선택 영역 위에 자동 위치
   ============================================================ */

(function(){
  const TOOLBAR_ID = 'ce-toolbar';
  const COLORS = ['#fbbf24','#fb7185','#34d399','#60a5fa','#a78bfa','#f97316','#ffffff','#000000'];
  const HIGHLIGHTS = ['#fbbf2440','#fb718540','#34d39940','#60a5fa40','#a78bfa40','rgba(251,191,36,0.35)','rgba(251,113,133,0.35)','rgba(52,211,153,0.35)'];

  function getOrCreateToolbar(){
    let tb = document.getElementById(TOOLBAR_ID);
    if(tb) return tb;
    tb = document.createElement('div');
    tb.id = TOOLBAR_ID;
    tb.style.cssText = `
      position:fixed;z-index:9999;
      background:#1c1c1f;border:1px solid rgba(255,255,255,0.25);
      border-radius:8px;padding:6px 8px;
      display:none;flex-wrap:wrap;gap:4px;align-items:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
      max-width:320px;
    `;

    // 볼드
    const bold = document.createElement('button');
    bold.textContent = 'B';
    bold.style.cssText = 'font-weight:700;font-size:13px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:#f0f0f0;border-radius:4px;padding:3px 8px;cursor:pointer;font-family:DM Mono,monospace;';
    bold.title = '볼드';
    bold.onmousedown = e => { e.preventDefault(); document.execCommand('bold'); };
    tb.appendChild(bold);

    // 구분선
    const sep1 = document.createElement('div');
    sep1.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep1);

    // 글자색 라벨
    const lbl1 = document.createElement('span');
    lbl1.textContent = 'A';
    lbl1.style.cssText = 'font-size:11px;color:#999;font-family:DM Mono,monospace;';
    tb.appendChild(lbl1);

    // 글자색 팔레트
    COLORS.forEach(c => {
      const dot = document.createElement('button');
      dot.style.cssText = `width:16px;height:16px;border-radius:50%;background:${c};border:1px solid rgba(255,255,255,0.3);cursor:pointer;padding:0;flex-shrink:0;`;
      dot.title = c;
      dot.onmousedown = e => { e.preventDefault(); document.execCommand('foreColor', false, c); };
      tb.appendChild(dot);
    });

    // 구분선
    const sep2 = document.createElement('div');
    sep2.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep2);

    // 형광펜 라벨
    const lbl2 = document.createElement('span');
    lbl2.style.cssText = 'font-size:13px;color:#999;';
    lbl2.textContent = '🖍';
    tb.appendChild(lbl2);

    // 형광펜 팔레트
    HIGHLIGHTS.forEach(c => {
      const dot = document.createElement('button');
      dot.style.cssText = `width:16px;height:16px;border-radius:3px;background:${c};border:1px solid rgba(255,255,255,0.3);cursor:pointer;padding:0;flex-shrink:0;`;
      dot.title = '형광펜';
      dot.onmousedown = e => {
        e.preventDefault();
        document.execCommand('hiliteColor', false, c);
      };
      tb.appendChild(dot);
    });

    // 구분선
    const sep3 = document.createElement('div');
    sep3.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep3);

    // 서식 제거
    const clr = document.createElement('button');
    clr.textContent = '✕';
    clr.title = '서식 제거';
    clr.style.cssText = 'font-size:12px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:#999;border-radius:4px;padding:3px 7px;cursor:pointer;';
    clr.onmousedown = e => { e.preventDefault(); document.execCommand('removeFormat'); };
    tb.appendChild(clr);

    document.body.appendChild(tb);
    tb.style.display = 'flex';
    tb.style.display = 'none';
    return tb;
  }

  function showToolbar(){
    const sel = window.getSelection();
    if(!sel || sel.isCollapsed || !sel.toString().trim()) { hideToolbar(); return; }
    // contenteditable 안에서만
    let node = sel.anchorNode;
    while(node && node.nodeType !== 1) node = node.parentNode;
    if(!node || !node.closest('[contenteditable="true"]')) { hideToolbar(); return; }

    const tb = getOrCreateToolbar();
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    tb.style.display = 'flex';
    const tbW = tb.offsetWidth || 300;
    let left = rect.left + (rect.width/2) - (tbW/2);
    let top = rect.top - tb.offsetHeight - 8 + window.scrollY;
    if(left < 4) left = 4;
    if(left + tbW > window.innerWidth - 4) left = window.innerWidth - tbW - 4;
    if(top < window.scrollY + 4) top = rect.bottom + 8 + window.scrollY;
    tb.style.left = left + 'px';
    tb.style.top = top + 'px';
  }

  function hideToolbar(){
    const tb = document.getElementById(TOOLBAR_ID);
    if(tb) tb.style.display = 'none';
  }

  document.addEventListener('mouseup', () => setTimeout(showToolbar, 10));
  document.addEventListener('keyup', () => setTimeout(showToolbar, 10));
  document.addEventListener('mousedown', e => {
    const tb = document.getElementById(TOOLBAR_ID);
    if(tb && !tb.contains(e.target)) hideToolbar();
  });
  document.addEventListener('scroll', hideToolbar, true);

  window.CE_ENGINE_LOADED = true;
})();

</script>


<script>
/* ============================================================
   SAVE ENGINE v2 - 수동저장만 / 자동저장 없음
   - 💾 버튼: 모든 CE셀 innerHTML 수집 → localStorage → Firebase
   - 실제 Firebase 완료 후에만 ✅ 저장됨 표시
   - 가짜 저장됨 표시 없음
   ============================================================ */
(function(){
  function pad(n){return String(n).padStart(2,'0');}
  function nowTime(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}

  function getBar(){
    let bar=document.getElementById('save-status-bar');
    if(bar)return bar;
    bar=document.createElement('div');
    bar.id='save-status-bar';
    bar.style.cssText='position:fixed;bottom:0;left:0;right:0;height:30px;background:#141416;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:9998;font-family:\'DM Mono\',monospace;font-size:12px;color:#888;';
    bar.innerHTML='<span id="save-status-msg">준비됨</span>'
      +'<button onclick="window.manualSave&&window.manualSave()" style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:4px;color:#fbbf24;font-size:12px;padding:3px 10px;cursor:pointer;font-family:\'DM Mono\',monospace;">💾 저장</button>';
    document.body.appendChild(bar);
    document.body.style.paddingBottom='38px';
    return bar;
  }
  function setMsg(msg,color){
    getBar();
    const el=document.getElementById('save-status-msg');
    if(el){el.textContent=msg;el.style.color=color||'#888';}
  }
  /* CE셀 innerHTML 즉시 수집 - blur 없이 */
  function flushAllCells(){
    document.querySelectorAll('.ce-cell[contenteditable="true"]').forEach(function(el){
      const attr=el.getAttribute('onblur');
      if(!attr)return;
      try{ new Function('el',attr.replace(/this/g,'el'))(el); }catch(e){}
    });
  }
  window.manualSave=async function(){
    setMsg('저장 중...','#fbbf24');
    try{
      flushAllCells();
      const d={};
      for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)d[k]=localStorage.getItem(k);}
      if(!Object.keys(d).length){setMsg('저장할 데이터 없음','#fb7185');return;}
      if(typeof db!=='undefined'&&typeof UID!=='undefined'){
        await db.collection('data').doc(UID).set(d,{merge:true});
        setMsg('✅ 저장됨 '+nowTime(),'#34d399');
      }else{
        setMsg('✅ 로컬 저장됨 '+nowTime(),'#fbbf24');
      }
    }catch(e){
      setMsg('❌ 저장 실패: '+e.message,'#fb7185');
      console.error('저장 실패:',e);
    }
  };
  window.fbSaveWithStatus=window.manualSave;
  /* CE셀 포커스 추적 - fbSync 재렌더 방지용 */
  document.addEventListener('focusin',function(e){
    if(e.target.classList&&e.target.classList.contains('ce-cell'))window._editing=true;
  });
  document.addEventListener('focusout',function(e){
    if(e.target.classList&&e.target.classList.contains('ce-cell')){
      setTimeout(function(){if(!document.querySelector('.ce-cell:focus'))window._editing=false;},150);
    }
  });
  window.SAVE_ENGINE_LOADED=true;
  setTimeout(function(){getBar();setMsg('준비됨','#888');},300);
})();
</script>
<script>
/* ============================================================
   TOP SCROLL ENGINE v3
   - position:fixed, nav+toolbar 높이 동적계산
   - 셀렉터 확대: .tbl-outer, .tbl-wrap, id*=tbl, div[overflow-x:auto]
   ============================================================ */
(function(){
  let activeWrap=null,syncing=false;
  function getNavBottom(){
    const nav=document.querySelector('.nav'),tb=document.querySelector('.toolbar');
    let top=nav?nav.getBoundingClientRect().bottom:56;
    if(tb){const r=tb.getBoundingClientRect();if(r.top<=top+2)top=r.bottom;}
    return Math.round(top);
  }
  function getOrCreateBar(){
    let bar=document.getElementById('top-scroll-fixed');
    if(bar)return bar;
    bar=document.createElement('div');
    bar.id='top-scroll-fixed';
    bar.style.cssText='position:fixed;left:0;right:0;height:14px;overflow-x:auto;overflow-y:hidden;z-index:998;background:#1c1c1f;border-bottom:2px solid rgba(251,191,36,0.3);display:none;cursor:pointer;';
    const dummy=document.createElement('div');
    dummy.id='top-scroll-dummy';dummy.style.height='1px';
    bar.appendChild(dummy);document.body.appendChild(bar);
    bar.addEventListener('scroll',function(){
      if(syncing||!activeWrap)return;
      syncing=true;activeWrap.scrollLeft=bar.scrollLeft;syncing=false;
    });
    return bar;
  }
  function syncBar(wrap){
    const bar=getOrCreateBar(),dummy=document.getElementById('top-scroll-dummy');
    const tbl=wrap.querySelector('table');
    if(!tbl){bar.style.display='none';return;}
    activeWrap=wrap;
    dummy.style.width=tbl.scrollWidth+'px';
    bar.scrollLeft=wrap.scrollLeft;
    bar.style.top=getNavBottom()+'px';
    bar.style.display=tbl.scrollWidth>wrap.clientWidth?'block':'none';
  }
  window.initTopScrollFixed=function(el){
    if(!el||el.dataset.tsFixed)return;
    el.dataset.tsFixed='1';
    el.addEventListener('scroll',function(){
      if(syncing)return;syncing=true;
      const bar=document.getElementById('top-scroll-fixed');
      if(bar)bar.scrollLeft=el.scrollLeft;
      syncing=false;
    });
    el.addEventListener('mouseenter',function(){syncBar(el);});
    el.addEventListener('focusin',function(){syncBar(el);});
    const obs=new ResizeObserver(function(){if(activeWrap===el)syncBar(el);});
    const tbl=el.querySelector('table');if(tbl)obs.observe(tbl);
    syncBar(el);
  };
  window.initAllTopScrolls=function(){
    /* 클래스 기반 */
    document.querySelectorAll('.tbl-outer,.tbl-wrap,.ex-table-wrap').forEach(function(el){
      if(el.querySelector('table'))window.initTopScrollFixed(el);
    });
    /* id 포함 */
    document.querySelectorAll('[id*="tbl-outer"],[id*="tbl-wrap"],[id*="tbl-outer-s"]').forEach(function(el){
      if(el.querySelector('table'))window.initTopScrollFixed(el);
    });
    /* inline style overflow-x:auto */
    document.querySelectorAll('div').forEach(function(el){
      if(el.style&&el.style.overflowX==='auto'&&el.querySelector('table'))window.initTopScrollFixed(el);
    });
  };
  window.TOP_SCROLL_V3_LOADED=true;
})();
</script>
</body>
