<!DOCTYPE html>
<html lang="ko">
<!--
  [수정 이력]
  v1. input[type=text] → contenteditable CE div
  v2. updateListCellCE: data.rows[ri][col] = el.innerHTML
  v3. localStorage 먼저 렌더 후 Firebase 재렌더
  v4. 자동저장 엔진 + CE_ENGINE 툴바
  v+. 상단 스크롤바 sticky 고정(top:0) + nav에 💾 저장 버튼 직접 삽입
  v+. TOP SCROLL ENGINE v2 - position:fixed, nav+toolbar 높이 동적계산, overflow 부모 영향 없음
  v5. AS엔진 제거, SAVE ENGINE v2, fbSync _editing, TOP SCROLL v3
-->

<script>
const FB_CONFIG={apiKey:"AIzaSyBh9LtC02jCwyrURkl676UFxtHU2SdSkkI",authDomain:"ian-dashboard.firebaseapp.com",projectId:"ian-dashboard",storageBucket:"ian-dashboard.firebasestorage.app",messagingSenderId:"47067460467",appId:"1:47067460467:web:37906ad2ddb74133238b06"};
if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);
const db=firebase.firestore();const UID='ian';
async function fbSave(){try{const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&!k.startsWith('mstage_'))d[k]=localStorage.getItem(k);}await db.collection('data').doc(UID).set(d,{merge:true});}catch(e){console.warn('FB:',e);}}
async function fbSync(cb){try{const doc=await db.collection('data').doc(UID).get();if(doc.exists){Object.entries(doc.data()).forEach(([k,v])=>localStorage.setItem(k,v));}}catch(e){console.warn('FB:',e);}if(cb)cb();}
</script>
<style>
:root{--bg:#0c0c0e;--bg2:#141416;--bg3:#1c1c1f;--border:rgba(255,255,255,0.2);--border2:rgba(255,255,255,0.3);--text:#f0f0f0;--text2:#ccc;--text3:#999;--stock:#fbbf24;--pos:#34d399;--neg:#fb7185;--r:10px;--r-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-back{font-size:22px;color:var(--text2);text-decoration:none;}
.nav-logo{font-family:'DM Mono',monospace;font-size:15px;color:var(--text2);}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border);}
.tab{font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);padding:13px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;}
.tab:hover{color:var(--text2);}
.tab.on{color:var(--text);border-bottom-color:var(--stock);}
.toolbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.btn{font-size:14px;padding:8px 15px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--stock);color:var(--stock);}
.btn.primary{border-color:var(--stock);color:var(--stock);}
.confirm-bar{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);padding:7px 20px;min-height:30px;}

/* 종목 목록 테이블 */
.wrap{padding:20px;overflow-x:auto;}
.resizable-table{width:max-content;min-width:100%;border-collapse:collapse;table-layout:fixed;}
.resizable-table th{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);padding:10px 12px;border:2px solid var(--border2);background:var(--bg2);text-align:left;white-space:nowrap;position:relative;user-select:none;}
.th-inner{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.th-input{background:transparent;border:none;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;outline:none;width:calc(100% - 20px);cursor:text;}
.th-input:focus{color:var(--text);border-bottom:1px solid var(--stock);}
.th-del{cursor:pointer;color:var(--text3);font-size:11px;flex-shrink:0;}
.th-del:hover{color:var(--neg);}
.resizer{width:6px;height:100%;position:absolute;right:0;top:0;cursor:col-resize;background:transparent;z-index:2;}
.resizer:hover,.resizer.active{background:var(--stock);}
.resizable-table td{padding:0;border:2px solid var(--border2);vertical-align:middle;overflow:hidden;}
.resizable-table td input[type=text]{width:100%;background:transparent;border:none;color:var(--text);font-size:14px;padding:9px 11px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.resizable-table td input[type=text]:focus{background:rgba(251,191,36,0.05);}
td.ticker-td{padding:9px 12px;font-size:15px;font-weight:600;color:var(--stock);cursor:pointer;white-space:nowrap;}
td.ticker-td:hover{text-decoration:underline;}
td.center-c{padding:9px 11px;text-align:center;color:var(--text2);}
tr:hover td{background:rgba(255,255,255,0.02);}
.del-btn{font-size:12px;color:var(--text3);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;transition:all .15s;}
.del-btn:hover{border-color:var(--neg);color:var(--neg);}
.add-row-btn{width:100%;padding:12px;font-size:14px;font-family:'DM Mono',monospace;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.add-row-btn:hover{border-color:var(--stock);color:var(--stock);}
.empty-msg{text-align:center;padding:48px;color:var(--text3);font-size:15px;font-family:'DM Mono',monospace;}

/* 지표 체크 패널 */
.ind-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.ind-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ind-panel-title{font-size:17px;font-weight:600;color:var(--stock);}
.ind-panel-close{font-size:22px;color:var(--text2);cursor:pointer;padding:0 4px;}
.ind-panel-close:hover{color:var(--neg);}
.date-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.date-row label{font-size:14px;color:var(--text2);}
.date-row input[type=date]{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;padding:8px 12px;font-family:'DM Mono',monospace;outline:none;}
.date-chips{display:flex;gap:6px;flex-wrap:wrap;}
.date-chip{font-family:'DM Mono',monospace;font-size:12px;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);cursor:pointer;transition:all .15s;}
.date-chip:hover{border-color:var(--stock);color:var(--stock);}
.date-chip.on{background:var(--stock);color:#0c0c0e;border-color:var(--stock);}
.ind-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.ind-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);}
.ind-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);width:22px;flex-shrink:0;}
.ind-text{flex:1;font-size:14px;color:var(--text2);}
.ind-text input{background:transparent;border:none;color:var(--text2);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;}
.ind-text input:focus{border-bottom:1px solid var(--stock);color:var(--text);}
.yn-btns{display:flex;gap:6px;flex-shrink:0;}
.yn-btn{font-family:'DM Mono',monospace;font-size:13px;padding:5px 12px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.yn-btn.y.on{background:var(--pos);border-color:var(--pos);color:#fff;font-weight:700;}
.yn-btn.n.on{background:var(--neg);border-color:var(--neg);color:#fff;font-weight:700;}
.yn-btn:hover{border-color:var(--border2);color:var(--text);}
.ind-note{width:140px;flex-shrink:0;}
.ind-note input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;color:var(--text2);font-size:13px;padding:5px 8px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.ind-del{cursor:pointer;color:var(--text3);font-size:14px;padding:2px 4px;flex-shrink:0;}
.ind-del:hover{color:var(--neg);}
.add-ind-btn{width:100%;padding:10px;font-size:14px;font-family:'DM Mono',monospace;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;border-radius:var(--r-sm);}
.add-ind-btn:hover{border-color:var(--stock);color:var(--stock);}
.score-badge{font-family:'DM Mono',monospace;font-size:14px;padding:4px 12px;border-radius:4px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);}
.score-badge.good{color:var(--pos);border-color:var(--pos);background:rgba(52,211,153,0.1);}
.score-badge.bad{color:var(--neg);border-color:var(--neg);background:rgba(251,113,133,0.1);}
.hidden{display:none!important;}
/* contenteditable 셀 공통 스타일 */
.ce-cell{
  width:100%;min-height:28px;
  min-height:60px;
  background:transparent;
  color:var(--text);
  font-size:14px;
  padding:8px 10px;
  font-family:'Noto Sans KR',sans-serif;
  line-height:1.6;
  box-sizing:border-box;
  outline:none;
  overflow-y:auto;
  word-break:break-word;
  white-space:pre-wrap;
}
.ce-cell:focus{background:rgba(251,191,36,0.04);}
.ce-cell b, .ce-cell strong{color:inherit;}

.ce-cell:empty:before{content:attr(placeholder);color:var(--text3);pointer-events:none;}


</style>
</head>

  <div class="tab on" id="tab-btn-list" onclick="showTab('list')">종목 목록</div>

<script>
const DEFAULT_LIST_COLS=['종목','날짜','메모'];
const DEFAULT_LIST_W={종목:120,날짜:110,메모:300};
const FIXED_LIST=['종목'];
const DEFAULT_INDICATORS=[
  '지수가 매수 가능 구간인가?',
  '차트는 어떤 유형인가?',
  '정배열인가? (112일 < 중심선 < 기준선)',
  '일봉이 단기 저항을 돌파했나? (5일선/그물망/기준선)',
  '5일선이 모든 선 중 최상단인가?',
  'RSI가 70 돌파했거나 근접인가?',
  '추세가 상승추세인가? (턴어라운드/추세상승초입/눌림목)',
  '주봉이 볼밴상단 돌파 전 또는 했나?',
  '테마/섹터 모멘텀이 살아있는가? (상승률Top30 트렌드)',
  '재료 강도와 지속성이 충분한가?',
  '거래대금이 충분한가? (500억+)'
];
// 텍스트 입력 지표 인덱스 (1=차트유형, 6=추세유형)
const TEXT_IND_IDX=[1,6];

let selectedTicker='';
let rCol='',rStartX=0,rStartW=0;

function pad(n){return String(n).padStart(2,'0');}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function ls(k){return localStorage.getItem(k);}
function lss(k,v){localStorage.setItem(k,v);}
function showConfirm(msg){const el=document.getElementById('confirm-bar');el.textContent=msg;setTimeout(()=>el.textContent='',3000);}

function getListData(){return JSON.parse(ls('portfolio_list')||JSON.stringify({cols:[...DEFAULT_LIST_COLS],rows:[],colWidths:{}}));}
function saveListData(d){lss('portfolio_list',JSON.stringify(d));fbSave();}
function getIndData(ticker){return JSON.parse(ls('portfolio_ind_'+ticker)||JSON.stringify({indicators:[...DEFAULT_INDICATORS],dates:[],data:{}}));}
function saveIndData(ticker,d){lss('portfolio_ind_'+ticker,JSON.stringify(d));fbSave();}

// 종목 목록
function addTicker(){
  const name=prompt('종목명:');if(!name?.trim())return;
  const data=getListData();
  if(data.rows.find(r=>r['종목']===name.trim())){showConfirm('이미 있는 종목');return;}
  const row={};data.cols.forEach(c=>row[c]='');row['종목']=name.trim();row['날짜']=todayStr();
  data.rows.push(row);saveListData(data);renderList();
}

function addListCol(){
  const name=prompt('새 열 이름:');if(!name?.trim())return;
  const data=getListData();if(data.cols.includes(name.trim())){showConfirm('이미 있는 열');return;}
  data.cols.push(name.trim());data.rows.forEach(r=>r[name.trim()]=r[name.trim()]||'');
  saveListData(data);renderList();
}

function renameListCol(old,nw){
  if(!nw?.trim()||nw===old)return;
  const data=getListData();if(FIXED_LIST.includes(old))return;
  const idx=data.cols.indexOf(old);if(idx<0)return;
  data.cols[idx]=nw.trim();
  data.rows.forEach(r=>{r[nw.trim()]=r[old]||'';if(nw.trim()!==old)delete r[old];});
  if(data.colWidths?.[old]){data.colWidths[nw.trim()]=data.colWidths[old];delete data.colWidths[old];}
  saveListData(data);renderList();
}

function deleteListCol(col){
  if(FIXED_LIST.includes(col)){showConfirm('종목 열은 삭제 불가');return;}
  if(!confirm('"'+col+'" 열 삭제?'))return;
  const data=getListData();data.cols=data.cols.filter(c=>c!==col);data.rows.forEach(r=>delete r[col]);saveListData(data);renderList();
}

function deleteListRow(idx){
  if(!confirm('종목을 삭제할까요?'))return;
  const data=getListData();data.rows.splice(idx,1);saveListData(data);renderList();
}

function updateListCellCE(el,ri,col){
  const data=getListData();if(!data.rows[ri])return;
  data.rows[ri][col]=el.innerHTML;saveListData(data);
}
function updateListCell(ri,col,val){
  const data=getListData();if(!data.rows[ri])return;data.rows[ri][col]=val;saveListData(data);
}

function startResize(e,col){
  e.preventDefault();rCol=col;rStartX=e.clientX;
  const data=getListData();rStartW=(data.colWidths||{})[col]||DEFAULT_LIST_W[col]||150;
  e.target.classList.add('active');
  const mm=ev=>{
    const nw=Math.max(1, rStartW+(ev.clientX-rStartX));
    document.querySelectorAll(`[data-col="${rCol}"]`).forEach(el=>{el.style.width=nw+'px';});
  };
  const mu=()=>{
    e.target.classList.remove('active');
    document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);
    const data2=getListData();if(!data2.colWidths)data2.colWidths={};
    const th=document.querySelector(`th[data-col="${rCol}"]`);if(th)data2.colWidths[rCol]=th.offsetWidth;
    saveListData(data2);
  };
  document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
}

function renderList(){
  const data=getListData();
  const cw=data.colWidths||{};
  const cols=data.cols;
  const thead=document.getElementById('list-thead');
  const tbody=document.getElementById('list-tbody');
  const empty=document.getElementById('list-empty');

  thead.innerHTML='<tr>'+cols.map(c=>{
    const w=cw[c]||DEFAULT_LIST_W[c]||150;
    const canDel=!FIXED_LIST.includes(c);
    return `<th data-col="${c}" style="width:${w}px;">
      <div class="th-inner">
        <input class="th-input" value="${c}" onblur="renameListCol('${c}',this.value)" onclick="event.stopPropagation()" ${FIXED_LIST.includes(c)?'readonly style="cursor:default;"':''}>
        ${canDel?`<span class="th-del" onclick="deleteListCol('${c}')">✕</span>`:''}
      </div>
      <div class="resizer" onmousedown="startResize(event,'${c}')"></div>
    </th>`;
  }).join('')+'<th style="width:56px;border:2px solid var(--border2);font-size:12px;color:var(--text3);text-align:center;">지표</th><th style="width:52px;border:2px solid var(--border2);"></th></tr>';

  if(!data.rows.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  tbody.innerHTML=data.rows.map((row,ri)=>`<tr>
    ${cols.map(c=>{
      const val=row[c]||'';
      const w=cw[c]||DEFAULT_LIST_W[c]||150;
      if(c==='종목')return `<td class="ticker-td" data-col="${c}" style="width:${w}px;" onclick="openInd('${val}')">${val}</td>`;
      if(c==='날짜')return `<td data-col="${c}" style="width:${w}px;padding:0;"><input type="date" value="${val}" onchange="updateListCell(${ri},'${c}',this.value)" style="width:100%;background:transparent;border:none;color:var(--text2);font-size:13px;font-family:'DM Mono',monospace;outline:none;padding:9px 11px;"></td>`;
      return `<td data-col="${c}" style="width:${w}px;"><div class="ce-cell" contenteditable="true" onblur="updateListCellCE(this,${ri},'${c}')" placeholder="${c}...">${val}</div></td>`;
    }).join('')}
    <td style="width:56px;text-align:center;padding:8px;border:2px solid var(--border2);">
      <button class="btn" style="font-size:12px;padding:4px 8px;" onclick="openInd('${row['종목']}')">체크</button>
    </td>
    <td style="width:52px;text-align:center;padding:8px;border:2px solid var(--border2);">
      <button class="del-btn" onclick="deleteListRow(${ri})">삭제</button>
    </td>
  </tr>`).join('');
  setTimeout(function(){if(window.initAllTopScrolls)window.initAllTopScrolls();},50);
}

// 지표 체크
function openInd(ticker){
  if(!ticker)return;
  selectedTicker=ticker;
  document.getElementById('ind-ticker-title').textContent=ticker;
  document.getElementById('selected-ticker-name').textContent=ticker;
  document.getElementById('tab-btn-ind').classList.remove('hidden');
  showTab('ind');
  const today=todayStr();
  document.getElementById('ind-date').value=today;
  const indData=getIndData(ticker);
  if(!indData.dates.includes(today)){indData.dates.push(today);saveIndData(ticker,indData);}
  renderDateChips();loadIndData();
}

function addDateAndLoad(){
  const today=todayStr();
  const indData=getIndData(selectedTicker);
  if(!indData.dates.includes(today)){indData.dates.push(today);saveIndData(selectedTicker,indData);}
  document.getElementById('ind-date').value=today;
  renderDateChips();loadIndData();showConfirm('오늘 날짜 추가됨');
}

function renderDateChips(){
  const indData=getIndData(selectedTicker);
  const curDate=document.getElementById('ind-date').value;
  const sorted=[...indData.dates].sort((a,b)=>b.localeCompare(a));
  document.getElementById('date-chips').innerHTML=sorted.map(d=>`
    <span class="date-chip${d===curDate?' on':''}" onclick="selectDate('${d}')">${d.slice(5)}</span>`).join('');
}

function selectDate(d){
  document.getElementById('ind-date').value=d;
  renderDateChips();loadIndData();
}

function loadIndData(){
  const date=document.getElementById('ind-date').value;
  const indData=getIndData(selectedTicker);
  renderIndList(indData,date);
  renderScore(indData,date);
}

function renderScore(indData,date){
  const checks=indData.data[date]||{};
  const total=indData.indicators.length;
  const yn=indData.indicators.filter((_,i)=>!TEXT_IND_IDX.includes(i));
  const yCount=yn.filter((_,i)=>{
    const realI=indData.indicators.indexOf(_);
    return checks[realI]==='Y';
  }).length;
  const pct=yn.length?Math.round(yCount/yn.length*100):0;
  const wrap=document.getElementById('ind-score-wrap');
  const cls=pct>=80?'good':pct>=50?'':'bad';
  wrap.innerHTML=`<span class="score-badge ${cls}">${yCount}/${yn.length} (${pct}%)</span>`;
}

function renderIndList(indData,date){
  const checks=indData.data[date]||{};
  document.getElementById('ind-list').innerHTML=indData.indicators.map((ind,i)=>{
    const isText=TEXT_IND_IDX.includes(i);
    const val=checks[i]||'';
    return `<div class="ind-row">
      <span class="ind-num">${i+1}</span>
      <div class="ind-text"><input value="${ind}" onblur="renameIndicator(${i},this.value)" placeholder="지표명..."></div>
      ${isText
        ?`<div class="ind-note"><input value="${val}" onblur="setIndVal(${i},this.value)" placeholder="직접 입력..."></div>`
        :`<div class="yn-btns">
            <button class="yn-btn y ${val==='Y'?'on':''}" onclick="setIndVal(${i},'Y')">Y</button>
            <button class="yn-btn n ${val==='N'?'on':''}" onclick="setIndVal(${i},'N')">N</button>
          </div>`
      }
      <span class="ind-del" onclick="deleteIndicator(${i})">×</span>
    </div>`;
  }).join('');
}

function setIndVal(idx,val){
  const date=document.getElementById('ind-date').value;if(!date)return;
  const indData=getIndData(selectedTicker);
  if(!indData.data[date])indData.data[date]={};
  // Y/N 토글
  if(val==='Y'||val==='N'){
    indData.data[date][idx]=(indData.data[date][idx]===val)?'':val;
  } else {
    indData.data[date][idx]=val;
  }
  saveIndData(selectedTicker,indData);
  renderIndList(indData,date);renderScore(indData,date);
}

function renameIndicator(idx,val){
  if(!val?.trim())return;
  const indData=getIndData(selectedTicker);
  indData.indicators[idx]=val.trim();
  saveIndData(selectedTicker,indData);
}

function addIndicator(){
  const indData=getIndData(selectedTicker);
  indData.indicators.push('새 지표');
  saveIndData(selectedTicker,indData);
  const date=document.getElementById('ind-date').value;
  renderIndList(indData,date);
}

function deleteIndicator(idx){
  if(!confirm('지표 삭제?'))return;
  const indData=getIndData(selectedTicker);
  indData.indicators.splice(idx,1);
  // 데이터에서도 제거
  Object.keys(indData.data).forEach(date=>{
    const newData={};
    Object.entries(indData.data[date]).forEach(([k,v])=>{
      const ki=parseInt(k);if(ki<idx)newData[ki]=v;else if(ki>idx)newData[ki-1]=v;
    });
    indData.data[date]=newData;
  });
  saveIndData(selectedTicker,indData);
  const date=document.getElementById('ind-date').value;
  renderIndList(indData,date);renderScore(indData,date);
}

function exportExcel(){
  const data=getListData();
  if(!data.rows.length){showConfirm('데이터가 없어요');return;}
  const rows=[data.cols,...data.rows.map(r=>data.cols.map(c=>r[c]||''))];
  const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'포트폴리오',ws);
  const d=new Date();XLSX.writeFile(wb,'portfolio_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx');
  showConfirm('다운로드 완료!');
}

function showTab(t){
  document.getElementById('pane-list').classList.toggle('hidden',t!=='list');
  document.getElementById('pane-ind').classList.toggle('hidden',t!=='ind');
  document.getElementById('tab-btn-list').classList.toggle('on',t==='list');
  document.getElementById('tab-btn-ind').classList.toggle('on',t==='ind');
}

/* [수정] localStorage 먼저 렌더 → Firebase 재렌더 */
renderList();
fbSync(()=>{
  if(window._editing)return;
  renderList();
  setTimeout(function(){if(window.initAllTopScrolls)window.initAllTopScrolls();},100);
});
</script>

<script>
// textarea auto-resize
document.addEventListener('input',function(e){
  if(e.target.tagName==='TEXTAREA'){
    e.target.style.height='auto';
    e.target.style.height=Math.min(e.target.scrollHeight,400)+'px';
  }
});
// 테이블 셀 키보드 네비게이션
document.addEventListener('keydown',function(e){
  const el=document.activeElement;if(!el)return;
  const isInput=el.tagName==='INPUT'||el.tagName==='TEXTAREA';if(!isInput)return;
  const td=el.closest('td');if(!td)return;
  const tr=td.closest('tr');if(!tr)return;
  const table=tr.closest('table');if(!table)return;
  if(e.key==='Tab'){
    e.preventDefault();
    const allCells=Array.from(table.querySelectorAll('tbody td input,tbody td textarea'));
    const curIdx=allCells.indexOf(el);if(curIdx<0)return;
    const nextIdx=e.shiftKey?curIdx-1:curIdx+1;
    if(nextIdx>=0&&nextIdx<allCells.length){allCells[nextIdx].focus();if(allCells[nextIdx].select)allCells[nextIdx].select();}
  }
});
</script>
<script>
/* ============================================================
   CONTENTEDITABLE RICH TEXT ENGINE
   - 텍스트 선택 후 미니 툴바: 볼드, 글자색, 형광펜
   - 저장: innerHTML (기존 plain text도 그대로 읽힘)
   - 툴바는 선택 영역 위에 자동 위치
   ============================================================ */

(function(){
  const TOOLBAR_ID = 'ce-toolbar';
  const COLORS = ['#fbbf24','#fb7185','#34d399','#60a5fa','#a78bfa','#f97316','#ffffff','#000000'];
  const HIGHLIGHTS = ['#fbbf2440','#fb718540','#34d39940','#60a5fa40','#a78bfa40','rgba(251,191,36,0.35)','rgba(251,113,133,0.35)','rgba(52,211,153,0.35)'];

  function getOrCreateToolbar(){
    let tb = document.getElementById(TOOLBAR_ID);
    if(tb) return tb;
    tb = document.createElement('div');
    tb.id = TOOLBAR_ID;
    tb.style.cssText = `
      position:fixed;z-index:9999;
      background:#1c1c1f;border:1px solid rgba(255,255,255,0.25);
      border-radius:8px;padding:6px 8px;
      display:none;flex-wrap:wrap;gap:4px;align-items:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
      max-width:320px;
    `;

    // 볼드
    const bold = document.createElement('button');
    bold.textContent = 'B';
    bold.style.cssText = 'font-weight:700;font-size:13px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:#f0f0f0;border-radius:4px;padding:3px 8px;cursor:pointer;font-family:DM Mono,monospace;';
    bold.title = '볼드';
    bold.onmousedown = e => { e.preventDefault(); document.execCommand('bold'); };
    tb.appendChild(bold);

    // 구분선
    const sep1 = document.createElement('div');
    sep1.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep1);

    // 글자색 라벨
    const lbl1 = document.createElement('span');
    lbl1.textContent = 'A';
    lbl1.style.cssText = 'font-size:11px;color:#999;font-family:DM Mono,monospace;';
    tb.appendChild(lbl1);

    // 글자색 팔레트
    COLORS.forEach(c => {
      const dot = document.createElement('button');
      dot.style.cssText = `width:16px;height:16px;border-radius:50%;background:${c};border:1px solid rgba(255,255,255,0.3);cursor:pointer;padding:0;flex-shrink:0;`;
      dot.title = c;
      dot.onmousedown = e => { e.preventDefault(); document.execCommand('foreColor', false, c); };
      tb.appendChild(dot);
    });

    // 구분선
    const sep2 = document.createElement('div');
    sep2.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep2);

    // 형광펜 라벨
    const lbl2 = document.createElement('span');
    lbl2.style.cssText = 'font-size:13px;color:#999;';
    lbl2.textContent = '🖍';
    tb.appendChild(lbl2);

    // 형광펜 팔레트
    HIGHLIGHTS.forEach(c => {
      const dot = document.createElement('button');
      dot.style.cssText = `width:16px;height:16px;border-radius:3px;background:${c};border:1px solid rgba(255,255,255,0.3);cursor:pointer;padding:0;flex-shrink:0;`;
      dot.title = '형광펜';
      dot.onmousedown = e => {
        e.preventDefault();
        document.execCommand('hiliteColor', false, c);
      };
      tb.appendChild(dot);
    });

    // 구분선
    const sep3 = document.createElement('div');
    sep3.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep3);

    // 서식 제거
    const clr = document.createElement('button');
    clr.textContent = '✕';
    clr.title = '서식 제거';
    clr.style.cssText = 'font-size:12px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:#999;border-radius:4px;padding:3px 7px;cursor:pointer;';
    clr.onmousedown = e => { e.preventDefault(); document.execCommand('removeFormat'); };
    tb.appendChild(clr);

    document.body.appendChild(tb);
    tb.style.display = 'flex';
    tb.style.display = 'none';
    return tb;
  }

  function showToolbar(){
    const sel = window.getSelection();
    if(!sel || sel.isCollapsed || !sel.toString().trim()) { hideToolbar(); return; }
    // contenteditable 안에서만
    let node = sel.anchorNode;
    while(node && node.nodeType !== 1) node = node.parentNode;
    if(!node || !node.closest('[contenteditable="true"]')) { hideToolbar(); return; }

    const tb = getOrCreateToolbar();
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    tb.style.display = 'flex';
    const tbW = tb.offsetWidth || 300;
    let left = rect.left + (rect.width/2) - (tbW/2);
    let top = rect.top - tb.offsetHeight - 8 + window.scrollY;
    if(left < 4) left = 4;
    if(left + tbW > window.innerWidth - 4) left = window.innerWidth - tbW - 4;
    if(top < window.scrollY + 4) top = rect.bottom + 8 + window.scrollY;
    tb.style.left = left + 'px';
    tb.style.top = top + 'px';
  }

  function hideToolbar(){
    const tb = document.getElementById(TOOLBAR_ID);
    if(tb) tb.style.display = 'none';
  }

  document.addEventListener('mouseup', () => setTimeout(showToolbar, 10));
  document.addEventListener('keyup', () => setTimeout(showToolbar, 10));
  document.addEventListener('mousedown', e => {
    const tb = document.getElementById(TOOLBAR_ID);
    if(tb && !tb.contains(e.target)) hideToolbar();
  });
  document.addEventListener('scroll', hideToolbar, true);

  window.CE_ENGINE_LOADED = true;
})();

</script>


<script>
/* ============================================================
   SAVE ENGINE v2 - 수동저장만 / 자동저장 없음
   - 💾 버튼: 모든 CE셀 innerHTML 수집 → localStorage → Firebase
   - 실제 Firebase 완료 후에만 ✅ 저장됨 표시
   - 가짜 저장됨 표시 없음
   ============================================================ */
(function(){
  function pad(n){return String(n).padStart(2,'0');}
  function nowTime(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}

  function getBar(){
    let bar=document.getElementById('save-status-bar');
    if(bar)return bar;
    bar=document.createElement('div');
    bar.id='save-status-bar';
    bar.style.cssText='position:fixed;bottom:0;left:0;right:0;height:30px;background:#141416;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:9998;font-family:\'DM Mono\',monospace;font-size:12px;color:#888;';
    bar.innerHTML='<span id="save-status-msg">준비됨</span>'
      +'<button onclick="window.manualSave&&window.manualSave()" style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:4px;color:#fbbf24;font-size:12px;padding:3px 10px;cursor:pointer;font-family:\'DM Mono\',monospace;">💾 저장</button>';
    document.body.appendChild(bar);
    document.body.style.paddingBottom='38px';
    return bar;
  }
  function setMsg(msg,color){
    getBar();
    const el=document.getElementById('save-status-msg');
    if(el){el.textContent=msg;el.style.color=color||'#888';}
  }
  window.manualSave=async function(){
    setMsg('저장 중...','#fbbf24');
    try{
      const active=document.activeElement;
      if(active&&active.classList&&active.classList.contains('ce-cell'))active.blur();
      const d={};
      for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&!k.startsWith('mstage_'))d[k]=localStorage.getItem(k);}
      if(!Object.keys(d).length){setMsg('저장할 데이터 없음','#fb7185');return;}
      if(typeof db!=='undefined'&&typeof UID!=='undefined'){
        await db.collection('data').doc(UID).set(d,{merge:true});
        setMsg('✅ 저장됨 '+nowTime(),'#34d399');
      }else{
        setMsg('✅ 로컬 저장됨 '+nowTime(),'#fbbf24');
      }
    }catch(e){
      setMsg('❌ 저장 실패: '+e.message,'#fb7185');
      console.error('저장 실패:',e);
    }
  };
  window.fbSaveWithStatus=window.manualSave;
  /* CE셀 포커스 추적 - fbSync 재렌더 방지용 */
  document.addEventListener('focusin',function(e){
    if(e.target.classList&&e.target.classList.contains('ce-cell'))window._editing=true;
  });
  document.addEventListener('focusout',function(e){
    if(e.target.classList&&e.target.classList.contains('ce-cell')){
      setTimeout(function(){if(!document.querySelector('.ce-cell:focus'))window._editing=false;},150);
    }
  });
  window.SAVE_ENGINE_LOADED=true;
  setTimeout(function(){getBar();setMsg('준비됨','#888');},300);
})();
</script>
<script>
/* ============================================================
   TOP SCROLL ENGINE v3
   - position:fixed, nav+toolbar 높이 동적계산
   - 셀렉터 확대: .tbl-outer, .tbl-wrap, id*=tbl, div[overflow-x:auto]
   ============================================================ */
(function(){
  let activeWrap=null,syncing=false;
  function getNavBottom(){
    const nav=document.querySelector('.nav'),tb=document.querySelector('.toolbar');
    let top=nav?nav.getBoundingClientRect().bottom:56;
    if(tb){const r=tb.getBoundingClientRect();if(r.top<=top+2)top=r.bottom;}
    return Math.round(top);
  }
  function getOrCreateBar(){
    let bar=document.getElementById('top-scroll-fixed');
    if(bar)return bar;
    bar=document.createElement('div');
    bar.id='top-scroll-fixed';
    bar.style.cssText='position:fixed;left:0;right:0;height:14px;overflow-x:auto;overflow-y:hidden;z-index:998;background:#1c1c1f;border-bottom:2px solid rgba(251,191,36,0.3);display:none;cursor:pointer;';
    const dummy=document.createElement('div');
    dummy.id='top-scroll-dummy';dummy.style.height='1px';
    bar.appendChild(dummy);document.body.appendChild(bar);
    bar.addEventListener('scroll',function(){
      if(syncing||!activeWrap)return;
      syncing=true;activeWrap.scrollLeft=bar.scrollLeft;syncing=false;
    });
    return bar;
  }
  function syncBar(wrap){
    const bar=getOrCreateBar(),dummy=document.getElementById('top-scroll-dummy');
    const tbl=wrap.querySelector('table');
    if(!tbl){bar.style.display='none';return;}
    activeWrap=wrap;
    dummy.style.width=tbl.scrollWidth+'px';
    bar.scrollLeft=wrap.scrollLeft;
    bar.style.top=getNavBottom()+'px';
    bar.style.display=tbl.scrollWidth>wrap.clientWidth?'block':'none';
  }
  window.initTopScrollFixed=function(el){
    if(!el||el.dataset.tsFixed)return;
    el.dataset.tsFixed='1';
    el.addEventListener('scroll',function(){
      if(syncing)return;syncing=true;
      const bar=document.getElementById('top-scroll-fixed');
      if(bar)bar.scrollLeft=el.scrollLeft;
      syncing=false;
    });
    /* mouseenter + 스크롤 위치 기반으로 활성 테이블 감지 */
    el.addEventListener('mouseenter',function(){syncBar(el);});
    el.addEventListener('focusin',function(){syncBar(el);});
    el.addEventListener('click',function(){syncBar(el);});
    const obs=new ResizeObserver(function(){if(activeWrap===el)syncBar(el);});
    const tbl=el.querySelector('table');if(tbl)obs.observe(tbl);
    syncBar(el);
  };
  window.initAllTopScrolls=function(){
    document.querySelectorAll('.tbl-outer,.tbl-wrap,.ex-table-wrap').forEach(function(el){
      if(el.querySelector('table'))window.initTopScrollFixed(el);
    });
    document.querySelectorAll('[id*="tbl-outer"],[id*="tbl-wrap"],[id*="tbl-outer-s"]').forEach(function(el){
      if(el.querySelector('table'))window.initTopScrollFixed(el);
    });
    document.querySelectorAll('div').forEach(function(el){
      if(el.style&&el.style.overflowX==='auto'&&el.querySelector('table'))window.initTopScrollFixed(el);
    });
    /* 페이지 스크롤 시 현재 화면에 보이는 테이블 자동 감지 */
    window.addEventListener('scroll',function(){
      const bar=document.getElementById('top-scroll-fixed');
      if(!bar)return;
      /* 화면에 보이는 overflow-x:auto div 중 테이블 있는 것 찾기 */
      let found=null;
      document.querySelectorAll('.tbl-outer,.tbl-wrap,.ex-table-wrap,div[style]').forEach(function(el){
        if(!el.querySelector('table'))return;
        if(el.style&&el.style.overflowX!=='auto'&&!el.classList.contains('tbl-outer')&&!el.classList.contains('tbl-wrap')&&!el.classList.contains('ex-table-wrap'))return;
        const r=el.getBoundingClientRect();
        if(r.top<window.innerHeight&&r.bottom>0){found=el;}
      });
      if(found)syncBar(found);
    },true);
  };
  window.TOP_SCROLL_V3_LOADED=true;
})();
</script>
</body>
