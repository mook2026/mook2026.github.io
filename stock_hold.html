<script>
const FB_CONFIG={apiKey:"AIzaSyBh9LtC02jCwyrURkl676UFxtHU2SdSkkI",authDomain:"ian-dashboard.firebaseapp.com",projectId:"ian-dashboard",storageBucket:"ian-dashboard.firebasestorage.app",messagingSenderId:"47067460467",appId:"1:47067460467:web:37906ad2ddb74133238b06"};
if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);
const db=firebase.firestore();const UID='ian';
async function fbSave(){try{const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)d[k]=localStorage.getItem(k);}await db.collection('data').doc(UID).set(d,{merge:true});}catch(e){console.warn('FB:',e);}}
async function fbSync(cb){try{const doc=await db.collection('data').doc(UID).get();if(doc.exists){Object.entries(doc.data()).forEach(([k,v])=>localStorage.setItem(k,v));}}catch(e){console.warn('FB:',e);}if(cb)cb();}
</script>
<style>
:root{--bg:#0c0c0e;--bg2:#141416;--bg3:#1c1c1f;--border:rgba(255,255,255,0.2);--border2:rgba(255,255,255,0.3);--text:#f0f0f0;--text2:#ccc;--text3:#999;--stock:#fbbf24;--pos:#34d399;--neg:#fb7185;--r:10px;--r-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:17px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-back{font-size:22px;color:var(--text2);text-decoration:none;}
.nav-logo{font-family:'DM Mono',monospace;font-size:15px;color:var(--text2);letter-spacing:0.06em;}
.nav-date{font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);}
.toolbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.btn{font-size:15px;padding:9px 18px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--stock);color:var(--stock);}
.btn.primary{border-color:var(--stock);color:var(--stock);}
.confirm-bar{font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);padding:8px 20px;min-height:32px;}
.wrap{padding:20px;}
.divider{height:1px;background:var(--border);margin:28px 0;}
.sec-title{font-size:18px;font-weight:600;color:var(--stock);margin-bottom:6px;}
.sec-sub{font-size:14px;color:var(--text3);margin-bottom:14px;}

/* 요약 카드 */
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;}
.sum-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.sum-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--stock);}
.sum-val.pos{color:var(--pos)}.sum-val.neg{color:var(--neg)}

/* 월별 실현손익 */
.mo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.mo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;text-align:center;position:relative;overflow:hidden;}
.mo-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.mo-card.achieved::after{background:var(--pos);}
.mo-card.failed::after{background:var(--neg);}
.mo-card.current::after{background:var(--stock);}
.mo-card.future::after{background:var(--border2);}
.mo-month{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:6px;}
.mo-badge{font-size:12px;}
.mo-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;}
.mo-val.pos{color:var(--pos)}.mo-val.neg{color:var(--neg)}.mo-val.neutral{color:var(--text3);}
.mo-goal{font-size:13px;color:var(--text3);margin-top:3px;}
.mo-pct{font-family:'DM Mono',monospace;font-size:12px;margin-top:4px;}
.mo-pct.pos{color:var(--pos)}.mo-pct.neg{color:var(--neg)}.mo-pct.neutral{color:var(--text3);}
.mo-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden;}
.mo-fill{height:100%;border-radius:2px;}

/* 매매 월별 */
.month-group{margin-bottom:12px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.month-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg2);cursor:pointer;transition:background .15s;}
.month-header:hover{background:var(--bg3);}
.month-header-left{display:flex;align-items:center;gap:12px;}
.month-label{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--text);}
.month-stats{display:flex;gap:12px;}
.month-stat{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);}
.month-stat.pos{color:var(--pos)}.month-stat.neg{color:var(--neg)}
.month-toggle{font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);transition:transform .2s;}
.month-toggle.open{transform:rotate(180deg);}
.month-body{overflow:hidden;}

/* 테이블 */
.tbl-outer{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:15px;}
th{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);padding:12px 14px;border:2px solid var(--border2);background:var(--bg2);text-align:left;white-space:nowrap;}
td{padding:0;border:2px solid var(--border2);vertical-align:middle;}
td input{width:100%;background:transparent;border:none;color:var(--text);font-size:15px;padding:10px 12px;font-family:'Noto Sans KR',sans-serif;outline:none;}
td input:focus{background:rgba(251,191,36,0.05);}
td.pos{color:var(--pos);font-weight:500;padding:10px 12px;font-family:'DM Mono',monospace;text-align:center;white-space:nowrap;}
td.neg{color:var(--neg);font-weight:500;padding:10px 12px;font-family:'DM Mono',monospace;text-align:center;white-space:nowrap;}
td.muted{color:var(--stock);padding:10px 12px;font-family:'DM Mono',monospace;text-align:center;white-space:nowrap;}
td.center{padding:10px 12px;text-align:center;color:var(--text2);}
tr:hover td{background:rgba(255,255,255,0.02);}
.del-btn{font-size:13px;color:var(--text3);cursor:pointer;padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:transparent;transition:all .15s;}
.del-btn:hover{border-color:var(--neg);color:var(--neg);}
.add-row-btn{width:100%;padding:13px;font-size:15px;font-family:'DM Mono',monospace;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.add-row-btn:hover{border-color:var(--stock);color:var(--stock);}
.empty-msg{text-align:center;padding:36px;color:var(--text3);font-size:15px;font-family:'DM Mono',monospace;}
.pl-table{width:100%;border-collapse:collapse;font-size:15px;}
.pl-table th{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);padding:12px 14px;border:2px solid var(--border2);background:var(--bg2);text-align:left;}
.pl-table td{padding:12px 14px;border:2px solid var(--border2);color:var(--text2);}
.pl-table td.nm{color:var(--text);font-weight:600;}
.pl-table td.pos{color:var(--pos);font-weight:500;font-family:'DM Mono',monospace;}
.pl-table td.neg{color:var(--neg);font-weight:500;font-family:'DM Mono',monospace;}
.pl-table tr:hover td{background:rgba(255,255,255,0.02);}
.hidden{display:none!important;}
</style>
</head>

  <div class="nav-left"><a class="nav-back" href="home.html">←</a><div class="nav-logo">매매실적 및 보유종목</div></div>

</div>
<div class="toolbar">

<div class="wrap">

    <div><div class="sec-title">매매 실적 요약</div><div class="sec-sub">매매일지 기준 자동 집계</div></div>

<script>
const GOALS={4:700000,5:1000000,6:1000000,7:1200000,8:1300000,9:1400000,10:1500000,11:1500000,12:1500000};
const DEFAULT_HOLD_COLS=['증권사','계좌','종목명','종목코드','매수일','수량','매수가','현재가','수익률(%)','평가손익','목표가','손절가','매수사유'];
const FIXED_HOLD=['증권사','계좌','종목명'];
const DAYS=['일','월','화','수','목','금','토'];
const openMonths=new Set();

function pad(n){return String(n).padStart(2,'0');}
function ls(k){return localStorage.getItem(k);}
function lss(k,v){localStorage.setItem(k,v);}
function showConfirm(msg){const el=document.getElementById('confirm-bar');el.textContent=msg;setTimeout(()=>el.textContent='',3000);}
function getHoldData(){return JSON.parse(ls('hold_tbl')||JSON.stringify({cols:[...DEFAULT_HOLD_COLS],rows:[]}));}
function saveHoldData(d){lss('hold_tbl',JSON.stringify(d));fbSave();}
function getTradeData(){return JSON.parse(ls('trade_tbl')||JSON.stringify({cols:[],rows:[]}));}

function calcHoldRow(row){
  const buy=parseFloat(row['매수가'])||0,cur=parseFloat(row['현재가'])||0,qty=parseFloat(row['수량'])||0;
  if(buy&&cur){row['수익률(%)']=((cur-buy)/buy*100).toFixed(2);if(qty)row['평가손익']=Math.round((cur-buy)*qty).toString();}
  return row;
}

function refreshAll(){
  const trade=getTradeData();
  const rows=trade.rows||[];
  const closed=rows.filter(r=>r['매도가']&&parseFloat(r['매도가'])>0);
  const pcts=closed.map(r=>parseFloat(r['수익률(%)'])).filter(p=>!isNaN(p));
  const wins=pcts.filter(p=>p>0);
  const wr=pcts.length?Math.round(wins.length/pcts.length*100):0;
  const avgWin=wins.length?wins.reduce((a,b)=>a+b,0)/wins.length:0;
  const totalPL=closed.reduce((a,r)=>a+(parseInt(r['실현손익'])||0),0);

  document.getElementById('sum-total').textContent=rows.length;
  document.getElementById('sum-closed').textContent=closed.length;
  document.getElementById('sum-wr').textContent=pcts.length?wr+'%':'-';
  document.getElementById('sum-wr').className='sum-val '+(wr>=60?'pos':wr>0?'':'neg');
  document.getElementById('sum-avg').textContent=wins.length?'+'+avgWin.toFixed(1)+'%':'-';
  const plEl=document.getElementById('sum-pl');
  plEl.textContent=totalPL?(totalPL>0?'+':'')+totalPL.toLocaleString()+'원':'-';
  plEl.className='sum-val '+(totalPL>0?'pos':totalPL<0?'neg':'');

  renderMonthly(closed);
  renderByStock(closed);
  renderTradeMonths(rows);
}

function renderMonthly(closed){
  const el=document.getElementById('mo-grid');
  const curM=new Date().getMonth()+1;
  const curY=new Date().getFullYear();
  el.innerHTML=[4,5,6,7,8,9,10,11,12].map(m=>{
    const g=GOALS[m]||0;
    const mRows=closed.filter(r=>{
      const d=r['날짜']||'';
      return d&&parseInt(d.split('-')[1])===m&&parseInt(d.split('-')[0])===curY;
    });
    const actual=mRows.reduce((a,r)=>a+(parseInt(r['실현손익'])||0),0);
    const hasData=mRows.length>0;
    const pct=hasData?Math.min(200,Math.round(actual/g*100)):0;
    const isPast=m<curM;const isCur=m===curM;const isFuture=m>curM;
    const achieved=isPast&&actual>=g;
    const failed=isPast&&actual<g&&hasData;
    let cls=isCur?'current':achieved?'achieved':failed?'failed':'future';
    let badge=isCur?'●':achieved?'✓':failed?'✗':'';
    const barColor=actual>=g?'var(--pos)':actual>0?'var(--stock)':'var(--neg)';
    return `<div class="mo-card ${cls}">
      <div class="mo-month">${m}월 <span class="mo-badge">${badge}</span></div>
      <div class="mo-val ${actual>0?'pos':actual<0?'neg':'neutral'}">${hasData?(actual>=0?'+':'')+actual.toLocaleString()+'원':'-'}</div>
      <div class="mo-goal">목표 ${(g/10000).toFixed(0)}만원</div>
      <div class="mo-pct ${pct>=100?'pos':pct>0?'neutral':'neg'}">${hasData?pct+'%':''}</div>
      <div class="mo-bar"><div class="mo-fill" style="width:${Math.min(100,pct)}%;background:${barColor};"></div></div>
    </div>`;
  }).join('');
}

function renderByStock(closed){
  const byStock={};
  closed.forEach(r=>{
    const nm=r['종목']||r['종목명']||'-';
    if(!byStock[nm])byStock[nm]={count:0,wins:0,pcts:[],pl:0};
    byStock[nm].count++;
    const p=parseFloat(r['수익률(%)']);
    if(!isNaN(p)){byStock[nm].pcts.push(p);if(p>0)byStock[nm].wins++;}
    byStock[nm].pl+=parseInt(r['실현손익'])||0;
  });
  const tbody=document.getElementById('pl-tbody');
  const empty=document.getElementById('pl-empty');
  const entries=Object.entries(byStock);
  if(!entries.length){tbody.innerHTML='';empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');
  tbody.innerHTML=entries.sort((a,b)=>b[1].pl-a[1].pl).map(([nm,s])=>{
    const wr2=s.pcts.length?Math.round(s.wins/s.pcts.length*100):0;
    const avg=s.pcts.length?s.pcts.reduce((a,b)=>a+b,0)/s.pcts.length:0;
    return `<tr>
      <td class="nm" style="padding:12px 14px;">${nm}</td>
      <td style="padding:12px 14px;font-family:'DM Mono',monospace;">${s.count}회</td>
      <td class="${wr2>=60?'pos':'neg'}" style="padding:12px 14px;">${wr2}%</td>
      <td class="${avg>=0?'pos':'neg'}" style="padding:12px 14px;">${avg>=0?'+':''}${avg.toFixed(1)}%</td>
      <td class="${s.pl>=0?'pos':'neg'}" style="padding:12px 14px;">${s.pl>=0?'+':''}${s.pl.toLocaleString()}원</td>
    </tr>`;
  }).join('');
}

function renderTradeMonths(rows){
  const curM=new Date().getMonth()+1;
  const curY=new Date().getFullYear();
  const byMonth={};
  rows.forEach(r=>{
    const d=r['날짜']||'';
    if(!d)return;
    const key=d.slice(0,7);
    if(!byMonth[key])byMonth[key]=[];
    byMonth[key].push(r);
  });
  const sorted=Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));
  const trade=getTradeData();
  const cols=trade.cols||[];
  const container=document.getElementById('trade-months');
  if(!sorted.length){container.innerHTML='<div class="empty-msg">매매 기록이 없어요</div>';return;}

  // 현재월 기본 오픈
  const curKey=curY+'-'+pad(curM);
  if(!openMonths.has('_init')){openMonths.add(curKey);openMonths.add('_init');}

  container.innerHTML=sorted.map(key=>{
    const mRows=byMonth[key];
    const pl=mRows.reduce((a,r)=>a+(parseInt(r['실현손익'])||0),0);
    const pcts=mRows.map(r=>parseFloat(r['수익률(%)'])).filter(p=>!isNaN(p));
    const wr=pcts.length?Math.round(pcts.filter(p=>p>0).length/pcts.length*100):0;
    const isOpen=openMonths.has(key);
    const [y,m]=key.split('-');
    const label=y+'년 '+parseInt(m)+'월';

    const tableRows=mRows.map((r,ri)=>`<tr>${cols.map(c=>{
      const val=r[c]||'';
      if(c==='수익률(%)'){const p=parseFloat(val);return `<td class="${isNaN(p)?'muted':p>0?'pos':'neg'}" style="font-family:'DM Mono',monospace;padding:10px 12px;text-align:center;">${val?val+'%':'진행중'}</td>`;}
      if(c==='실현손익'){const pv=parseInt(val)||0;return `<td class="${pv>0?'pos':pv<0?'neg':'muted'}" style="font-family:'DM Mono',monospace;padding:10px 12px;text-align:center;">${pv?pv.toLocaleString()+'원':'-'}</td>`;}
      if(c==='정상/뇌동')return `<td class="center" style="color:${val==='뇌동'?'var(--neg)':'var(--pos)'};">${val||'-'}</td>`;
      return `<td><input type="text" value="${String(val).replace(/"/g,'&quot;')}" readonly style="color:var(--text2);cursor:default;"></td>`;
    }).join('')}</tr>`).join('');

    return `<div class="month-group">
      <div class="month-header" onclick="toggleMonth('${key}')">
        <div class="month-header-left">
          <span class="month-label">${label}</span>
          <div class="month-stats">
            <span class="month-stat">${mRows.length}건</span>
            <span class="month-stat ${wr>=60?'pos':'neg'}">승률 ${wr}%</span>
            <span class="month-stat ${pl>=0?'pos':'neg'}">${pl>=0?'+':''}${pl.toLocaleString()}원</span>
          </div>
        </div>
        <span class="month-toggle ${isOpen?'open':''}">▼</span>
      </div>
      <div class="month-body ${isOpen?'':'hidden'}" id="month-body-${key}">
        <div class="tbl-outer">
          <table><thead><tr>${cols.map(c=>`<th style="min-width:${['매수사유','재료','시나리오'].includes(c)?'180px':'110px'};">${c}</th>`).join('')}</tr></thead>
          <tbody>${tableRows}</tbody></table>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleMonth(key){
  if(openMonths.has(key))openMonths.delete(key);
  else openMonths.add(key);
  const body=document.getElementById('month-body-'+key);
  const toggle=body.previousElementSibling.querySelector('.month-toggle');
  body.classList.toggle('hidden',!openMonths.has(key));
  toggle.classList.toggle('open',openMonths.has(key));
}

// 보유종목
function renderHoldTable(){
  const data=getHoldData();
  const thead=document.getElementById('hold-thead');
  const tbody=document.getElementById('hold-tbody');
  const empty=document.getElementById('hold-empty');
  thead.innerHTML='<tr>'+data.cols.map(c=>{
    const canDel=!FIXED_HOLD.includes(c);
    return `<th style="min-width:${['매수사유'].includes(c)?'160px':'110px'};">${c}${canDel?` <span onclick="deleteHoldCol('${c}')" style="cursor:pointer;color:var(--text3);font-size:12px;">✕</span>`:''}`;
  }).join('')+'<th style="min-width:60px;"></th></tr>';
  if(!data.rows.length){tbody.innerHTML='';empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');
  tbody.innerHTML=data.rows.map((row,ri)=>`<tr>${data.cols.map(c=>{
    const val=row[c]||'';
    if(c==='수익률(%)'){const p=parseFloat(val);return `<td class="${p>0?'pos':p<0?'neg':'center'}" style="font-family:'DM Mono',monospace;">${val?val+'%':'-'}</td>`;}
    if(c==='평가손익'){const pl=parseInt(val)||0;return `<td class="${pl>0?'pos':pl<0?'neg':'center'}" style="font-family:'DM Mono',monospace;">${pl?pl.toLocaleString()+'원':'-'}</td>`;}
    const isNum=['수량','매수가','현재가','목표가','손절가'].includes(c);
    return `<td><input type="${isNum?'number':'text'}" value="${String(val).replace(/"/g,'&quot;')}" onblur="updateHoldCell(${ri},'${c}',this.value)" placeholder="${c}..." style="font-family:${isNum?'\'DM Mono\',monospace':'inherit'};"></td>`;
  }).join('')}<td class="center"><button class="del-btn" onclick="deleteHoldRow(${ri})">삭제</button></td></tr>`).join('');
}

function addHoldRow(){const data=getHoldData();const row={};data.cols.forEach(c=>row[c]='');data.rows.unshift(row);saveHoldData(data);renderHoldTable();}
function addHoldCol(){const name=prompt('새 열 이름:');if(!name||!name.trim())return;const data=getHoldData();if(data.cols.includes(name.trim())){showConfirm('이미 있는 열');return;}data.cols.push(name.trim());data.rows.forEach(r=>r[name.trim()]=r[name.trim()]||'');saveHoldData(data);renderHoldTable();}
function deleteHoldRow(idx){if(!confirm('삭제할까요?'))return;const data=getHoldData();data.rows.splice(idx,1);saveHoldData(data);renderHoldTable();}
function deleteHoldCol(col){if(FIXED_HOLD.includes(col)){showConfirm('기본 열은 삭제할 수 없어요');return;}if(!confirm('"'+col+'" 열 삭제?'))return;const data=getHoldData();data.cols=data.cols.filter(c=>c!==col);data.rows.forEach(r=>delete r[col]);saveHoldData(data);renderHoldTable();}
function updateHoldCell(ri,col,val){const data=getHoldData();if(!data.rows[ri])return;data.rows[ri][col]=val;if(['매수가','현재가','수량'].includes(col))calcHoldRow(data.rows[ri]);saveHoldData(data);renderHoldTable();}

function exportExcel(){
  const data=getHoldData();if(!data.rows.length){showConfirm('데이터가 없어요');return;}
  const rows=[data.cols,...data.rows.map(r=>data.cols.map(c=>r[c]||''))];
  const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'보유종목',ws);
  const d=new Date();XLSX.writeFile(wb,'보유종목_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx');
  showConfirm('다운로드 완료!');
}

function importExcel(input,mode){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rawRows=XLSX.utils.sheet_to_json(ws,{header:1});
    if(rawRows.length<2){showConfirm('데이터가 없어요');return;}
    const headers=rawRows[0].map(h=>String(h||'').trim());
    const data=mode==='overwrite'?{cols:[...DEFAULT_HOLD_COLS],rows:[]}:getHoldData();
    headers.forEach(h=>{if(h&&!data.cols.includes(h))data.cols.push(h);});
    rawRows.slice(1).forEach(row=>{
      if(!row.some(v=>v))return;
      const r={};data.cols.forEach(c=>r[c]='');
      headers.forEach((h,i)=>{if(h&&row[i]!==undefined)r[h]=String(row[i]);});
      calcHoldRow(r);data.rows.push(r);
    });
    saveHoldData(data);renderHoldTable();
    showConfirm(mode==='overwrite'?'덮어쓰기 완료!':'추가 완료!');
  };
  reader.readAsBinaryString(file);input.value='';
}

const d=new Date();
document.getElementById('nav-date').textContent=d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+' '+DAYS[d.getDay()];
fbSync(()=>{refreshAll();renderHoldTable();});
</script>
