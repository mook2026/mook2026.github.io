<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매매실적 및 보유종목</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FB_CONFIG={apiKey:"AIzaSyBh9LtC02jCwyrURkl676UFxtHU2SdSkkI",authDomain:"ian-dashboard.firebaseapp.com",projectId:"ian-dashboard",storageBucket:"ian-dashboard.firebasestorage.app",messagingSenderId:"47067460467",appId:"1:47067460467:web:37906ad2ddb74133238b06"};
if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);
const db=firebase.firestore();const UID='ian';
async function fbSave(){try{const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)d[k]=localStorage.getItem(k);}await db.collection('data').doc(UID).set(d,{merge:true});}catch(e){console.warn('FB:',e);}}
async function fbSync(cb){try{const doc=await db.collection('data').doc(UID).get();if(doc.exists){Object.entries(doc.data()).forEach(([k,v])=>localStorage.setItem(k,v));}}catch(e){console.warn('FB:',e);}if(cb)cb();}
</script>
<style>
:root{--bg:#0c0c0e;--bg2:#141416;--bg3:#1c1c1f;--border:rgba(255,255,255,0.2);--border2:rgba(255,255,255,0.3);--text:#f0f0f0;--text2:#ccc;--text3:#999;--stock:#fbbf24;--pos:#34d399;--neg:#fb7185;--r:10px;--r-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-back{font-size:22px;color:var(--text2);text-decoration:none;}
.nav-logo{font-family:'DM Mono',monospace;font-size:14px;color:var(--text2);letter-spacing:0.06em;}
.nav-date{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);}
.toolbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.btn{font-size:14px;padding:8px 15px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--stock);color:var(--stock);}
.btn.primary{border-color:var(--stock);color:var(--stock);}
.confirm-bar{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);padding:7px 20px;min-height:30px;}
.wrap{padding:20px;}
.divider{height:1px;background:var(--border);margin:24px 0;}
.sec-title{font-size:17px;font-weight:600;color:var(--stock);margin-bottom:4px;}
.sec-sub{font-size:13px;color:var(--text3);margin-bottom:14px;}
.sec-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}

/* 요약 카드 */
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px;}
.sum-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.sum-val{font-family:'DM Mono',monospace;font-size:19px;font-weight:500;color:var(--stock);}
.sum-val.pos{color:var(--pos)}.sum-val.neg{color:var(--neg)}

/* 월별 실현손익 */
.mo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px;}
.mo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px;text-align:center;position:relative;overflow:hidden;}
.mo-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.mo-card.achieved::after{background:var(--pos);}
.mo-card.failed::after{background:var(--neg);}
.mo-card.current::after{background:var(--stock);}
.mo-card.future::after{background:var(--border2);}
.mo-month{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:5px;}
.mo-badge{font-size:11px;}
.mo-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;}
.mo-val.pos{color:var(--pos)}.mo-val.neg{color:var(--neg)}.mo-val.neutral{color:var(--text3);}
.mo-goal{font-size:12px;color:var(--text3);margin-top:3px;}
.mo-pct{font-family:'DM Mono',monospace;font-size:11px;margin-top:3px;}
.mo-pct.pos{color:var(--pos)}.mo-pct.neg{color:var(--neg)}.mo-pct.neutral{color:var(--text3);}
.mo-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:7px;overflow:hidden;}
.mo-fill{height:100%;border-radius:2px;}

/* 매매 월별 요약 */
.month-group{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.month-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--bg2);cursor:pointer;transition:background .15s;}
.month-header:hover{background:var(--bg3);}
.month-label{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text);}
.month-stats{display:flex;gap:14px;flex-wrap:wrap;}
.month-stat{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);}
.month-stat.pos{color:var(--pos)}.month-stat.neg{color:var(--neg)}
.month-toggle{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.month-toggle.open{transform:rotate(180deg);}
.month-body{overflow-x:auto;}

/* 테이블 */
.resizable-table{width:max-content;min-width:100%;border-collapse:collapse;table-layout:fixed;}
.resizable-table th{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);padding:10px 12px;border:2px solid var(--border2);background:var(--bg2);text-align:left;white-space:nowrap;position:relative;user-select:none;}
.resizable-table th .th-content{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.resizable-table th .th-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;}
.resizer{width:5px;height:100%;position:absolute;right:0;top:0;cursor:col-resize;background:transparent;z-index:1;}
.resizer:hover,.resizer.resizing{background:var(--stock);}
.resizable-table td{padding:0;border:2px solid var(--border2);vertical-align:middle;overflow:hidden;font-size:13px;}
.resizable-table td input{width:100%;background:transparent;border:none;color:var(--text);font-size:13px;padding:8px 10px;font-family:'Noto Sans KR',sans-serif;outline:none;box-sizing:border-box;}
.resizable-table td input:focus{background:rgba(251,191,36,0.05);}
td.pos-c{color:var(--pos);font-weight:500;padding:8px 10px;font-family:'DM Mono',monospace;text-align:center;white-space:nowrap;font-size:13px;}
td.neg-c{color:var(--neg);font-weight:500;padding:8px 10px;font-family:'DM Mono',monospace;text-align:center;white-space:nowrap;font-size:13px;}
td.muted-c{color:var(--stock);padding:8px 10px;font-family:'DM Mono',monospace;text-align:center;white-space:nowrap;font-size:13px;}
td.center-c{padding:8px 10px;text-align:center;color:var(--text2);font-size:13px;}
.resizable-table tr:hover td{background:rgba(255,255,255,0.02);}
.del-btn{font-size:12px;color:var(--text3);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;transition:all .15s;}
.del-btn:hover{border-color:var(--neg);color:var(--neg);}
.add-row-btn{width:100%;padding:12px;font-size:14px;font-family:'DM Mono',monospace;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.add-row-btn:hover{border-color:var(--stock);color:var(--stock);}
.empty-msg{text-align:center;padding:32px;color:var(--text3);font-size:14px;font-family:'DM Mono',monospace;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-left"><a class="nav-back" href="home.html">←</a><div class="nav-logo">매매실적 및 보유종목</div></div>
  <div class="nav-date" id="nav-date"></div>
</div>
<div class="toolbar">
  <button class="btn primary" onclick="addHoldRow()">+ 보유종목 추가</button>
  <button class="btn" onclick="addHoldCol()">+ 열 추가</button>
  <div style="width:1px;height:22px;background:var(--border2);flex-shrink:0;"></div>
  <label class="btn" style="cursor:pointer;">📂 추가<input type="file" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(this,'append')"></label>
  <label class="btn" style="cursor:pointer;">📂 덮어쓰기<input type="file" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(this,'overwrite')"></label>
  <button class="btn" onclick="exportExcel()">⬇ 다운로드</button>
</div>
<div class="confirm-bar" id="confirm-bar"></div>

<div class="wrap">
  <!-- ① 매매 실적 요약 -->
  <div class="sec-header">
    <div><div class="sec-title">매매 실적 요약</div><div class="sec-sub">매매일지 기준 자동 집계</div></div>
    <button class="btn" onclick="refreshAll()">↻ 새로고침</button>
  </div>
  <div class="summary-grid">
    <div class="sum-card"><div class="sum-lbl">총 매매</div><div class="sum-val" id="sum-total">0</div></div>
    <div class="sum-card"><div class="sum-lbl">완료 매매</div><div class="sum-val" id="sum-closed">0</div></div>
    <div class="sum-card"><div class="sum-lbl">승률</div><div class="sum-val" id="sum-wr">-</div></div>
    <div class="sum-card"><div class="sum-lbl">평균 수익률</div><div class="sum-val pos" id="sum-avg">-</div></div>
    <div class="sum-card"><div class="sum-lbl">총 실현손익</div><div class="sum-val" id="sum-pl">-</div></div>
  </div>

  <div class="divider"></div>

  <!-- ② 월별 실현손익 -->
  <div class="sec-title">월별 실현손익</div>
  <div class="sec-sub">목표 대비 달성 현황</div>
  <div class="mo-grid" id="mo-grid"></div>

  <div class="divider"></div>

  <!-- ③ 매매 기록 월별 요약 -->
  <div class="sec-title">매매 기록 (월별)</div>
  <div class="sec-sub">매매일지 연동 · 월별 1행 요약</div>
  <div id="trade-months"></div>

  <div class="divider"></div>

  <!-- ④ 보유종목 현황 -->
  <div class="sec-title">보유종목 현황</div>
  <div class="sec-sub">수동 입력 · 증권사/계좌별 관리</div>
  <div style="overflow-x:auto;">
    <table class="resizable-table" id="hold-table">
      <thead id="hold-thead"></thead>
      <tbody id="hold-tbody"></tbody>
    </table>
    <button class="add-row-btn" onclick="addHoldRow()">+ 보유종목 추가</button>
    <div id="hold-empty" class="empty-msg" style="display:none;">보유종목을 추가해주세요</div>
  </div>
</div>

<script>
const GOALS={4:700000,5:1000000,6:1000000,7:1200000,8:1300000,9:1400000,10:1500000,11:1500000,12:1500000};
const DEFAULT_HOLD_COLS=['증권사','계좌','종목명','종목코드','매수일','수량','매수가','현재가','수익률(%)','평가손익','목표가','손절가','매수사유'];
const FIXED_HOLD=['증권사','계좌','종목명'];
const HOLD_COL_W={증권사:90,계좌:90,종목명:110,종목코드:90,매수일:100,수량:80,매수가:110,현재가:110,'수익률(%)':90,평가손익:120,목표가:110,손절가:110,매수사유:160};
const DAYS=['일','월','화','수','목','금','토'];
const openMonths=new Set();

function pad(n){return String(n).padStart(2,'0');}
function ls(k){return localStorage.getItem(k);}
function lss(k,v){localStorage.setItem(k,v);}
function showConfirm(msg){const el=document.getElementById('confirm-bar');el.textContent=msg;setTimeout(()=>el.textContent='',3000);}
function fmtNum(v){const n=parseInt(String(v).replace(/,/g,''));return isNaN(n)?v:n.toLocaleString('ko-KR');}
function getHoldData(){return JSON.parse(ls('hold_tbl')||JSON.stringify({cols:[...DEFAULT_HOLD_COLS],rows:[]}));}
function saveHoldData(d){lss('hold_tbl',JSON.stringify(d));fbSave();}
function getTradeData(){return JSON.parse(ls('trade_tbl')||JSON.stringify({cols:[],rows:[]}));}
function getHoldW(){return JSON.parse(ls('hold_col_widths')||'{}');}
function saveHoldW(w){lss('hold_col_widths',JSON.stringify(w));}

function calcHoldRow(row){
  const buy=parseFloat(String(row['매수가']||'').replace(/,/g,''))||0;
  const cur=parseFloat(String(row['현재가']||'').replace(/,/g,''))||0;
  const qty=parseFloat(String(row['수량']||'').replace(/,/g,''))||0;
  if(buy&&cur){
    row['수익률(%)']=((cur-buy)/buy*100).toFixed(2);
    if(qty)row['평가손익']=Math.round((cur-buy)*qty).toString();
  }
  return row;
}

function refreshAll(){
  const trade=getTradeData();
  const rows=trade.rows||[];
  const closed=rows.filter(r=>r['매도가']&&parseFloat(String(r['매도가']).replace(/,/g,''))>0);
  const pcts=closed.map(r=>parseFloat(r['수익률(%)'])).filter(p=>!isNaN(p)&&p!==0);
  const wins=pcts.filter(p=>p>0);
  const wr=pcts.length?Math.round(wins.length/pcts.length*100):0;
  const avgWin=wins.length?wins.reduce((a,b)=>a+b,0)/wins.length:0;
  const totalPL=closed.reduce((a,r)=>a+(parseInt(r['실현손익'])||0),0);

  document.getElementById('sum-total').textContent=rows.length;
  document.getElementById('sum-closed').textContent=closed.length;
  document.getElementById('sum-wr').textContent=pcts.length?wr+'%':'-';
  document.getElementById('sum-wr').className='sum-val '+(wr>=60?'pos':wr>0?'':'neg');
  document.getElementById('sum-avg').textContent=wins.length?'+'+avgWin.toFixed(1)+'%':'-';
  const plEl=document.getElementById('sum-pl');
  plEl.textContent=totalPL?(totalPL>0?'+':'')+fmtNum(totalPL)+'원':'-';
  plEl.className='sum-val '+(totalPL>0?'pos':totalPL<0?'neg':'');

  renderMonthly(closed);
  renderTradeMonths(rows);
}

function renderMonthly(closed){
  const el=document.getElementById('mo-grid');
  const curM=new Date().getMonth()+1;
  const curY=new Date().getFullYear();
  el.innerHTML=[4,5,6,7,8,9,10,11,12].map(m=>{
    const g=GOALS[m]||0;
    const mRows=closed.filter(r=>{
      const d=r['날짜']||'';
      return d&&parseInt(d.split('-')[1])===m&&parseInt(d.split('-')[0])===curY;
    });
    const actual=mRows.reduce((a,r)=>a+(parseInt(r['실현손익'])||0),0);
    const hasData=mRows.length>0;
    const pct=hasData?Math.min(200,Math.round(actual/g*100)):0;
    const isPast=m<curM,isCur=m===curM;
    const achieved=isPast&&actual>=g;
    const failed=isPast&&actual<g&&hasData;
    const cls=isCur?'current':achieved?'achieved':failed?'failed':'future';
    const badge=isCur?'●':achieved?'✓':failed?'✗':'';
    const barColor=actual>=g?'var(--pos)':actual>0?'var(--stock)':'var(--neg)';
    return `<div class="mo-card ${cls}">
      <div class="mo-month">${m}월 <span class="mo-badge">${badge}</span></div>
      <div class="mo-val ${actual>0?'pos':actual<0?'neg':'neutral'}">${hasData?(actual>=0?'+':'')+fmtNum(actual)+'원':'-'}</div>
      <div class="mo-goal">목표 ${(g/10000).toFixed(0)}만</div>
      <div class="mo-pct ${pct>=100?'pos':pct>0?'neutral':'neg'}">${hasData?pct+'%':''}</div>
      <div class="mo-bar"><div class="mo-fill" style="width:${Math.min(100,pct)}%;background:${barColor};"></div></div>
    </div>`;
  }).join('');
}

function renderTradeMonths(rows){
  const curM=new Date().getMonth()+1;
  const curY=new Date().getFullYear();
  const byMonth={};
  rows.forEach(r=>{
    const d=r['날짜']||'';if(!d)return;
    const key=d.slice(0,7);
    if(!byMonth[key])byMonth[key]=[];
    byMonth[key].push(r);
  });
  const sorted=Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));
  const container=document.getElementById('trade-months');
  if(!sorted.length){container.innerHTML='<div class="empty-msg">매매 기록이 없어요</div>';return;}
  const curKey=curY+'-'+pad(curM);
  if(!openMonths.has('_init')){openMonths.add(curKey);openMonths.add('_init');}

  container.innerHTML=sorted.map(key=>{
    const mRows=byMonth[key];
    const pl=mRows.reduce((a,r)=>a+(parseInt(r['실현손익'])||0),0);
    const pcts=mRows.map(r=>parseFloat(r['수익률(%)'])).filter(p=>!isNaN(p)&&p!==0);
    const wins=pcts.filter(p=>p>0);
    const wr=pcts.length?Math.round(wins.length/pcts.length*100):0;
    const avgW=wins.length?wins.reduce((a,b)=>a+b,0)/wins.length:0;
    const isOpen=openMonths.has(key);
    const [y,m]=key.split('-');
    const label=y+'년 '+parseInt(m)+'월';
    return `<div class="month-group">
      <div class="month-header" onclick="toggleMonth('${key}')">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <span class="month-label">${label}</span>
          <div class="month-stats">
            <span class="month-stat">${mRows.length}건</span>
            <span class="month-stat ${wr>=60?'pos':'neg'}">승률 ${wr}%</span>
            <span class="month-stat ${avgW>0?'pos':avgW<0?'neg':''}">평균 ${avgW>=0?'+':''}${avgW.toFixed(1)}%</span>
            <span class="month-stat ${pl>=0?'pos':'neg'}">${pl>=0?'+':''}${fmtNum(pl)}원</span>
          </div>
        </div>
        <span class="month-toggle ${isOpen?'open':''}">▼</span>
      </div>
      <div id="month-body-${key}" ${isOpen?'':'style="display:none;"'}></div>
    </div>`;
  }).join('');
}

function toggleMonth(key){
  if(openMonths.has(key))openMonths.delete(key);
  else openMonths.add(key);
  const body=document.getElementById('month-body-'+key);
  const toggle=body.previousElementSibling.querySelector('.month-toggle');
  const isOpen=openMonths.has(key);
  body.style.display=isOpen?'block':'none';
  toggle.classList.toggle('open',isOpen);
  if(isOpen&&!body.innerHTML.trim())populateMonthBody(key);
}

function populateMonthBody(key){
  const trade=getTradeData();
  const rows=trade.rows||[];
  const mRows=rows.filter(r=>(r['날짜']||'').startsWith(key));
  const body=document.getElementById('month-body-'+key);
  if(!mRows.length){body.innerHTML='<div class="empty-msg" style="padding:16px;">이 달 기록 없음</div>';return;}
  const cols=trade.cols||[];
  const tableRows=mRows.map(r=>`<tr>${cols.map(c=>{
    const val=r[c]||'';
    if(c==='수익률(%)'){const p=parseFloat(val);return `<td class="${isNaN(p)||p===0?'muted-c':p>0?'pos-c':'neg-c'}">${val?val+'%':'진행중'}</td>`;}
    if(c==='실현손익'){const pl=parseInt(val)||0;return `<td class="${pl>0?'pos-c':pl<0?'neg-c':'muted-c'}">${pl?fmtNum(pl)+'원':'-'}</td>`;}
    if(c==='정상/뇌동')return `<td class="center-c" style="color:${val==='뇌동'?'var(--neg)':'var(--pos)'};">${val||'-'}</td>`;
    const isNum=['수량','매수가','매도가'].includes(c);
    return `<td><input type="text" value="${isNum&&val?fmtNum(val):String(val).replace(/"/g,'&quot;')}" readonly style="color:var(--text2);cursor:default;font-family:${isNum?'\'DM Mono\',monospace':'inherit'};"></td>`;
  }).join('')}</tr>`).join('');
  body.innerHTML=`<div style="overflow-x:auto;"><table class="resizable-table"><thead><tr>${cols.map(c=>`<th style="min-width:100px;"><div class="th-content"><span class="th-label">${c}</span></div></th>`).join('')}</tr></thead><tbody>${tableRows}</tbody></table></div>`;
}

// 보유종목 테이블
function renderHoldTable(){
  const data=getHoldData();
  const w=getHoldW();
  const thead=document.getElementById('hold-thead');
  const tbody=document.getElementById('hold-tbody');
  const empty=document.getElementById('hold-empty');
  thead.innerHTML='<tr>'+data.cols.map(c=>{
    const cw=w[c]||HOLD_COL_W[c]||110;
    const canDel=!FIXED_HOLD.includes(c);
    return `<th style="width:${cw}px;min-width:${cw}px;">
      <div class="th-content">
        <span class="th-label">${c}${canDel?` <span onclick="deleteHoldCol('${c}')" style="cursor:pointer;color:var(--text3);font-size:11px;">✕</span>`:''}</span>
      </div>
      <div class="resizer" onmousedown="startHoldResize(event,'${c}')"></div>
    </th>`;
  }).join('')+'<th style="width:56px;min-width:56px;"></th></tr>';

  if(!data.rows.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=data.rows.map((row,ri)=>`<tr>${data.cols.map(c=>{
    const val=row[c]||'';
    const cw=w[c]||HOLD_COL_W[c]||110;
    if(c==='수익률(%)'){const p=parseFloat(val);return `<td class="${p>0?'pos-c':p<0?'neg-c':'muted-c'}" style="width:${cw}px;">${val?val+'%':'-'}</td>`;}
    if(c==='평가손익'){const pl=parseInt(val)||0;return `<td class="${pl>0?'pos-c':pl<0?'neg-c':'muted-c'}" style="width:${cw}px;">${pl?fmtNum(pl)+'원':'-'}</td>`;}
    const isNum=['수량','매수가','현재가','목표가','손절가'].includes(c);
    const dispVal=isNum&&val?fmtNum(val):'';
    return `<td style="width:${cw}px;"><input type="text" value="${isNum?(dispVal||String(val)):String(val).replace(/"/g,'&quot;')}" onfocus="if(${isNum}){this.value='${String(val).replace(/'/g,"\\'")}';}" onblur="updateHoldCell(${ri},'${c}',this.value)" placeholder="${c}..." style="font-family:${isNum?'\'DM Mono\',monospace':'inherit'};"></td>`;
  }).join('')}<td style="width:56px;" class="center-c"><button class="del-btn" onclick="deleteHoldRow(${ri})">삭제</button></td></tr>`).join('');
}

let holdResizing=false,holdResizeCol='',holdResizeStartX=0,holdResizeStartW=0;
function startHoldResize(e,col){
  e.preventDefault();holdResizing=true;holdResizeCol=col;holdResizeStartX=e.clientX;
  const w=getHoldW();holdResizeStartW=w[col]||HOLD_COL_W[col]||110;
  document.addEventListener('mousemove',doHoldResize);document.addEventListener('mouseup',stopHoldResize);
}
function doHoldResize(e){
  if(!holdResizing)return;
  const newW=Math.max(50,holdResizeStartW+(e.clientX-holdResizeStartX));
  const w=getHoldW();w[holdResizeCol]=newW;saveHoldW(w);
  const table=document.getElementById('hold-table');
  const data=getHoldData();const idx=data.cols.indexOf(holdResizeCol);
  if(idx>=0){
    const ths=table.querySelectorAll('thead th');
    if(ths[idx]){ths[idx].style.width=newW+'px';ths[idx].style.minWidth=newW+'px';}
    table.querySelectorAll('tbody tr').forEach(tr=>{const tds=tr.querySelectorAll('td');if(tds[idx])tds[idx].style.width=newW+'px';});
  }
}
function stopHoldResize(){holdResizing=false;document.removeEventListener('mousemove',doHoldResize);document.removeEventListener('mouseup',stopHoldResize);}

function addHoldRow(){const data=getHoldData();const row={};data.cols.forEach(c=>row[c]='');data.rows.unshift(row);saveHoldData(data);renderHoldTable();}
function addHoldCol(){const name=prompt('새 열 이름:');if(!name||!name.trim())return;const data=getHoldData();if(data.cols.includes(name.trim())){showConfirm('이미 있는 열');return;}data.cols.push(name.trim());data.rows.forEach(r=>r[name.trim()]=r[name.trim()]||'');saveHoldData(data);renderHoldTable();}
function deleteHoldRow(idx){if(!confirm('삭제?'))return;const data=getHoldData();data.rows.splice(idx,1);saveHoldData(data);renderHoldTable();}
function deleteHoldCol(col){if(FIXED_HOLD.includes(col)){showConfirm('기본 열 삭제 불가');return;}if(!confirm('"'+col+'" 열 삭제?'))return;const data=getHoldData();data.cols=data.cols.filter(c=>c!==col);data.rows.forEach(r=>delete r[col]);saveHoldData(data);renderHoldTable();}
function updateHoldCell(ri,col,val){
  const data=getHoldData();if(!data.rows[ri])return;
  const clean=String(val).replace(/,/g,'');
  data.rows[ri][col]=clean;
  if(['매수가','현재가','수량'].includes(col))calcHoldRow(data.rows[ri]);
  saveHoldData(data);renderHoldTable();
}

function exportExcel(){
  const data=getHoldData();if(!data.rows.length){showConfirm('데이터가 없어요');return;}
  const rows=[data.cols,...data.rows.map(r=>data.cols.map(c=>r[c]||''))];
  const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'보유종목',ws);
  const d=new Date();XLSX.writeFile(wb,'보유종목_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx');
  showConfirm('다운로드 완료!');
}

function importExcel(input,mode){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rawRows=XLSX.utils.sheet_to_json(ws,{header:1});
    if(rawRows.length<2){showConfirm('데이터가 없어요');return;}
    const headers=rawRows[0].map(h=>String(h||'').trim());
    const data=mode==='overwrite'?{cols:[...DEFAULT_HOLD_COLS],rows:[]}:getHoldData();
    headers.forEach(h=>{if(h&&!data.cols.includes(h))data.cols.push(h);});
    rawRows.slice(1).forEach(row=>{
      if(!row.some(v=>v))return;
      const r={};data.cols.forEach(c=>r[c]='');
      headers.forEach((h,i)=>{if(h&&row[i]!==undefined)r[h]=String(row[i]).replace(/,/g,'');});
      calcHoldRow(r);data.rows.push(r);
    });
    saveHoldData(data);renderHoldTable();
    showConfirm(mode==='overwrite'?'덮어쓰기 완료!':'추가 완료!');
  };
  reader.readAsBinaryString(file);input.value='';
}

const d=new Date();
document.getElementById('nav-date').textContent=d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+' '+DAYS[d.getDay()];
fbSync(()=>{refreshAll();renderHoldTable();});
</script>
