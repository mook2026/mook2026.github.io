  v1. 캔들차트 전환 (chartjs-chart-financial), OHLC 데이터 fetchHistory에 추가

  v4. AS엔진 제거, SAVE ENGINE v2, fbSync 편집중방지, TOP SCROLL v3
  v5. 전면 재설계 - 고지로 이동평균선 스테이지 분석(EMA 5/20/40 정배열순서 6단계)

      캐싱 강화(localStorage 6시간 캐시) + 병렬 fetch로 속도 개선

<script>
/* ============================================================
   기본 지수 목록 (코드 고정 행)
   ============================================================ */
const FIXED_STOCKS=[
  {name:'코스피',sym:'^KS11',fixed:true},
  {name:'코스닥',sym:'^KQ11',fixed:true},
  {name:'나스닥',sym:'^IXIC',fixed:true},
  {name:'나스닥100',sym:'^NDX',fixed:true},
  {name:'필라델피아반도체',sym:'^SOX',fixed:true},
  {name:'S&P500',sym:'^GSPC',fixed:true}
];

const STORAGE_KEY='market_stage_data';
const CACHE_PREFIX='mstage_cache_';
const CACHE_TTL=6*60*60*1000; /* 6시간 캐시 */
const DAYS=['일','월','화','수','목','금','토'];

let chartObj=null;
let currentChartSym=null;
let currentChartName=null;
let currentChartTF='d';

function pad(n){return String(n).padStart(2,'0');}
function ls(k){return localStorage.getItem(k);}
function lss(k,v){localStorage.setItem(k,v);}
function setStatus(msg){const el=document.getElementById('status-bar');if(el)el.textContent=msg;}

/* ============================================================
   데이터 구조: getData() / saveData()
   data = { stocks:[{name,sym}], memoCols:[{key,label}], memos:{sym:{colKey:val}} }
   ============================================================ */
function getData(){
  const raw=ls(STORAGE_KEY);
  if(raw){try{
    const d=JSON.parse(raw);
    if(!d.stocks)d.stocks=[...FIXED_STOCKS];
    if(!d.memoCols)d.memoCols=[];
    if(!d.memos)d.memos={};
    return d;
  }catch(e){}}
  return {stocks:[...FIXED_STOCKS],memoCols:[],memos:{}};
}
function saveData(d){lss(STORAGE_KEY,JSON.stringify(d));}

/* ============================================================
   캐시: 종목별 OHLC 데이터를 localStorage에 6시간 캐싱
   ============================================================ */
function getCache(sym,range){
  const key=CACHE_PREFIX+sym+'_'+range;
  const raw=ls(key);
  if(!raw)return null;
  try{
    const obj=JSON.parse(raw);
    if(Date.now()-obj.ts>CACHE_TTL)return null;
    return obj.data;
  }catch(e){return null;}
}
function setCache(sym,range,data){
  const key=CACHE_PREFIX+sym+'_'+range;
  try{lss(key,JSON.stringify({ts:Date.now(),data}));}catch(e){}
}

/* ============================================================
   야후 파이낸스 fetch (프록시 경유) - 일봉 데이터 가져와서
   주봉/월봉은 클라이언트에서 리샘플링 (API 호출 횟수 최소화로 속도 개선)
   ============================================================ */
/* 여러 프록시를 순서대로 시도 - 하나 막히면 다음 것으로 자동 전환 */
/* 프록시 목록 - targetUrl은 인코딩 안 된 원본 URL */
async function fetchViaProxy(targetUrl,timeoutMs){
  const encoded=encodeURIComponent(targetUrl);
  const proxies=[
    /* allorigins raw - 직접 텍스트 반환 */
    {url:`https://api.allorigins.win/raw?url=${encoded}`,isRaw:true},
    /* allorigins get - JSON 래퍼 반환 */
    {url:`https://api.allorigins.win/get?url=${encoded}`,isRaw:false},
    /* codetabs - 직접 텍스트 반환 */
    {url:`https://api.codetabs.com/v1/proxy/?quest=${encoded}`,isRaw:true},
  ];
  for(let i=0;i<proxies.length;i++){
    try{
      const res=await fetch(proxies[i].url,{signal:AbortSignal.timeout(timeoutMs)});
      if(!res.ok)continue;
      const text=await res.text();
      let jsonText=text;
      if(!proxies[i].isRaw){
        try{const w=JSON.parse(text);if(w&&typeof w.contents==='string')jsonText=w.contents;}
        catch(e){}
      }
      const parsed=JSON.parse(jsonText);
      if(parsed?.chart?.result?.[0])return parsed;
    }catch(e){
      console.warn('프록시',i,'실패:',e.message);
    }
  }
  return null;
}

async function fetchDaily(sym){
  const cached=getCache(sym,'5y');
  if(cached)return cached;
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5y`;
  try{
    const parsed=await fetchViaProxy(url,12000);
    const result=parsed?.chart?.result?.[0];
    if(!result)return null;
    const timestamps=result.timestamp||[];
    const q=result.indicators?.quote?.[0]||{};
    const closes=q.close||[],opens=q.open||[],highs=q.high||[],lows=q.low||[];
    const bars=[];
    for(let i=0;i<timestamps.length;i++){
      if(closes[i]==null)continue;
      bars.push({t:timestamps[i]*1000,o:opens[i],h:highs[i],l:lows[i],c:closes[i]});
    }
    if(!bars.length)return null;
    setCache(sym,'5y',bars);
    return bars;
  }catch(e){console.warn('fetch fail',sym,e);return null;}
}

/* 일봉 → 주봉/월봉 리샘플링 */
function resample(dailyBars,mode){
  if(!dailyBars||!dailyBars.length)return [];
  if(mode==='d')return dailyBars;
  const groups={};
  dailyBars.forEach(bar=>{
    const dt=new Date(bar.t);
    let key;
    if(mode==='w'){
      const d=new Date(dt);
      const day=d.getDay();
      const diff=d.getDate()-day+(day===0?-6:1); /* 월요일 기준 */
      const monday=new Date(d.setDate(diff));
      key=monday.getFullYear()+'-'+pad(monday.getMonth()+1)+'-'+pad(monday.getDate());
    }else{
      key=dt.getFullYear()+'-'+pad(dt.getMonth()+1);
    }
    if(!groups[key])groups[key]=[];
    groups[key].push(bar);
  });
  return Object.keys(groups).sort().map(key=>{
    const g=groups[key];
    return {
      t:g[0].t,
      o:g[0].o,
      h:Math.max(...g.map(b=>b.h)),
      l:Math.min(...g.map(b=>b.l)),
      c:g[g.length-1].c
    };
  });
}

/* EMA 계산 */
function calcEMA(values,period){
  if(values.length<period)return values.map(()=>null);
  const k=2/(period+1);
  const ema=[];
  let prev=values.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=0;i<values.length;i++){
    if(i<period-1){ema.push(null);continue;}
    if(i===period-1){ema.push(prev);continue;}
    prev=values[i]*k+prev*(1-k);
    ema.push(prev);
  }
  return ema;
}

/* ============================================================
   고지로 스테이지 계산: EMA 5/20/40 정배열 순서로 6단계 판정
   1: 5>20>40   2: 20>5>40   3: 20>40>5
   4: 40>20>5   5: 40>5>20   6: 5>40>20
   진입일/경과일수도 함께 계산 (스테이지가 바뀐 시점 탐색)
   ============================================================ */
function classifyStage(e5,e20,e40){
  if(e5==null||e20==null||e40==null)return null;
  if(e5>e20&&e20>e40)return 1;
  if(e20>e5&&e5>e40)return 2;
  if(e20>e40&&e40>e5)return 3;
  if(e40>e20&&e20>e5)return 4;
  if(e40>e5&&e5>e20)return 5;
  if(e5>e40&&e40>e20)return 6;
  return null;
}

function calcStage(bars){
  if(!bars||bars.length<45)return null;
  const closes=bars.map(b=>b.c);
  const e5arr=calcEMA(closes,5);
  const e20arr=calcEMA(closes,20);
  const e40arr=calcEMA(closes,40);

  const stages=bars.map((b,i)=>classifyStage(e5arr[i],e20arr[i],e40arr[i]));
  const lastIdx=stages.length-1;
  const currentStage=stages[lastIdx];
  if(currentStage==null)return null;

  /* 현재 스테이지가 시작된 시점 찾기 (뒤에서부터 같은 스테이지 거슬러 올라가기) */
  let entryIdx=lastIdx;
  for(let i=lastIdx;i>=0;i--){
    if(stages[i]===currentStage){entryIdx=i;}
    else break;
  }
  const entryDate=new Date(bars[entryIdx].t);
  const todayDate=new Date(bars[lastIdx].t);
  const daysElapsed=Math.round((todayDate-entryDate)/(864e5));

  return {
    stage:currentStage,
    entryDate:entryDate.getFullYear().toString().slice(2)+'/'+pad(entryDate.getMonth()+1)+'/'+pad(entryDate.getDate()),
    daysElapsed:daysElapsed
  };
}

const STAGE_COLORS={1:'var(--s1)',2:'var(--s2)',3:'var(--s3)',4:'var(--s4)',5:'var(--s5)',6:'var(--s6)'};

function renderStageCell(info){
  if(!info)return '<span class="stage-loading">불러오는 중...</span>';
  const bg=STAGE_COLORS[info.stage];
  return `<div class="stage-cell" style="background:${bg};color:#0c0c0e;">
    <div class="stage-num">스테이지 ${info.stage}</div>
    <div class="stage-date">${info.entryDate}</div>
    <div class="stage-days">+${info.daysElapsed}일</div>
  </div>`;
}
</script>
<script>

  const tbody=document.getElementById('stage-tbody');
  tbody.innerHTML=data.stocks.map((stock,idx)=>{
    const cached=getStageCache(stock.sym);
    return `<tr data-sym="${stock.sym}">
      <td class="stock-name-cell" onclick="openChartPanel('${stock.sym}','${stock.name.replace(/'/g,"\\'")}')">${stock.name}</td>
      <td class="stock-sym-cell">${stock.sym}</td>
      <td id="stage-d-${cssSafe(stock.sym)}">${renderStageCell(cached?cached.d:null)}</td>
      <td id="stage-w-${cssSafe(stock.sym)}">${renderStageCell(cached?cached.w:null)}</td>
      <td id="stage-m-${cssSafe(stock.sym)}">${renderStageCell(cached?cached.m:null)}</td>
      ${data.memoCols.map(col=>`<td><div class="ce-cell ce-memo" contenteditable="true" data-sym="${stock.sym}" data-col="${col.key}" onblur="updateMemo(this)">${(data.memos[stock.sym]&&data.memos[stock.sym][col.key])||''}</div></td>`).join('')}
      <td>${stock.fixed?'':`<span class="del-row-btn" onclick="deleteStockRow('${stock.sym}')">✕</span>`}</td>
    </tr>`;
  }).join('');
}

function cssSafe(sym){return sym.replace(/[^a-zA-Z0-9]/g,'_');}

function updateMemo(el){
  const sym=el.dataset.sym, col=el.dataset.col;
  const data=getData();
  if(!data.memos[sym])data.memos[sym]={};
  data.memos[sym][col]=el.innerHTML;
  saveData(data);
}

function addStockRow(){
  const name=prompt('종목명 입력:');
  if(!name||!name.trim())return;
  const sym=prompt('종목코드 입력 (야후 파이낸스 티커, 예: 005930.KS, AAPL):');
  if(!sym||!sym.trim())return;
  const data=getData();
  if(data.stocks.find(s=>s.sym===sym.trim())){showConfirm('이미 있는 종목코드');return;}
  data.stocks.push({name:name.trim(),sym:sym.trim(),fixed:false});
  saveData(data);
  renderTable();
  fetchOneStage(sym.trim());
}

function deleteStockRow(sym){
  if(!confirm('이 종목을 삭제할까요?'))return;
  const data=getData();
  data.stocks=data.stocks.filter(s=>s.sym!==sym);
  delete data.memos[sym];
  saveData(data);
  removeStageCache(sym);
  renderTable();
}

function addMemoCol(){
  const label=prompt('새 열 제목:');
  if(!label||!label.trim())return;
  const data=getData();
  const key='col_'+Date.now();
  data.memoCols.push({key,label:label.trim()});
  saveData(data);
  renderTable();
}

function deleteMemoCol(key){
  if(!confirm('이 열을 삭제할까요?'))return;
  const data=getData();
  data.memoCols=data.memoCols.filter(c=>c.key!==key);
  Object.keys(data.memos).forEach(sym=>{if(data.memos[sym])delete data.memos[sym][key];});
  saveData(data);
  renderTable();
}

function showConfirm(msg){setStatus(msg);setTimeout(()=>setStatus(''),2500);}

/* ============================================================
   스테이지 캐시 (계산결과 캐싱 - daily/weekly/monthly)
   ============================================================ */
function getStageCache(sym){
  const raw=ls('mstage_result_'+cssSafe(sym));
  if(!raw)return null;
  try{
    const obj=JSON.parse(raw);
    if(Date.now()-obj.ts>CACHE_TTL)return null;
    return obj.data;
  }catch(e){return null;}
}
function setStageCache(sym,data){
  try{lss('mstage_result_'+cssSafe(sym),JSON.stringify({ts:Date.now(),data}));}catch(e){}
}
function removeStageCache(sym){
  try{localStorage.removeItem('mstage_result_'+cssSafe(sym));}catch(e){}
}

/* ============================================================
   종목 하나의 일/주/월봉 스테이지 계산 (일봉 데이터 1번 받아서 리샘플링)
   ============================================================ */
async function fetchOneStage(sym){
  const dailyBars=await fetchDaily(sym);
  if(!dailyBars||!dailyBars.length){
    const el=document.getElementById('stage-d-'+cssSafe(sym));
    if(el)el.innerHTML='<span class="stage-loading" style="color:var(--neg);">데이터 없음</span>';
    return null;
  }
  const weeklyBars=resample(dailyBars,'w');
  const monthlyBars=resample(dailyBars,'m');

  const result={
    d:calcStage(dailyBars),
    w:calcStage(weeklyBars),
    m:calcStage(monthlyBars)
  };
  setStageCache(sym,result);

  const dEl=document.getElementById('stage-d-'+cssSafe(sym));
  const wEl=document.getElementById('stage-w-'+cssSafe(sym));
  const mEl=document.getElementById('stage-m-'+cssSafe(sym));
  if(dEl)dEl.innerHTML=renderStageCell(result.d);
  if(wEl)wEl.innerHTML=renderStageCell(result.w);
  if(mEl)mEl.innerHTML=renderStageCell(result.m);

  return result;
}

/* ============================================================
   전체 종목 병렬 fetch (속도 개선 핵심)
   ============================================================ */
async function fetchAllStages(){
  const data=getData();
  setStatus('데이터 불러오는 중... (0/'+data.stocks.length+')');
  let done=0;
  const promises=data.stocks.map(stock=>
    fetchOneStage(stock.sym).then(()=>{
      done++;
      setStatus('데이터 불러오는 중... ('+done+'/'+data.stocks.length+')');
    })
  );
  await Promise.all(promises);
  setStatus('완료 ✓ '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
  document.getElementById('last-update').textContent='마지막 업데이트: '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

/* 캐시만 있으면 그걸로 먼저 표시 (즉시 렌더), 없는 것만 fetch */
async function loadInitial(){
  renderTable();
  const data=getData();
  const needFetch=data.stocks.filter(s=>!getStageCache(s.sym));
  if(needFetch.length){
    setStatus('신규 종목 '+needFetch.length+'개 데이터 불러오는 중...');
    await Promise.all(needFetch.map(s=>fetchOneStage(s.sym)));
    setStatus('완료 ✓');
  }
}
</script>
<script>
/* ============================================================
   차트 패널 - 행 클릭 시 열림, 일/주/월봉 전환 + EMA 5/20/40
   ============================================================ */
async function openChartPanel(sym,name){
  currentChartSym=sym;
  currentChartName=name;
  currentChartTF='d';
  document.getElementById('chart-panel-title').textContent=name+' ('+sym+')';
  document.getElementById('chart-panel').classList.add('open');
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tf-d').classList.add('active');
  document.getElementById('chart-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
  await renderChart();
}

function closeChartPanel(){
  document.getElementById('chart-panel').classList.remove('open');
  if(chartObj){chartObj.destroy();chartObj=null;}
}

function setChartTF(tf){
  currentChartTF=tf;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tf-'+tf).classList.add('active');
  renderChart();
}

async function renderChart(){
  if(!currentChartSym)return;
  const loadingEl=document.getElementById('chart-loading');
  loadingEl.style.display='flex';
  loadingEl.textContent='불러오는 중...';

  const dailyBars=await fetchDaily(currentChartSym);
  loadingEl.style.display='none';

  if(!dailyBars||!dailyBars.length){
    loadingEl.style.display='flex';
    loadingEl.textContent='데이터를 불러올 수 없어요';
    return;
  }

  let bars=resample(dailyBars,currentChartTF);
  if(bars.length>200)bars=bars.slice(bars.length-200);

  const closes=bars.map(b=>b.c);
  const ema5=calcEMA(closes,5);
  const ema20=calcEMA(closes,20);
  const ema40=calcEMA(closes,40);

  /* Canvas 중복 사용 방지 - 기존 차트 destroy 후 canvas 재생성 */
  if(chartObj){chartObj.destroy();chartObj=null;}
  const wrap=document.getElementById('stage-chart').parentNode;
  wrap.querySelector('canvas')?.remove();
  const newCanvas=document.createElement('canvas');
  newCanvas.id='stage-chart';
  wrap.appendChild(newCanvas);
  const ctx=newCanvas.getContext('2d');

  /* 날짜 레이블 */
  const labels=bars.map(b=>{
    const d=new Date(b.t);
    if(currentChartTF==='m')return (d.getMonth()+1)+'월';
    if(currentChartTF==='w')return (d.getMonth()+1)+'/'+d.getDate();
    return (d.getMonth()+1)+'/'+String(d.getDate()).padStart(2,'0');
  });

  chartObj=new Chart(ctx,{
    type:'line',
    data:{
      labels:labels,
      datasets:[
        {label:'종가',data:closes,borderColor:'#e5e7eb',borderWidth:1.5,pointRadius:0,fill:false,tension:0.1},
        {label:'EMA5',data:ema5,borderColor:'#fbbf24',borderWidth:1.5,pointRadius:0,fill:false,spanGaps:true,tension:0},
        {label:'EMA20',data:ema20,borderColor:'#60a5fa',borderWidth:1.5,pointRadius:0,fill:false,spanGaps:true,tension:0},
        {label:'EMA40',data:ema40,borderColor:'#a78bfa',borderWidth:1.5,pointRadius:0,fill:false,spanGaps:true,tension:0}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,labels:{color:'#ccc',font:{size:11},boxWidth:20}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+(ctx.parsed.y?.toFixed(2)||'-');}}}
      },
      scales:{
        x:{ticks:{color:'#888',font:{size:10},maxTicksLimit:12,maxRotation:0},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#888',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}}
      }
    }
  });
}
</script>

<script>
/* ============================================================
   SAVE ENGINE v2 - 수동저장만 / 자동저장 없음
   - 💾 버튼: 모든 CE셀 innerHTML 수집 → localStorage → Firebase
   - 실제 Firebase 완료 후에만 ✅ 저장됨 표시
   - 가짜 저장됨 표시 없음
   ============================================================ */
(function(){
  function pad(n){return String(n).padStart(2,'0');}
  function nowTime(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}

  function getBar(){
    let bar=document.getElementById('save-status-bar');
    if(bar)return bar;
    bar=document.createElement('div');
    bar.id='save-status-bar';
    bar.style.cssText='position:fixed;bottom:0;left:0;right:0;height:30px;background:#141416;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:9998;font-family:\'DM Mono\',monospace;font-size:12px;color:#888;';
    bar.innerHTML='<span id="save-status-msg">준비됨</span>'
      +'<button onclick="window.manualSave&&window.manualSave()" style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:4px;color:#fbbf24;font-size:12px;padding:3px 10px;cursor:pointer;font-family:\'DM Mono\',monospace;">💾 저장</button>';
    document.body.appendChild(bar);
    document.body.style.paddingBottom='38px';
    return bar;
  }
  function setMsg(msg,color){
    getBar();
    const el=document.getElementById('save-status-msg');
    if(el){el.textContent=msg;el.style.color=color||'#888';}
  }
  window.manualSave=async function(){
    setMsg('저장 중...','#fbbf24');
    try{
      const active=document.activeElement;
      if(active&&active.classList&&active.classList.contains('ce-cell'))active.blur();
      const d={};
      for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)d[k]=localStorage.getItem(k);}
      if(!Object.keys(d).length){setMsg('저장할 데이터 없음','#fb7185');return;}
      if(typeof db!=='undefined'&&typeof UID!=='undefined'){
        await db.collection('data').doc(UID).set(d,{merge:true});
        setMsg('✅ 저장됨 '+nowTime(),'#34d399');
      }else{
        setMsg('✅ 로컬 저장됨 '+nowTime(),'#fbbf24');
      }
    }catch(e){
      setMsg('❌ 저장 실패: '+e.message,'#fb7185');
      console.error('저장 실패:',e);
    }
  };
  window.fbSaveWithStatus=window.manualSave;
  /* CE셀 포커스 추적 - fbSync 재렌더 방지용 */
  document.addEventListener('focusin',function(e){
    if(e.target.classList&&e.target.classList.contains('ce-cell'))window._editing=true;
  });
  document.addEventListener('focusout',function(e){
    if(e.target.classList&&e.target.classList.contains('ce-cell')){
      setTimeout(function(){if(!document.querySelector('.ce-cell:focus'))window._editing=false;},150);
    }
  });
  window.SAVE_ENGINE_LOADED=true;
  setTimeout(function(){getBar();setMsg('준비됨','#888');},300);
})();
</script><script>
/* ============================================================
   TOP SCROLL ENGINE v3
   - position:fixed, nav+toolbar 높이 동적계산
   - 셀렉터 확대: .tbl-outer, .tbl-wrap, id*=tbl, div[overflow-x:auto]
   ============================================================ */
(function(){
  let activeWrap=null,syncing=false;
  function getNavBottom(){
    const nav=document.querySelector('.nav'),tb=document.querySelector('.toolbar');
    let top=nav?nav.getBoundingClientRect().bottom:56;
    if(tb){const r=tb.getBoundingClientRect();if(r.top<=top+2)top=r.bottom;}
    return Math.round(top);
  }
  function getOrCreateBar(){
    let bar=document.getElementById('top-scroll-fixed');
    if(bar)return bar;
    bar=document.createElement('div');
    bar.id='top-scroll-fixed';
    bar.style.cssText='position:fixed;left:0;right:0;height:14px;overflow-x:auto;overflow-y:hidden;z-index:998;background:#1c1c1f;border-bottom:2px solid rgba(251,191,36,0.3);display:none;cursor:pointer;';
    const dummy=document.createElement('div');
    dummy.id='top-scroll-dummy';dummy.style.height='1px';
    bar.appendChild(dummy);document.body.appendChild(bar);
    bar.addEventListener('scroll',function(){
      if(syncing||!activeWrap)return;
      syncing=true;activeWrap.scrollLeft=bar.scrollLeft;syncing=false;
    });
    return bar;
  }
  function syncBar(wrap){
    const bar=getOrCreateBar(),dummy=document.getElementById('top-scroll-dummy');
    const tbl=wrap.querySelector('table');
    if(!tbl){bar.style.display='none';return;}
    activeWrap=wrap;
    dummy.style.width=tbl.scrollWidth+'px';
    bar.scrollLeft=wrap.scrollLeft;
    bar.style.top=getNavBottom()+'px';
    bar.style.display=tbl.scrollWidth>wrap.clientWidth?'block':'none';
  }
  window.initTopScrollFixed=function(el){
    if(!el||el.dataset.tsFixed)return;
    el.dataset.tsFixed='1';
    el.addEventListener('scroll',function(){
      if(syncing)return;syncing=true;
      const bar=document.getElementById('top-scroll-fixed');
      if(bar)bar.scrollLeft=el.scrollLeft;
      syncing=false;
    });
    /* mouseenter + 스크롤 위치 기반으로 활성 테이블 감지 */
    el.addEventListener('mouseenter',function(){syncBar(el);});
    el.addEventListener('focusin',function(){syncBar(el);});
    el.addEventListener('click',function(){syncBar(el);});
    const obs=new ResizeObserver(function(){if(activeWrap===el)syncBar(el);});
    const tbl=el.querySelector('table');if(tbl)obs.observe(tbl);
    syncBar(el);
  };
  window.initAllTopScrolls=function(){
    document.querySelectorAll('.tbl-outer,.tbl-wrap,.ex-table-wrap').forEach(function(el){
      if(el.querySelector('table'))window.initTopScrollFixed(el);
    });
    document.querySelectorAll('[id*="tbl-outer"],[id*="tbl-wrap"],[id*="tbl-outer-s"]').forEach(function(el){
      if(el.querySelector('table'))window.initTopScrollFixed(el);
    });
    document.querySelectorAll('div').forEach(function(el){
      if(el.style&&el.style.overflowX==='auto'&&el.querySelector('table'))window.initTopScrollFixed(el);
    });
    /* 페이지 스크롤 시 현재 화면에 보이는 테이블 자동 감지 */
    window.addEventListener('scroll',function(){
      const bar=document.getElementById('top-scroll-fixed');
      if(!bar)return;
      /* 화면에 보이는 overflow-x:auto div 중 테이블 있는 것 찾기 */
      let found=null;
      document.querySelectorAll('.tbl-outer,.tbl-wrap,.ex-table-wrap,div[style]').forEach(function(el){
        if(!el.querySelector('table'))return;
        if(el.style&&el.style.overflowX!=='auto'&&!el.classList.contains('tbl-outer')&&!el.classList.contains('tbl-wrap')&&!el.classList.contains('ex-table-wrap'))return;
        const r=el.getBoundingClientRect();
        if(r.top<window.innerHeight&&r.bottom>0){found=el;}
      });
      if(found)syncBar(found);
    },true);
  };
  window.TOP_SCROLL_V3_LOADED=true;
})();
</script></body></html>
