<!DOCTYPE html>
<html lang="ko">
<!--
  [수정 이력]
  v1. textarea → contenteditable (ce-cell) 전환 - 테이블 셀 + 폼 입력 영역 모두
  v2. 행 높이 드래그 (rh-row) / 열 너비 드래그 (col-rz) - 엑셀 스타일
  v3. rowHeights/colWidths 저장/복원
  v4. table width:max-content - 열 확장 시 타 열 영향 없음
  v5. localStorage 먼저 렌더 후 Firebase 재렌더
  v6. 자동저장 엔진 + CE_ENGINE 툴바
  v7. renameColSR 함수 추가 - 열 이름 변경
  v8. 폼 textarea (r-market 등 7개) → CE div, .value → .innerHTML
  v9. loadForm(): el.value → el.innerHTML (CE div는 .value 없어서 스크립트 오류 → 빈화면 버그 수정)
  v10. saveReview(): .value → .innerHTML (동일 이유)
  [주의] updateCellCE_sr: row.cells[col] = el.innerHTML 로 저장
  [주의] getData()에 colWidths/rowHeights 초기화 필수
  v11. updateCellCE_sr 함수 누락 버그 수정 (함수 없어서 CE셀 저장 전혀 안됐음)
  v11. AS엔진 blur dispatchEvent 제거 → onblur 핸들러 직접 eval (blur강제발생이 innerHTML 초기화 유발)
  [주의] 폼 CE div 읽기/쓰기 항상 .innerHTML 사용 (.value 절대 사용 금지)
  v12. autoSaveForm 추가 - 폼 CE div(r-*) 입력 시 800ms 디바운스 자동저장
  v12. saveData()에 실제 저장됨 표시 추가 - 가짜 "저장됨" 버그 수정
  [주의] CE셀 저장함수(updateCellCE_sr 등) 반드시 존재 확인 후 배포
  [주의] "저장됨" 표시는 반드시 saveData() 내부에서만 - AS엔진 타이머 기반 표시 금지
  v+. 상단 스크롤바 sticky 고정(top:0) + nav에 💾 저장 버튼 직접 삽입
  v+. TOP SCROLL ENGINE v2 - position:fixed, nav+toolbar 높이 동적계산, overflow 부모 영향 없음
  v13. AS엔진 제거, SAVE ENGINE v2, fbSync _editing, TOP SCROLL v3
-->

<script>
const FB_CONFIG={apiKey:"AIzaSyBh9LtC02jCwyrURkl676UFxtHU2SdSkkI",authDomain:"ian-dashboard.firebaseapp.com",projectId:"ian-dashboard",storageBucket:"ian-dashboard.firebasestorage.app",messagingSenderId:"47067460467",appId:"1:47067460467:web:37906ad2ddb74133238b06"};
if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);
const db=firebase.firestore();
const UID='ian';
async function fbSave(){try{const data={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)data[k]=localStorage.getItem(k);}await db.collection('data').doc(UID).set(data,{merge:true});}catch(e){console.warn('FB:',e);}}
async function fbSync(cb){try{const doc=await db.collection('data').doc(UID).get();if(doc.exists){const d=doc.data();Object.entries(d).forEach(([k,v])=>localStorage.setItem(k,v));}}catch(e){console.warn('FB:',e);}if(cb)cb();}
</script>
<style>
:root{
  --bg:#0c0c0e;--bg2:#141416;--bg3:#1c1c1f;
  --border:rgba(255,255,255,0.2);--border2:rgba(255,255,255,0.3);
  --text:#f0f0f0;--text2:#ccc;--text3:#999;
  --stock:#fbbf24;--pos:#34d399;--neg:#fb7185;
  --r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:17px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-back{font-size:22px;color:var(--text2);text-decoration:none;}
.nav-logo{font-family:'DM Mono',monospace;font-size:16px;color:var(--text2);letter-spacing:0.08em;}
.nav-date{font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border);}
.tab{font-family:'DM Mono',monospace;font-size:15px;color:var(--text3);padding:14px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;}
.tab:hover{color:var(--text2);}
.tab.on{color:var(--text);border-bottom-color:var(--stock);}
.toolbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.btn{font-size:15px;padding:9px 18px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--stock);color:var(--stock);}
.btn.primary{border-color:var(--stock);color:var(--stock);}
.btn.primary:hover{background:var(--stock);color:#0c0c0e;}
.btn.danger{border-color:var(--neg);color:var(--neg);}
.confirm-bar{font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);padding:8px 20px;min-height:32px;}
.wrap{padding:20px;}

/* 입력 폼 */
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.form-title{font-size:17px;font-weight:600;color:var(--stock);margin-bottom:16px;}
.form-date-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.form-date-row label{font-size:15px;color:var(--text2);}
.form-date-row input[type=date]{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:16px;padding:9px 12px;font-family:'DM Mono',monospace;outline:none;}
.form-date-row button{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:9px 16px;border-radius:6px;cursor:pointer;font-size:16px;transition:all .15s;}
.form-date-row button:hover{border-color:var(--stock);color:var(--stock);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fr label{font-size:15px;color:var(--text2);display:block;margin-bottom:7px;}
.fr label .hint{font-size:13px;color:var(--text3);}
.fr textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:16px;padding:11px 13px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none;line-height:1.7;transition:border-color .15s;}
.fr textarea:focus{border-color:var(--stock);}
.fr-full{grid-column:1/-1;}
.save-btn{width:100%;margin-top:16px;padding:14px;font-size:16px;font-family:'DM Mono',monospace;letter-spacing:.04em;border:1px solid var(--stock);border-radius:var(--r-sm);background:transparent;color:var(--stock);cursor:pointer;transition:all .15s;}
.save-btn:hover{background:var(--stock);color:#0c0c0e;}

/* 테이블 */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:15px;}
th{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);padding:12px 14px;border:2px solid var(--border2);background:var(--bg2);text-align:left;white-space:nowrap;position:sticky;top:0;z-index:5;}
td{padding:0;border:2px solid var(--border2);color:var(--text2);vertical-align:top;}
td textarea{width:100%;background:transparent;border:none;color:var(--text);font-size:15px;padding:10px 12px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:vertical;line-height:1.6;min-height:72px;max-height:400px;overflow-y:auto;}
td textarea:focus{background:rgba(251,191,36,0.05);}
td.date-td{padding:10px 12px;font-family:'DM Mono',monospace;font-size:14px;color:var(--text3);white-space:nowrap;vertical-align:middle;}
td.week-td{padding:10px 12px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);white-space:nowrap;vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,0.02);}
.del-btn{font-size:13px;color:var(--text3);cursor:pointer;padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:transparent;white-space:nowrap;transition:all .15s;display:block;margin:8px auto;}
.del-btn:hover{border-color:var(--neg);color:var(--neg);}
.add-row-btn{width:100%;padding:12px;font-size:15px;font-family:'DM Mono',monospace;border:1px dashed var(--border2);border-radius:0 0 var(--r-sm) var(--r-sm);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;margin-top:-1px;}
.add-row-btn:hover{border-color:var(--stock);color:var(--stock);}

/* 월간 */
.actual-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:16px;}
.actual-row label{font-size:16px;color:var(--text2);white-space:nowrap;}
.actual-row input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:17px;padding:11px 14px;font-family:'DM Mono',monospace;outline:none;}
.actual-row .u{font-size:16px;color:var(--text3);}
.mo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.mo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;text-align:center;}
.mo-card.cur{border-color:var(--stock);}
.mo-month{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);margin-bottom:6px;}
.mo-val{font-family:'DM Mono',monospace;font-size:19px;font-weight:500;color:var(--stock);}
.mo-val.neg{color:var(--neg);}
.mo-goal{font-size:14px;color:var(--text3);margin-top:4px;}
.mo-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:10px;overflow:hidden;}
.mo-fill{height:100%;background:var(--stock);border-radius:2px;}
.empty-msg{text-align:center;padding:48px;color:var(--text3);font-size:16px;font-family:'DM Mono',monospace;}
.hidden{display:none!important;}

/* 열 너비 조절 */
.resizable-table{width:max-content;min-width:100%;border-collapse:collapse;table-layout:fixed;}
.resizable-table th{position:relative;user-select:none;}
.resizer{width:5px;height:100%;position:absolute;right:0;top:0;cursor:col-resize;background:transparent;z-index:1;}
.resizer:hover,.resizer.active{background:var(--stock,#fbbf24);}
/* ---- 엑셀 스타일 테이블 v2 ---- */
.ex-table-wrap{overflow-x:auto;}
.ex-table{
  border-collapse:collapse;
  table-layout:fixed;
  width:max-content;
}
.ex-table th{
  font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);
  padding:9px 11px;border:2px solid var(--border2);background:var(--bg2);
  text-align:left;white-space:nowrap;position:relative;user-select:none;
}
.ex-table td{
  padding:0;border:2px solid var(--border2);
  vertical-align:top;overflow:hidden;
  /* height는 JS로 직접 설정 */
}
/* textarea: td 높이 100% 채우고, 넘치면 스크롤 */
.ex-table td textarea{
  display:block;
  width:100%;
  height:100%;          /* td 높이 따라감 */
  min-height:60px;      /* 최소 높이 */
  background:transparent;border:none;color:var(--text);
  font-size:14px;padding:8px 10px;
  font-family:'Noto Sans KR',sans-serif;outline:none;
  resize:none;
  line-height:1.6;box-sizing:border-box;
  overflow-y:auto;      /* 내용 넘치면 스크롤 */
}
.ex-table td textarea:focus{background:rgba(251,191,36,0.04);}
.ex-table td input[type=date]{
  display:block;width:100%;
  background:transparent;border:none;color:var(--text2);
  font-size:13px;padding:8px 10px;
  font-family:'DM Mono',monospace;outline:none;box-sizing:border-box;
}
/* 열 너비 핸들 */
.col-rz{
  position:absolute;right:0;top:0;
  width:5px;height:100%;
  cursor:col-resize;background:transparent;z-index:3;
}
.col-rz:hover,.col-rz.rz-active{background:var(--stock);}
/* 행 높이 핸들 행 */
.rh-row td{
  padding:0!important;
  height:5px!important;
  border-top:none!important;
  border-left:2px solid var(--border2)!important;
  border-right:2px solid var(--border2)!important;
  border-bottom:2px solid var(--border2)!important;
  background:transparent!important;
  cursor:row-resize;
  position:relative;
}
.rh-row td::after{
  content:'';position:absolute;
  bottom:1px;left:10%;right:10%;
  height:2px;background:rgba(255,255,255,0.15);
  border-radius:1px;transition:background .1s;
}
.rh-row:hover td::after{background:var(--stock);}
/* drag reorder */
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;user-select:none;display:block;text-align:center;padding:6px 3px;}
tr:hover .ex-table td{background:rgba(255,255,255,0.015);}

/* contenteditable 셀 공통 스타일 */
.ce-cell{
  width:100%;min-height:28px;
  min-height:60px;
  background:transparent;
  color:var(--text);
  font-size:14px;
  padding:8px 10px;
  font-family:'Noto Sans KR',sans-serif;
  line-height:1.6;
  box-sizing:border-box;
  outline:none;
  overflow-y:auto;
  word-break:break-word;
  white-space:pre-wrap;
}
.ce-cell:focus{background:rgba(251,191,36,0.04);}
.ce-cell b, .ce-cell strong{color:inherit;}

.ce-cell:empty:before{content:attr(placeholder);color:var(--text3);pointer-events:none;}


</style>
</head>

<script>
const GOALS={4:700000,5:1000000,6:1000000,7:1200000,8:1300000,9:1400000,10:1500000,11:1500000,12:1500000};
const DAYS=['일','월','화','수','목','금','토'];
const DEFAULT_COLS=['시황','내일전략','보유종목','관심종목','매매내용','반성','원칙준수'];

const COL_DEF={날짜:120,주차:90,시황:220,내일전략:200,보유종목:180,관심종목:180,매매내용:200,반성:180,원칙준수:180};
function pad(n){return String(n).padStart(2,'0');}
function ls(k){return localStorage.getItem(k);}
function lss(k,v){localStorage.setItem(k,v);}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function showConfirm(msg){const el=document.getElementById('confirm-bar');el.textContent=msg;setTimeout(()=>el.textContent='',3000);}

function getWeekLabel(dateStr){
  const d=new Date(dateStr);
  const month=d.getMonth()+1;
  const day=d.getDate();
  const week=Math.ceil(day/7);
  return month+'월 '+week+'주차';
}

// 데이터 구조: {cols:[...], rows:[{date, week, cells:{col:val}}]}
function getData(){
  const raw=ls('stock_review_tbl');
  if(raw){try{const d=JSON.parse(raw);if(!d.colWidths)d.colWidths={};if(!d.rowHeights)d.rowHeights={};return d;}catch(e){}}
  return {cols:[...DEFAULT_COLS],rows:[],colWidths:{},rowHeights:{}};
}
function saveData(d){
  if(!d.colWidths)d.colWidths={};
  if(!d.rowHeights)d.rowHeights={};
  lss('stock_review_tbl',JSON.stringify(d));
}

/* [수정 v12] autoSaveForm - 폼 CE div 입력 시 자동저장 (800ms 디바운스) */
let _formSaveTimer=null;
function autoSaveForm(){
  clearTimeout(_formSaveTimer);

  _formSaveTimer=setTimeout(function(){
    saveReview();
  }, 800);
}

/* [수정 v11] updateCellCE_sr 함수 누락으로 CE셀 저장 안되던 버그 수정 */
function updateCellCE_sr(el, ri, col){
  const data=getData();
  if(!data.rows[ri])return;
  if(!data.rows[ri].cells)data.rows[ri].cells={};
  data.rows[ri].cells[col]=el.innerHTML;
  saveData(data);
}

let currentDate=todayStr();

function initDate(){document.getElementById('review-date').value=currentDate;loadForm(currentDate);}
function changeDate(dir){const d=new Date(currentDate);d.setDate(d.getDate()+dir);currentDate=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());document.getElementById('review-date').value=currentDate;loadForm(currentDate);}
document.getElementById('review-date').addEventListener('change',function(){currentDate=this.value;loadForm(currentDate);});

/* [수정 v8] loadForm: CE div는 .value 없음 → .innerHTML 사용, row.cells 안전하게 */
function loadForm(date){
  const data=getData();
  const row=data.rows.find(r=>r.date===date);
  const fields=['market','tomorrow','holdings','watchlist','trade','reflect','rule'];
  const cols=['시황','내일전략','보유종목','관심종목','매매내용','반성','원칙준수'];
  fields.forEach((f,i)=>{
    const el=document.getElementById('r-'+f);
    if(!el)return;
    const val=(row&&row.cells&&row.cells[cols[i]])||'';
    el.innerHTML=val;
  });
}

/* [수정 v9] saveReview: CE div .value → .innerHTML */
function saveReview(){
  const data=getData();
  const fields=['market','tomorrow','holdings','watchlist','trade','reflect','rule'];
  const cols=['시황','내일전략','보유종목','관심종목','매매내용','반성','원칙준수'];
  const cells={};
  fields.forEach((f,i)=>{
    const el=document.getElementById('r-'+f);
    cells[cols[i]]=el?el.innerHTML:'';
  });
  const idx=data.rows.findIndex(r=>r.date===currentDate);
  const row={date:currentDate,week:getWeekLabel(currentDate),cells};
  if(idx>=0)data.rows[idx]=row;
  else data.rows.unshift(row);
  saveData(data);
  showConfirm('저장 완료!');
  renderTable();
}


function renameColSR(oldName, newName){
  if(!newName?.trim()||newName===oldName)return;
  const data=getData();
  if(data.cols.includes(newName.trim())&&newName.trim()!==oldName){showConfirm('이미 있는 이름');return;}
  const idx=data.cols.indexOf(oldName);if(idx<0)return;
  data.cols[idx]=newName.trim();
  data.rows.forEach(r=>{
    if(r.cells){r.cells[newName.trim()]=r.cells[oldName]||'';delete r.cells[oldName];}
  });
  if(data.colWidths?.[oldName]){data.colWidths[newName.trim()]=data.colWidths[oldName];delete data.colWidths[oldName];}
  saveData(data);renderTable();
}
function addRow(){
  const data=getData();
  const d=new Date();
  const dateStr=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  data.rows.unshift({date:dateStr,week:getWeekLabel(dateStr),cells:{}});
  saveData(data);renderTable();
}

function addCol(){
  const name=prompt('새 열 이름을 입력하세요:');
  if(!name||!name.trim())return;
  const data=getData();
  if(data.cols.includes(name.trim())){showConfirm('이미 있는 열이에요');return;}
  data.cols.push(name.trim());
  saveData(data);renderTable();
}

function deleteRow(idx){
  if(!confirm('이 행을 삭제할까요?'))return;
  const data=getData();
  data.rows.splice(idx,1);
  saveData(data);renderTable();
}

function deleteCol(colName){
  if(!confirm('"'+colName+'" 열을 삭제할까요?'))return;
  const data=getData();
  data.cols=data.cols.filter(c=>c!==colName);
  data.rows.forEach(r=>delete r.cells[colName]);
  saveData(data);renderTable();
}

function updateCell(rowIdx,col,val){
  const data=getData();
  if(!data.rows[rowIdx])return;
  if(!data.rows[rowIdx].cells)data.rows[rowIdx].cells={};
  data.rows[rowIdx].cells[col]=val;
  saveData(data);
}

function updateDate(rowIdx,val){
  const data=getData();
  if(!data.rows[rowIdx])return;
  data.rows[rowIdx].date=val;
  data.rows[rowIdx].week=getWeekLabel(val);
  // week cell 업데이트
  const weekEl=document.getElementById('week-'+rowIdx);
  if(weekEl)weekEl.textContent=getWeekLabel(val);
  saveData(data);
}

function renderTable(){
  const data=getData();
  const tbody=document.getElementById('review-tbody');
  const empty=document.getElementById('review-empty');
  const thead=document.getElementById('review-thead');

  // 헤더
  const cw=data.colWidths||{};
  thead.innerHTML='<tr>'+
    `<th data-col="날짜" style="width:${cw['날짜']||COL_DEF['날짜']}px;">날짜<div class="col-rz" onmousedown="startColResize(event,'review-table','날짜')"></div></th>`+
    `<th data-col="주차" style="width:${cw['주차']||COL_DEF['주차']}px;">주차<div class="col-rz" onmousedown="startColResize(event,'review-table','주차')"></div></th>`+
    data.cols.map(c=>`<th data-col="${c}" style="width:${cw[c]||COL_DEF[c]||180}px;">
      <input style="background:transparent;border:none;color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;outline:none;width:calc(100% - 22px);cursor:text;"
        value="${c.replace(/"/g,'&quot;')}"
        onblur="renameColSR('${c.replace(/'/g,"\'")}',this.value)"
        onclick="event.stopPropagation()"/>
      <span onclick="deleteCol('${c.replace(/'/g,"\'")}'')" style="cursor:pointer;color:var(--text3);font-size:11px;position:absolute;right:18px;top:50%;transform:translateY(-50%);">✕</span>
      <div class="col-rz" onmousedown="startColResize(event,'review-table','${c.replace(/'/g,"\'")}')"></div>
    </th>`).join('')+
    '<th style="width:52px;"></th></tr>';

  if(!data.rows.length){
    tbody.innerHTML='';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  const rhs=data.rowHeights||{};
  tbody.innerHTML=data.rows.map((row,ri)=>{
    const rh=rhs[ri]||80;
    return `<tr data-ri="${ri}">
      <td data-col="날짜" style="width:${cw['날짜']||COL_DEF['날짜']}px;height:${rh}px;vertical-align:middle;border:2px solid var(--border2);">
        <input type="date" value="${row.date}" onchange="updateDate(${ri},this.value)">
      </td>
      <td data-col="주차" id="week-${ri}" style="width:${cw['주차']||COL_DEF['주차']}px;height:${rh}px;vertical-align:middle;border:2px solid var(--border2);padding:8px 10px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);">${row.week||getWeekLabel(row.date)}</td>
      ${data.cols.map(c=>`<td data-col="${c}" style="width:${cw[c]||COL_DEF[c]||180}px;height:${rh}px;border:2px solid var(--border2);">
        <div class="ce-cell" contenteditable="true"
          onblur="updateCellCE_sr(this,${ri},'${c}')"
          placeholder="${c}...">${(row.cells&&row.cells[c])||''}</div>
      </td>`).join('')}
      <td style="width:52px;height:${rh}px;text-align:center;vertical-align:middle;border:2px solid var(--border2);padding:4px;">
        <button class="del-btn" onclick="deleteRow(${ri})">삭제</button>
      </td>
    </tr>
    <tr class="rh-row">
      <td colspan="${data.cols.length+3}" onmousedown="startRowResize(event,'review-table',${ri})"></td>
    </tr>`;
  }).join('');
  setTimeout(function(){if(window.initAllTopScrolls)window.initAllTopScrolls();},50);
}

function updateActual(){
  const v=parseInt(document.getElementById('actual-input').value)||0;
  const m=new Date().getMonth()+1,g=GOALS[m]||1000000,p=Math.min(100,Math.round(v/g*100));
  document.getElementById('goal-bar').style.width=p+'%';
  document.getElementById('goal-pct').textContent=p+'%';
  document.getElementById('goal-label').textContent=m+'월 목표: '+g.toLocaleString()+'원';
  const hist=JSON.parse(ls('smart_history')||'[]');
  const today=todayStr();const idx=hist.findIndex(h=>h.date===today);
  if(idx>=0){hist[idx].stockActual=v;lss('smart_history',JSON.stringify(hist));fbSave();}
  renderMonthly();
}

function renderMonthly(){
  const hist=JSON.parse(ls('smart_history')||'[]'),el=document.getElementById('mo-grid');if(!el)return;
  const cur=new Date().getMonth()+1;
  el.innerHTML=[4,5,6,7,8,9,10,11,12].map(m=>{
    const g=GOALS[m]||0,entries=hist.filter(h=>parseInt(h.date.split('-')[1])===m),last=entries[0],actual=last?(last.stockActual||0):null;
    const pct=actual!==null?Math.min(100,Math.round(actual/g*100)):0,neg=actual!==null&&actual<0;
    return `<div class="mo-card${m===cur?' cur':''}"><div class="mo-month">${m}월${m===cur?' ●':''}</div><div class="mo-val${neg?' neg':''}">${actual!==null?(actual>=0?'+':'')+actual.toLocaleString():'-'}</div><div class="mo-goal">목표 ${(g/10000).toFixed(0)}만</div><div class="mo-bar"><div class="mo-fill" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

function exportExcel(){
  const data=getData();
  if(!data.rows.length){showConfirm('데이터가 없어요');return;}
  const headers=['날짜','주차',...data.cols];
  const rows=[headers,...data.rows.map(r=>[r.date,r.week||getWeekLabel(r.date),...data.cols.map(c=>(r.cells&&r.cells[c])||'')])];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'주식복기',ws);
  const d=new Date();
  XLSX.writeFile(wb,'주식복기_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx');
  showConfirm('다운로드 완료!');
}

function importExcel(input,mode){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rawRows=XLSX.utils.sheet_to_json(ws,{header:1});
    if(rawRows.length<2){showConfirm('데이터가 없어요');return;}
    const headerRow=rawRows[0].map(h=>String(h||'').trim());
    const data=mode==='overwrite'?{cols:[...DEFAULT_COLS],rows:{}}:getData();
    if(mode==='overwrite')data.rows=[];

    // 헤더에서 날짜/주차 제외한 컬럼 파악
    const colsInFile=headerRow.filter(h=>h&&h!=='날짜'&&h!=='주차');
    // 새 컬럼 추가
    colsInFile.forEach(c=>{if(!data.cols.includes(c))data.cols.push(c);});

    rawRows.slice(1).forEach(row=>{
      if(!row[0])return;
      const dateVal=String(row[0]);
      const cells={};
      headerRow.forEach((h,i)=>{
        if(h&&h!=='날짜'&&h!=='주차'&&row[i]!==undefined&&row[i]!==''){
          cells[h]=String(row[i]);
        }
      });
      const existing=data.rows.findIndex(r=>r.date===dateVal);
      const newRow={date:dateVal,week:getWeekLabel(dateVal),cells};
      if(existing>=0)data.rows[existing]=newRow;
      else data.rows.unshift(newRow);
    });
    saveData(data);renderTable();
    showConfirm(mode==='overwrite'?'덮어쓰기 완료!':'추가 완료!');
  };
  reader.readAsBinaryString(file);input.value='';
}

function showTab(t){
  ['table','write','monthly'].forEach((id,i)=>{
    document.getElementById('tab-'+id).classList.toggle('hidden',id!==t);
    document.querySelectorAll('.tab')[i].classList.toggle('on',id===t);
  });
  if(t==='monthly'){renderMonthly();const hist=JSON.parse(ls('smart_history')||'[]');const cur=new Date().getMonth()+1;const entries=hist.filter(h=>parseInt(h.date.split('-')[1])===cur);if(entries[0])document.getElementById('actual-input').value=entries[0].stockActual||'';}
}

const d=new Date();
document.getElementById('nav-date').textContent=d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+' '+DAYS[d.getDay()];

// 즉시 로컬 데이터로 먼저 렌더 (Firebase 기다리지 않음)
initDate();/* [수정] localStorage 먼저 렌더 → Firebase 재렌더 */
renderTable();
fbSync(()=>{
  if(window._editing)return;
  renderTable();
  setTimeout(function(){if(window.initAllTopScrolls)window.initAllTopScrolls();},100);
});
</script>



<script>
/* ============================================================
   EXCEL RESIZE ENGINE v2
   핵심 원칙:
   - tr에 height 주지 않음 (브라우저가 무시함)
   - td에 height 적용 → 행 높이 제어
   - textarea는 height:100% + min-height + overflow-y:auto
   - 열 너비: 해당 data-col 요소만 변경, 타 열 불변
   - 테이블: width:auto, table-layout:fixed → 제약 없이 확장
   ============================================================ */

// ---- 열 너비 드래그 ----
let _CZ_col='', _CZ_startX=0, _CZ_startW=0, _CZ_tableId='', _CZ_el=null;
function startColResize(e, tableId, col) {
  e.preventDefault(); e.stopPropagation();
  _CZ_col=col; _CZ_startX=e.clientX; _CZ_tableId=tableId; _CZ_el=e.target;
  const tbl=document.getElementById(tableId);
  const th=tbl?tbl.querySelector('th[data-col="'+col+'"]'):null;
  _CZ_startW=th?th.offsetWidth:120;
  _CZ_el.classList.add('rz-active');
  const mm=ev=>{
    const nw=Math.max(30, _CZ_startW+(ev.clientX-_CZ_startX));
    const t=document.getElementById(_CZ_tableId);
    if(!t)return;
    // 해당 열만 변경
    t.querySelectorAll('[data-col="'+_CZ_col+'"]').forEach(el=>{ el.style.width=nw+'px'; });
    // 테이블 전체 width = 모든 th 너비 합산 → 다른 열 절대 영향 없음
    let total=0;
    t.querySelectorAll('thead th').forEach(th=>{ total+=th.offsetWidth; });
    t.style.width=total+'px';
  };
  const mu=()=>{
    _CZ_el.classList.remove('rz-active');
    document.removeEventListener('mousemove',mm);
    document.removeEventListener('mouseup',mu);
    const t=document.getElementById(_CZ_tableId);
    const th2=t?t.querySelector('th[data-col="'+_CZ_col+'"]'):null;
    if(!th2)return;
    const data=getData(); if(!data.colWidths)data.colWidths={};
    data.colWidths[_CZ_col]=th2.offsetWidth; saveData(data);
  };
  document.addEventListener('mousemove',mm);
  document.addEventListener('mouseup',mu);
}

// ---- 행 높이 드래그 ----
// rh-row의 td에 onmousedown="startRowResize(event, tableId, rowDataIdx)"
// rowDataIdx: 데이터 배열의 인덱스 (rh-row 위 데이터 행의 논리 인덱스)
let _RZ_rowIdx=-1, _RZ_startY=0, _RZ_startH=0, _RZ_tableId='';
function startRowResize(e, tableId, rowDataIdx) {
  e.preventDefault();
  _RZ_rowIdx=rowDataIdx; _RZ_startY=e.clientY; _RZ_tableId=tableId;
  // 현재 높이: 해당 rh-row 바로 위 tr의 첫번째 td height
  const tbl=document.getElementById(tableId);
  // id로 정확히 찾음: tr[data-ri="rowDataIdx"]
  const dataTr=tbl?tbl.querySelector('tr[data-ri="'+rowDataIdx+'"]'):null;
  const firstTd=dataTr?dataTr.querySelector('td'):null;
  _RZ_startH=firstTd?firstTd.offsetHeight:80;

  const mm=ev=>{
    const newH=Math.max(32, _RZ_startH+(ev.clientY-_RZ_startY));
    const t=document.getElementById(_RZ_tableId);
    const dTr=t?t.querySelector('tr[data-ri="'+_RZ_rowIdx+'"]'):null;
    if(dTr){
      // 모든 td에 height 적용
      dTr.querySelectorAll('td').forEach(td=>{ td.style.height=newH+'px'; });
      // textarea는 height:100%로 자동 따라옴 (CSS에서 설정)
    }
  };
  const mu=()=>{
    document.removeEventListener('mousemove',mm);
    document.removeEventListener('mouseup',mu);
    const t=document.getElementById(_RZ_tableId);
    const dTr=t?t.querySelector('tr[data-ri="'+_RZ_rowIdx+'"]'):null;
    const td1=dTr?dTr.querySelector('td'):null;
    if(td1){
      const data=getData(); if(!data.rowHeights)data.rowHeights={};
      data.rowHeights[_RZ_rowIdx]=td1.offsetHeight; saveData(data);
    }
    _RZ_rowIdx=-1;
  };
  document.addEventListener('mousemove',mm);
  document.addEventListener('mouseup',mu);
}

</script>
<script>
/* ============================================================
   CONTENTEDITABLE RICH TEXT ENGINE
   - 텍스트 선택 후 미니 툴바: 볼드, 글자색, 형광펜
   - 저장: innerHTML (기존 plain text도 그대로 읽힘)
   - 툴바는 선택 영역 위에 자동 위치
   ============================================================ */

(function(){
  const TOOLBAR_ID = 'ce-toolbar';
  const COLORS = ['#fbbf24','#fb7185','#34d399','#60a5fa','#a78bfa','#f97316','#ffffff','#000000'];
  const HIGHLIGHTS = ['#fbbf2440','#fb718540','#34d39940','#60a5fa40','#a78bfa40','rgba(251,191,36,0.35)','rgba(251,113,133,0.35)','rgba(52,211,153,0.35)'];

  function getOrCreateToolbar(){
    let tb = document.getElementById(TOOLBAR_ID);
    if(tb) return tb;
    tb = document.createElement('div');
    tb.id = TOOLBAR_ID;
    tb.style.cssText = `
      position:fixed;z-index:9999;
      background:#1c1c1f;border:1px solid rgba(255,255,255,0.25);
      border-radius:8px;padding:6px 8px;
      display:none;flex-wrap:wrap;gap:4px;align-items:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
      max-width:320px;
    `;

    // 볼드
    const bold = document.createElement('button');
    bold.textContent = 'B';
    bold.style.cssText = 'font-weight:700;font-size:13px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:#f0f0f0;border-radius:4px;padding:3px 8px;cursor:pointer;font-family:DM Mono,monospace;';
    bold.title = '볼드';
    bold.onmousedown = e => { e.preventDefault(); document.execCommand('bold'); };
    tb.appendChild(bold);

    // 구분선
    const sep1 = document.createElement('div');
    sep1.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep1);

    // 글자색 라벨
    const lbl1 = document.createElement('span');
    lbl1.textContent = 'A';
    lbl1.style.cssText = 'font-size:11px;color:#999;font-family:DM Mono,monospace;';
    tb.appendChild(lbl1);

    // 글자색 팔레트
    COLORS.forEach(c => {
      const dot = document.createElement('button');
      dot.style.cssText = `width:16px;height:16px;border-radius:50%;background:${c};border:1px solid rgba(255,255,255,0.3);cursor:pointer;padding:0;flex-shrink:0;`;
      dot.title = c;
      dot.onmousedown = e => { e.preventDefault(); document.execCommand('foreColor', false, c); };
      tb.appendChild(dot);
    });

    // 구분선
    const sep2 = document.createElement('div');
    sep2.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep2);

    // 형광펜 라벨
    const lbl2 = document.createElement('span');
    lbl2.style.cssText = 'font-size:13px;color:#999;';
    lbl2.textContent = '🖍';
    tb.appendChild(lbl2);

    // 형광펜 팔레트
    HIGHLIGHTS.forEach(c => {
      const dot = document.createElement('button');
      dot.style.cssText = `width:16px;height:16px;border-radius:3px;background:${c};border:1px solid rgba(255,255,255,0.3);cursor:pointer;padding:0;flex-shrink:0;`;
      dot.title = '형광펜';
      dot.onmousedown = e => {
        e.preventDefault();
        document.execCommand('hiliteColor', false, c);
      };
      tb.appendChild(dot);
    });

    // 구분선
    const sep3 = document.createElement('div');
    sep3.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.2);';
    tb.appendChild(sep3);

    // 서식 제거
    const clr = document.createElement('button');
    clr.textContent = '✕';
    clr.title = '서식 제거';
    clr.style.cssText = 'font-size:12px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:#999;border-radius:4px;padding:3px 7px;cursor:pointer;';
    clr.onmousedown = e => { e.preventDefault(); document.execCommand('removeFormat'); };
    tb.appendChild(clr);

    document.body.appendChild(tb);
    tb.style.display = 'flex';
    tb.style.display = 'none';
    return tb;
  }

  function showToolbar(){
    const sel = window.getSelection();
    if(!sel || sel.isCollapsed || !sel.toString().trim()) { hideToolbar(); return; }
    // contenteditable 안에서만
    let node = sel.anchorNode;
    while(node && node.nodeType !== 1) node = node.parentNode;
    if(!node || !node.closest('[contenteditable="true"]')) { hideToolbar(); return; }

    const tb = getOrCreateToolbar();
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    tb.style.display = 'flex';
    const tbW = tb.offsetWidth || 300;
    let left = rect.left + (rect.width/2) - (tbW/2);
    let top = rect.top - tb.offsetHeight - 8 + window.scrollY;
    if(left < 4) left = 4;
    if(left + tbW > window.innerWidth - 4) left = window.innerWidth - tbW - 4;
    if(top < window.scrollY + 4) top = rect.bottom + 8 + window.scrollY;
    tb.style.left = left + 'px';
    tb.style.top = top + 'px';
  }

  function hideToolbar(){
    const tb = document.getElementById(TOOLBAR_ID);
    if(tb) tb.style.display = 'none';
  }

  document.addEventListener('mouseup', () => setTimeout(showToolbar, 10));
  document.addEventListener('keyup', () => setTimeout(showToolbar, 10));
  document.addEventListener('mousedown', e => {
    const tb = document.getElementById(TOOLBAR_ID);
    if(tb && !tb.contains(e.target)) hideToolbar();
  });
  document.addEventListener('scroll', hideToolbar, true);

  window.CE_ENGINE_LOADED = true;
})();

</script>


<script>
/* ============================================================
   SAVE ENGINE v2 - 수동저장만 / 자동저장 없음
   - 💾 버튼: 모든 CE셀 innerHTML 수집 → localStorage → Firebase
   - 실제 Firebase 완료 후에만 ✅ 저장됨 표시
   - 가짜 저장됨 표시 없음
   ============================================================ */
(function(){
  function pad(n){return String(n).padStart(2,'0');}
  function nowTime(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}

  function getBar(){
    let bar=document.getElementById('save-status-bar');
    if(bar)return bar;
    bar=document.createElement('div');
    bar.id='save-status-bar';
    bar.style.cssText='position:fixed;bottom:0;left:0;right:0;height:30px;background:#141416;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:9998;font-family:\'DM Mono\',monospace;font-size:12px;color:#888;';
    bar.innerHTML='<span id="save-status-msg">준비됨</span>'
      +'<button onclick="window.manualSave&&window.manualSave()" style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:4px;color:#fbbf24;font-size:12px;padding:3px 10px;cursor:pointer;font-family:\'DM Mono\',monospace;">💾 저장</button>';
    document.body.appendChild(bar);
    document.body.style.paddingBottom='38px';
    return bar;
  }
  function setMsg(msg,color){
    getBar();
    const el=document.getElementById('save-status-msg');
    if(el){el.textContent=msg;el.style.color=color||'#888';}
  }
  window.manualSave=async function(){
    setMsg('저장 중...','#fbbf24');
    try{
      const active=document.activeElement;
      if(active&&active.classList&&active.classList.contains('ce-cell'))active.blur();
      const d={};
      for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&!k.startsWith('mstage_'))d[k]=localStorage.getItem(k);}
      if(!Object.keys(d).length){setMsg('저장할 데이터 없음','#fb7185');return;}
      if(typeof db!=='undefined'&&typeof UID!=='undefined'){
        await db.collection('data').doc(UID).set(d,{merge:true});
        setMsg('✅ 저장됨 '+nowTime(),'#34d399');
      }else{
        setMsg('✅ 로컬 저장됨 '+nowTime(),'#fbbf24');
      }
    }catch(e){
      setMsg('❌ 저장 실패: '+e.message,'#fb7185');
      console.error('저장 실패:',e);
    }
  };
  window.fbSaveWithStatus=window.manualSave;
  /* CE셀 포커스 추적 - fbSync 재렌더 방지용 */
  document.addEventListener('focusin',function(e){
    if(e.target.classList&&e.target.classList.contains('ce-cell'))window._editing=true;
  });
  document.addEventListener('focusout',function(e){
    if(e.target.classList&&e.target.classList.contains('ce-cell')){
      setTimeout(function(){if(!document.querySelector('.ce-cell:focus'))window._editing=false;},150);
    }
  });
  window.SAVE_ENGINE_LOADED=true;
  setTimeout(function(){getBar();setMsg('준비됨','#888');},300);
})();
</script>
<script>
/* ============================================================
   TOP SCROLL ENGINE v3
   - position:fixed, nav+toolbar 높이 동적계산
   - 셀렉터 확대: .tbl-outer, .tbl-wrap, id*=tbl, div[overflow-x:auto]
   ============================================================ */
(function(){
  let activeWrap=null,syncing=false;
  function getNavBottom(){
    const nav=document.querySelector('.nav'),tb=document.querySelector('.toolbar');
    let top=nav?nav.getBoundingClientRect().bottom:56;
    if(tb){const r=tb.getBoundingClientRect();if(r.top<=top+2)top=r.bottom;}
    return Math.round(top);
  }
  function getOrCreateBar(){
    let bar=document.getElementById('top-scroll-fixed');
    if(bar)return bar;
    bar=document.createElement('div');
    bar.id='top-scroll-fixed';
    bar.style.cssText='position:fixed;left:0;right:0;height:14px;overflow-x:auto;overflow-y:hidden;z-index:998;background:#1c1c1f;border-bottom:2px solid rgba(251,191,36,0.3);display:none;cursor:pointer;';
    const dummy=document.createElement('div');
    dummy.id='top-scroll-dummy';dummy.style.height='1px';
    bar.appendChild(dummy);document.body.appendChild(bar);
    bar.addEventListener('scroll',function(){
      if(syncing||!activeWrap)return;
      syncing=true;activeWrap.scrollLeft=bar.scrollLeft;syncing=false;
    });
    return bar;
  }
  function syncBar(wrap){
    const bar=getOrCreateBar(),dummy=document.getElementById('top-scroll-dummy');
    const tbl=wrap.querySelector('table');
    if(!tbl){bar.style.display='none';return;}
    activeWrap=wrap;
    dummy.style.width=tbl.scrollWidth+'px';
    bar.scrollLeft=wrap.scrollLeft;
    bar.style.top=getNavBottom()+'px';
    bar.style.display=tbl.scrollWidth>wrap.clientWidth?'block':'none';
  }
  window.initTopScrollFixed=function(el){
    if(!el||el.dataset.tsFixed)return;
    el.dataset.tsFixed='1';
    el.addEventListener('scroll',function(){
      if(syncing)return;syncing=true;
      const bar=document.getElementById('top-scroll-fixed');
      if(bar)bar.scrollLeft=el.scrollLeft;
      syncing=false;
    });
    /* mouseenter + 스크롤 위치 기반으로 활성 테이블 감지 */
    el.addEventListener('mouseenter',function(){syncBar(el);});
    el.addEventListener('focusin',function(){syncBar(el);});
    el.addEventListener('click',function(){syncBar(el);});
    const obs=new ResizeObserver(function(){if(activeWrap===el)syncBar(el);});
    const tbl=el.querySelector('table');if(tbl)obs.observe(tbl);
    syncBar(el);
  };
  window.initAllTopScrolls=function(){
    document.querySelectorAll('.tbl-outer,.tbl-wrap,.ex-table-wrap').forEach(function(el){
      if(el.querySelector('table'))window.initTopScrollFixed(el);
    });
    document.querySelectorAll('[id*="tbl-outer"],[id*="tbl-wrap"],[id*="tbl-outer-s"]').forEach(function(el){
      if(el.querySelector('table'))window.initTopScrollFixed(el);
    });
    document.querySelectorAll('div').forEach(function(el){
      if(el.style&&el.style.overflowX==='auto'&&el.querySelector('table'))window.initTopScrollFixed(el);
    });
    /* 페이지 스크롤 시 현재 화면에 보이는 테이블 자동 감지 */
    window.addEventListener('scroll',function(){
      const bar=document.getElementById('top-scroll-fixed');
      if(!bar)return;
      /* 화면에 보이는 overflow-x:auto div 중 테이블 있는 것 찾기 */
      let found=null;
      document.querySelectorAll('.tbl-outer,.tbl-wrap,.ex-table-wrap,div[style]').forEach(function(el){
        if(!el.querySelector('table'))return;
        if(el.style&&el.style.overflowX!=='auto'&&!el.classList.contains('tbl-outer')&&!el.classList.contains('tbl-wrap')&&!el.classList.contains('ex-table-wrap'))return;
        const r=el.getBoundingClientRect();
        if(r.top<window.innerHeight&&r.bottom>0){found=el;}
      });
      if(found)syncBar(found);
    },true);
  };
  window.TOP_SCROLL_V3_LOADED=true;
})();
</script>
</body>
